              this.tenant.saving = false;
              await this.loadTenantData();
              return;
            }
          }

          this.tenant.saving = false;
          await this.loadTenantData();
        },

        async loadTenantLeaseData() {
          this.tenantLease.loading = true;
          this.tenantLease.error = '';

          const results = await Promise.all([
            supabaseClient.from('properties').select('id, landlord_id, name, address, city, created_at').is('archived_at', null).order('name', { ascending: true }),
            supabaseClient.from('units').select('id, property_id, unit_number, bedrooms, bathrooms, monthly_rent, status, properties(id, name, address, city)').is('archived_at', null).order('unit_number', { ascending: true }),
            supabaseClient.from('tenants').select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_token, invite_accepted, created_at').is('archived_at', null).order('created_at', { ascending: false }),
            supabaseClient.from('leases').select('id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at, tenants(id, full_name, email, phone), units(id, unit_number, property_id, properties(id, name, address, city))').order('created_at', { ascending: false })
          ]);

          const [propertiesResult, unitsResult, tenantsResult, leasesResult] = results;
          const firstError = propertiesResult.error || unitsResult.error || tenantsResult.error || leasesResult.error;
          if (firstError) this.tenantLease.error = firstError.message;

          this.tenantLease.properties = propertiesResult.data || [];
          this.tenantLease.units = (unitsResult.data || []).map(unit => ({ ...unit, property: unit.properties || null }));
          this.tenantLease.tenants = (tenantsResult.data || []).map(tenant => ({
            ...tenant,
            invite_accepted: Boolean(tenant.invite_accepted || tenant.profile_id)
          }));
          this.tenantLease.leases = (leasesResult.data || []).map(lease => ({
            ...lease,
            tenant: lease.tenants || null,
            unit: lease.units || null
          }));

          if (this.tenantLease.selectedTenant) {
            const refreshedTenant = this.tenantLease.tenants.find(tenant => tenant.id === this.tenantLease.selectedTenant.id);
            if (refreshedTenant) await this.viewTenant(refreshedTenant);
          }

          if (this.tenantLease.selectedLease) {
            const refreshedLease = this.tenantLease.leases.find(lease => lease.id === this.tenantLease.selectedLease.id);
            if (refreshedLease) await this.viewLease(refreshedLease);
          }

          this.tenantLease.loading = false;
        },

        async addTenantInvite() {
          this.tenantLease.error = '';
          this.tenantLease.saving = true;
          this.tenantLease.generatedInviteLink = '';

          const token = this.generateSecureToken();
          const { data: tenantRow, error: tenantError } = await supabaseClient
            .from('tenants')
            .insert({
              landlord_id: this.currentLandlordId(),
              full_name: this.tenantLease.tenantForm.fullName,
              phone: this.tenantLease.tenantForm.phone || null,
              email: this.tenantLease.tenantForm.email,
              id_number: this.tenantLease.tenantForm.idNumber || null,
              invite_token: token,
              invite_accepted: false
            })
            .select('id')
            .single();

          if (tenantError) {
            this.tenantLease.error = tenantError.message;
            this.tenantLease.saving = false;
            return;
          }

          const { error: inviteError } = await supabaseClient
            .from('invite_tokens')
            .insert({
              token,
              email: this.tenantLease.tenantForm.email,
              role: 'tenant',
              landlord_id: this.currentLandlordId(),
              metadata: {
                tenant_id: tenantRow.id,
                full_name: this.tenantLease.tenantForm.fullName,
                phone: this.tenantLease.tenantForm.phone || '',
                id_number: this.tenantLease.tenantForm.idNumber || ''
              },
              expires_at: this.addHoursIso(48)
            });

          if (inviteError) {
            this.tenantLease.error = inviteError.message;
            this.tenantLease.saving = false;
            return;
          }

          this.tenantLease.generatedInviteLink = this.buildInviteLink(token);
          this.tenantLease.tenantForm = { fullName: '', phone: '', email: '', idNumber: '' };
          this.tenantLease.saving = false;
          await this.loadTenantLeaseData();
        },

        async deleteTenant(tenant) {
          if (!tenant) return;
          const confirmed = await this.requestConfirm({
            title: 'Archive tenant',
            message: `Archive ${tenant.full_name}? They will be removed from active tenant lists and their active lease will be terminated, but payment and lease history will stay saved.`,
            confirmText: 'Archive'
          });
          if (!confirmed) return;

          this.tenantLease.error = '';
          const { error } = await supabaseClient.rpc('delete_tenant_account', {
            p_tenant_id: tenant.id
          });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          if (this.tenantLease.selectedTenant?.id === tenant.id) {
            this.tenantLease.selectedTenant = null;
            this.tenantLease.selectedTenantLeases = [];
            this.tenantLease.selectedTenantPayments = [];
          }
          await this.loadTenantLeaseData();
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        async deleteLease(lease) {
          if (!lease) return;
          const confirmed = await this.requestConfirm({
            title: 'Terminate lease',
            message: `Terminate this lease for ${lease.tenant?.full_name || 'the tenant'}? Payment history, submissions, documents, and maintenance references will stay saved.`,
            confirmText: 'Terminate'
          });
          if (!confirmed) return;

          this.tenantLease.error = '';
          const { error } = await supabaseClient
            .from('leases')
            .update({ status: 'terminated' })
            .eq('id', lease.id);

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          if (lease.unit_id) {
            const { error: unitError } = await supabaseClient
              .from('units')
              .update({ status: 'vacant' })
              .eq('id', lease.unit_id);

            if (unitError) {
              this.tenantLease.error = unitError.message;
              return;
            }
          }

          if (this.tenantLease.selectedLease?.id === lease.id) {
            this.tenantLease.selectedLease = {
              ...this.tenantLease.selectedLease,
              status: 'terminated'
            };
          }
          await this.loadTenantLeaseData();
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        tenantActiveLease(tenantId) {
          return this.tenantLease.leases.find(lease => lease.tenant_id === tenantId && lease.status === 'active') || null;
        },

        tenantUnitLabel(tenantId) {
          const lease = this.tenantActiveLease(tenantId);
          return lease ? this.leaseUnitLabel(lease) : '-';
        },

        tenantPropertyLabelFromId(tenantId) {
          const lease = this.tenantActiveLease(tenantId);
          return lease ? this.leasePropertyLabel(lease) : '-';
        },

        leaseUnitLabel(lease) {
          return lease?.unit?.unit_number || lease?.units?.unit_number || '-';
        },

        leasePropertyLabel(lease) {
          const property = lease?.unit?.properties || lease?.unit?.property || lease?.units?.properties;
          return property?.name || '-';
        },

        leaseDocumentPath(lease) {
          return lease?.lease_document_path || lease?.lease_document_url || '';
        },

        leaseDocumentLabel(lease) {
          if (!this.leaseDocumentPath(lease)) return 'No PDF';
          return lease?.lease_document_name || 'PDF uploaded';
        },

        setLeaseDocumentError(message) {
          if (this.currentShell === 'tenant') {
            this.tenant.error = message;
          } else if (this.currentPage === 'leases') {
            this.tenantLease.error = message;
          } else {
            this.propertyUnit.error = message;
          }
        },

        validateLeaseDocumentFile(file) {
          if (!file) return;
          const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
          if (!isPdf) throw new Error('Lease agreement must be a PDF file.');
          if (file.size > MAX_LEASE_DOCUMENT_SIZE) throw new Error('Lease agreement PDF must be 20 MB or smaller.');
        },

        handleLeaseDocumentSelection(event, target) {
          const file = event.target.files?.[0] || null;
          this.tenantLease.error = '';

          try {
            if (file) this.validateLeaseDocumentFile(file);
            if (target === 'selected') {
              this.tenantLease.selectedLeaseDocumentFile = file;
            } else {
              this.tenantLease.leaseForm.documentFile = file;
            }
          } catch (error) {
            event.target.value = '';
            if (target === 'selected') {
              this.tenantLease.selectedLeaseDocumentFile = null;
            } else {
              this.tenantLease.leaseForm.documentFile = null;
            }
            this.tenantLease.error = error.message;
          }
        },

        sanitizeLeaseDocumentName(fileName) {
          const cleaned = String(fileName || 'lease-agreement.pdf')
            .replace(/[^a-zA-Z0-9._-]/g, '-')
            .replace(/-+/g, '-')
            .slice(0, 120);
          return cleaned.toLowerCase().endsWith('.pdf') ? cleaned : `${cleaned}.pdf`;
        },

        async uploadLeaseDocument(lease, file) {
          this.validateLeaseDocumentFile(file);
          const landlordId = lease.landlord_id || this.currentLandlordId();
          const safeName = this.sanitizeLeaseDocumentName(file.name);
          const objectPath = `${landlordId}/${lease.id}/${Date.now()}-${this.generateSecureToken().slice(0, 16)}-${safeName}`;
          const previousPath = this.leaseDocumentPath(lease);

          const { error: uploadError } = await supabaseClient.storage
            .from(LEASE_DOCUMENT_BUCKET)
            .upload(objectPath, file, {
              cacheControl: '3600',
              contentType: 'application/pdf',
              upsert: false
            });

          if (uploadError) throw uploadError;

          const documentFields = {
            lease_document_url: objectPath,
            lease_document_path: objectPath,
            lease_document_name: file.name,
            lease_document_size: file.size,
            lease_document_uploaded_by: this.profile?.id || null,
            lease_document_uploaded_at: new Date().toISOString()
          };

          const { data, error: updateError } = await supabaseClient
            .from('leases')
            .update(documentFields)
            .eq('id', lease.id)
            .select('id, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at')
            .single();

          if (updateError) throw updateError;

          if (previousPath && previousPath !== objectPath && !/^https?:\/\//i.test(previousPath)) {
            await supabaseClient.storage.from(LEASE_DOCUMENT_BUCKET).remove([previousPath]);
          }

          return data;
        },

        async openLeaseDocument(lease) {
          const documentPath = this.leaseDocumentPath(lease);
          if (!documentPath) return;

          if (/^https?:\/\//i.test(documentPath)) {
            window.open(documentPath, '_blank', 'noopener,noreferrer');
            return;
          }

          const documentWindow = window.open('', '_blank');
          if (documentWindow) documentWindow.opener = null;

          const { data, error } = await supabaseClient.storage
            .from(LEASE_DOCUMENT_BUCKET)
            .createSignedUrl(documentPath, 300, {
              download: lease?.lease_document_name || 'lease-agreement.pdf'
            });

          if (error) {
            if (documentWindow) documentWindow.close();
            this.setLeaseDocumentError(error.message);
            return;
          }

          if (documentWindow) {
            documentWindow.location.href = data.signedUrl;
          } else {
            window.open(data.signedUrl, '_blank', 'noopener,noreferrer');
          }
        },

        async uploadDocumentForSelectedLease() {
          if (!this.tenantLease.selectedLease || !this.tenantLease.selectedLeaseDocumentFile) return;

          this.tenantLease.error = '';
          this.tenantLease.saving = true;

          try {
            await this.uploadLeaseDocument(this.tenantLease.selectedLease, this.tenantLease.selectedLeaseDocumentFile);
            this.tenantLease.selectedLeaseDocumentFile = null;
            if (this.$refs.selectedLeaseDocumentInput) this.$refs.selectedLeaseDocumentInput.value = '';
            await this.loadTenantLeaseData();
            await this.loadPropertyUnitData();
          } catch (error) {
            this.tenantLease.error = error.message;
          }

          this.tenantLease.saving = false;
        },

        imageFormTarget(target) {
          const targets = {
            tenantPayment: { form: this.tenant.paymentForm, errorScope: 'tenant', inputRef: 'tenantPaymentProofInput' },
            manualPayment: { form: this.payments.manualForm, errorScope: 'payments', inputRef: 'manualPaymentProofInput' },
            unitPayment: { form: this.propertyUnit.paymentForm, errorScope: 'propertyUnit', inputRef: 'unitPaymentProofInput' },
            tenantMaintenance: { form: this.tenant.maintenanceForm, errorScope: 'tenant', inputRef: 'tenantMaintenancePhotoInput' },
            maintenanceLog: { form: this.maintenance.logForm, errorScope: 'maintenance', inputRef: 'maintenanceLogPhotoInput' }
          };
          return targets[target] || null;
        },

        setImageUploadError(scope, message) {
          if (scope === 'maintenance') {
            this.maintenance.error = message;
          } else if (scope === 'payments') {
            this.payments.error = message;
          } else if (scope === 'propertyUnit') {
            this.propertyUnit.error = message;
          } else {
            this.tenant.error = message;
          }
        },

        validateImageFile(file) {
          if (!file) return;
          const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
          const allowedExtension = /\.(jpe?g|png|webp)$/i.test(file.name);
          if (!allowedTypes.includes(file.type) && !allowedExtension) {
            throw new Error('Image must be a JPEG, PNG, or WebP file.');
          }
          if (file.size > MAX_IMAGE_UPLOAD_SIZE) throw new Error('Image must be 10 MB or smaller.');
        },

        validatePaymentProofFile(file) {
          if (!file) return;
          const allowedTypes = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
          const allowedExtension = /\.(jpe?g|png|webp|pdf)$/i.test(file.name);
          if (!allowedTypes.includes(file.type) && !allowedExtension) {
            throw new Error('Payment proof must be a JPEG, PNG, WebP, or PDF file.');
          }
          if (file.size > MAX_PAYMENT_PROOF_UPLOAD_SIZE) throw new Error('Payment proof must be 10 MB or smaller.');
        },

        handleImageSelection(event, target, fieldName) {
          const targetConfig = this.imageFormTarget(target);
          if (!targetConfig) return;

          const file = event.target.files?.[0] || null;
          this.setImageUploadError(targetConfig.errorScope, '');

          try {
            if (file) {
              if (target === 'tenantPayment' || target === 'manualPayment' || target === 'unitPayment') {
                this.validatePaymentProofFile(file);
              } else {
                this.validateImageFile(file);
              }
            }
            targetConfig.form[fieldName] = file;
          } catch (error) {
            event.target.value = '';
            targetConfig.form[fieldName] = null;
            this.setImageUploadError(targetConfig.errorScope, error.message);
          }
        },

        sanitizeImageName(fileName) {
          const cleaned = String(fileName || 'upload.jpg')
            .replace(/[^a-zA-Z0-9._-]/g, '-')
            .replace(/-+/g, '-')
            .slice(0, 120);
          return /\.(jpe?g|png|webp)$/i.test(cleaned) ? cleaned : `${cleaned}.jpg`;
        },

        sanitizePaymentProofName(fileName) {
          const cleaned = String(fileName || 'payment-proof.pdf')
            .replace(/[^a-zA-Z0-9._-]/g, '-')
            .replace(/-+/g, '-')
            .slice(0, 120);
          return /\.(jpe?g|png|webp|pdf)$/i.test(cleaned) ? cleaned : `${cleaned}.pdf`;
        },

        paymentProofContentType(file) {
          if (file?.type) return file.type;
          return /\.pdf$/i.test(file?.name || '') ? 'application/pdf' : 'image/jpeg';
        },

        async uploadPrivateImage(bucket, landlordId, rowId, file) {
          this.validateImageFile(file);
          const safeName = this.sanitizeImageName(file.name);
          const objectPath = `${landlordId}/${rowId}/${Date.now()}-${this.generateSecureToken().slice(0, 16)}-${safeName}`;
          const { error } = await supabaseClient.storage
            .from(bucket)
            .upload(objectPath, file, {
              cacheControl: '3600',
              contentType: file.type || 'image/jpeg',
              upsert: false
            });

          if (error) throw error;
          return objectPath;
        },

        async uploadPaymentProofFile(landlordId, rowId, file) {
          this.validatePaymentProofFile(file);
          const safeName = this.sanitizePaymentProofName(file.name);
          const objectPath = `${landlordId}/${rowId}/${Date.now()}-${this.generateSecureToken().slice(0, 16)}-${safeName}`;
          const { error } = await supabaseClient.storage
            .from(PAYMENT_PROOF_BUCKET)
            .upload(objectPath, file, {
              cacheControl: '3600',
              contentType: this.paymentProofContentType(file),
              upsert: false
            });

          if (error) throw error;
          return objectPath;
        },

        paymentProofPath(submission) {
          return submission?.proof_file_path
            || submission?.proof_image_path
            || submission?.proof_image_url
            || submission?.payment_submissions?.proof_image_path
            || submission?.payment_submissions?.proof_image_url
            || submission?.submission?.proof_image_path
            || submission?.submission?.proof_image_url
            || '';
        },

        maintenancePhotoPath(request) {
          return request?.photo_path || request?.photo_url || '';
        },

        async openPrivateImage(bucket, path, fileName, errorScope) {
          if (!path) return;

          if (/^https?:\/\//i.test(path)) {
            window.open(path, '_blank', 'noopener,noreferrer');
            return;
          }

          const imageWindow = window.open('', '_blank');
          if (imageWindow) imageWindow.opener = null;

          const { data, error } = await supabaseClient.storage
            .from(bucket)
            .createSignedUrl(path, 300, { download: fileName || 'image' });

          if (error) {
            if (imageWindow) imageWindow.close();
            this.setImageUploadError(errorScope, error.message);
            return;
          }

          if (imageWindow) {
            imageWindow.location.href = data.signedUrl;
          } else {
            window.open(data.signedUrl, '_blank', 'noopener,noreferrer');
          }
        },

        openPaymentProof(submission) {
          return this.openPrivateImage(
            PAYMENT_PROOF_BUCKET,
            this.paymentProofPath(submission),
            submission?.proof_file_name || submission?.proof_image_name || submission?.payment_submissions?.proof_image_name || submission?.submission?.proof_image_name || 'payment-proof',
            this.currentShell === 'tenant' ? 'tenant' : 'payments'
          );
        },

        openMaintenancePhoto(request) {
          return this.openPrivateImage(
            MAINTENANCE_PHOTO_BUCKET,
            this.maintenancePhotoPath(request),
            request?.photo_name || 'maintenance-photo',
            this.currentShell === 'tenant' ? 'tenant' : 'maintenance'
          );
        },

        async attachPaymentProof(submission, file, landlordId) {
          if (!file || !submission?.id) return;

          const objectPath = await this.uploadPaymentProofFile(landlordId, submission.id, file);
          const { error } = await supabaseClient.rpc('attach_payment_proof', {
            p_submission_id: submission.id,
            p_path: objectPath,
            p_name: file.name,
            p_size: file.size
          });

          if (error) {
            await supabaseClient.storage.from(PAYMENT_PROOF_BUCKET).remove([objectPath]);
            throw error;
          }
        },

        async attachPaymentRecordProof(payment, file, landlordId) {
          if (!file || !payment?.id) return;

          const objectPath = await this.uploadPaymentProofFile(landlordId, payment.id, file);
          const { error } = await supabaseClient.rpc('attach_payment_record_proof', {
            p_payment_id: payment.id,
            p_path: objectPath,
            p_name: file.name,
            p_size: file.size
          });

          if (error) {
            await supabaseClient.storage.from(PAYMENT_PROOF_BUCKET).remove([objectPath]);
            throw error;
          }
        },

        async attachMaintenancePhoto(request, file) {
          if (!file || !request?.id) return;

          const objectPath = await this.uploadPrivateImage(MAINTENANCE_PHOTO_BUCKET, request.landlord_id, request.id, file);
          const { error } = await supabaseClient.rpc('attach_maintenance_photo', {
            p_request_id: request.id,
            p_path: objectPath,
            p_name: file.name,
            p_size: file.size
          });

          if (error) {
            await supabaseClient.storage.from(MAINTENANCE_PHOTO_BUCKET).remove([objectPath]);
            throw error;
          }
        },

        async viewTenant(tenant) {
          this.tenantLease.selectedTenant = tenant;
          this.tenantLease.selectedTenantLeases = this.tenantLease.leases.filter(lease => lease.tenant_id === tenant.id);
          const leaseIds = this.tenantLease.selectedTenantLeases.map(lease => lease.id);

          if (leaseIds.length === 0) {
            this.tenantLease.selectedTenantPayments = [];
            return;
          }

          const { data, error } = await supabaseClient
            .from('payments')
            .select('id, lease_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, notes, receipt_number, created_at')
            .in('lease_id', leaseIds)
            .order('payment_date', { ascending: false });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          this.tenantLease.selectedTenantPayments = data || [];
        },

        tenantsAvailableForLease() {
          const activeTenantIds = new Set(this.tenantLease.leases.filter(lease => lease.status === 'active').map(lease => lease.tenant_id));
          return this.tenantLease.tenants.filter(tenant => !activeTenantIds.has(tenant.id));
        },

        vacantUnitsForLeaseForm() {
          return this.tenantLease.units.filter(unit => {
            const propertyMatches = !this.tenantLease.leaseForm.propertyId || unit.property_id === this.tenantLease.leaseForm.propertyId;
            return propertyMatches && unit.status === 'vacant';
          });
        },

        prefillLeaseRent() {
          const unit = this.tenantLease.units.find(item => item.id === this.tenantLease.leaseForm.unitId);
          if (unit) this.tenantLease.leaseForm.rent = Number(unit.monthly_rent || 0);
        },

        async addLeaseFromPage() {
          this.tenantLease.error = '';
          this.tenantLease.saving = true;

          try {
            const documentFile = this.tenantLease.leaseForm.documentFile;
            let uploadWarning = '';
            const lease = await this.createLease({
              unitId: this.tenantLease.leaseForm.unitId,
              tenantId: this.tenantLease.leaseForm.tenantId,
              startDate: this.tenantLease.leaseForm.startDate,
              endDate: this.tenantLease.leaseForm.endDate,
              monthlyRent: this.tenantLease.leaseForm.rent,
              depositAmount: this.tenantLease.leaseForm.depositAmount,
              depositPaid: this.tenantLease.leaseForm.depositPaid
            });

            if (documentFile) {
              try {
                await this.uploadLeaseDocument(lease, documentFile);
              } catch (error) {
                uploadWarning = `Lease was created, but the PDF upload failed: ${error.message}`;
              }
            }

            this.tenantLease.leaseForm = {
              tenantId: '',
              propertyId: '',
              unitId: '',
              startDate: '',
              endDate: '',
              rent: 0,
              depositAmount: 0,
              depositPaid: false,
              documentFile: null
            };
            if (this.$refs.leaseDocumentInput) this.$refs.leaseDocumentInput.value = '';
            await this.loadTenantLeaseData();
            await this.loadPropertyUnitData();
            await this.loadDashboardData();
            if (uploadWarning) this.tenantLease.error = uploadWarning;
          } catch (error) {
            this.tenantLease.error = error.message;
          }

          this.tenantLease.saving = false;
        },

        async viewLease(lease) {
          this.tenantLease.selectedLease = lease;
          this.tenantLease.selectedLeaseDocumentFile = null;
          if (this.$refs.selectedLeaseDocumentInput) this.$refs.selectedLeaseDocumentInput.value = '';
          const { data, error } = await supabaseClient
            .from('payments')
            .select('id, lease_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, notes, receipt_number, created_at')
            .eq('lease_id', lease.id)
            .order('payment_date', { ascending: false });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          this.tenantLease.selectedLeasePayments = data || [];
        },

        async loadMyAccountData() {
          if (!['landlord', 'management_leader'].includes(this.profile?.role)) return;

          this.account.loading = true;
          this.account.error = '';

          let data = null;
          let error = null;

          if (this.profile.role === 'management_leader') {
            const result = await supabaseClient
              .from('management_companies')
              .select('id, leader_profile_id, company_name, subscription_status, subscription_expires_at, max_landlords, max_properties, max_staff, notes, created_at')
              .eq('leader_profile_id', this.profile.id)
              .maybeSingle();

            error = result.error;
            data = result.data
              ? {
                id: result.data.id,
                landlord_id: result.data.leader_profile_id,
                status: result.data.subscription_status || 'trial',
                expires_at: result.data.subscription_expires_at,
                landlord_limit: result.data.max_landlords,
                property_limit: result.data.max_properties,
                staff_limit: result.data.max_staff,
                notes: result.data.notes,
                created_at: result.data.created_at,
                updated_at: null
              }
              : null;
          } else {
            const result = await supabaseClient
              .from('landlord_subscriptions')
              .select('id, landlord_id, status, expires_at, property_limit, notes, updated_at, created_at')
              .eq('landlord_id', this.profile.id)
              .maybeSingle();

            error = result.error;
            data = result.data || null;
          }

          if (error) {
            this.account.error = error.message;
          }

          this.account.subscription = data || null;
          this.account.loading = false;
        },

        accountDaysRemaining() {
          if (!this.account.subscription?.expires_at) return '-';
          const days = this.daysUntil(this.account.subscription.expires_at.slice(0, 10));
          if (days < 0) return 'Expired';
          if (days === 0) return 'Expires today';
          return `${days} days`;
        },

        loadSettingsData() {
          this.settings.error = '';
          this.settings.message = '';
          this.settings.profileForm = {
            fullName: this.profile?.full_name || '',
            phone: this.profile?.phone || '',
            email: this.profile?.email || ''
          };
          this.settings.passwordForm = {
            password: '',
            confirmPassword: ''
          };
        },

        async saveProfileSettings() {
          if (!this.profile?.id) return;

          this.settings.error = '';
          this.settings.message = '';
          this.settings.savingProfile = true;

          const { data, error } = await supabaseClient
            .from('profiles')
            .update({
              full_name: this.settings.profileForm.fullName,
              phone: this.settings.profileForm.phone || null
            })
            .eq('id', this.profile.id)
            .select('*')
            .single();

          if (error) {
            this.settings.error = error.message;
            this.settings.savingProfile = false;
            return;
          }

          this.profile = data;
          this.settings.message = 'Profile updated.';
          this.settings.savingProfile = false;
        },

        async changePassword() {
          this.settings.error = '';
          this.settings.message = '';

          if (this.settings.passwordForm.password !== this.settings.passwordForm.confirmPassword) {
            this.settings.error = 'Passwords do not match.';
            return;
          }

          if (this.settings.passwordForm.password.length < 8) {
            this.settings.error = 'Password must be at least 8 characters.';
            return;
          }

          this.settings.savingPassword = true;

          const { error } = await supabaseClient.auth.updateUser({
            password: this.settings.passwordForm.password
          });

          if (error) {
            this.settings.error = error.message;
            this.settings.savingPassword = false;
            return;
          }

          this.settings.passwordForm = {
            password: '',
            confirmPassword: ''
          };
          this.settings.message = 'Password updated.';
          this.settings.savingPassword = false;
        },

        async loadNotifications() {
          if (!this.profile?.id) return;

          this.notifications.loading = true;
          this.notifications.error = '';

          const { data, error } = await supabaseClient
            .from('notifications')
            .select('id, profile_id, landlord_id, type, message, related_id, is_read, created_at')
            .eq('profile_id', this.profile.id)
            .order('created_at', { ascending: false })
            .limit(80);

          if (error) {
            this.notifications.error = error.message;
            this.notifications.loading = false;
            return;
          }

          this.notifications.items = data || [];
          this.notifications.loading = false;
        },

        async markAllNotificationsRead() {
          if (!this.profile?.id) return;

          this.notifications.error = '';
          this.notifications.saving = true;

          const { error } = await supabaseClient
            .from('notifications')
            .update({ is_read: true })
            .eq('profile_id', this.profile.id)
            .eq('is_read', false);

          if (error) {
            this.notifications.error = error.message;
            this.notifications.saving = false;
            return;
          }

          this.notifications.items = this.notifications.items.map(item => ({ ...item, is_read: true }));
          this.unreadCount = 0;
          this.notifications.saving = false;
        },

        async openNotification(notification) {
          if (!notification) return;

          if (!notification.is_read) {
            const { error } = await supabaseClient
              .from('notifications')
              .update({ is_read: true })
              .eq('id', notification.id);

            if (!error) {
              notification.is_read = true;
              this.notifications.items = this.notifications.items.map(item => item.id === notification.id ? { ...item, is_read: true } : item);
              await this.loadUnreadCount(this.profile.id);
            }
          }

          const targetPage = this.notificationTargetPage(notification);
          if (targetPage && targetPage !== this.currentPage) {
            await this.navigate(targetPage);
          }
        },

        notificationTargetPage(notification) {
          const type = notification?.type || '';

          if (this.currentShell === 'tenant') {
            const tenantTargets = {
              payment_approved: 'tenant-payments',
              payment_rejected: 'tenant-payments',
              maintenance_updated: 'tenant-maintenance',
              rent_due: 'tenant-home',
              lease_expiring: 'tenant-home'
            };
            return tenantTargets[type] || 'tenant-notifications';
          }

          if (this.currentShell !== 'app') return '';

          const appTargets = {
            payment_submitted: 'payments',
            payment_approved: 'payments',
            payment_rejected: 'payments',
            maintenance_new: 'maintenance',
            maintenance_updated: 'maintenance',
            lease_expiring: 'leases',
            rent_due: 'leases'
          };
          const target = appTargets[type] || '';
          if (!target) return '';
          if (target === 'payments' && !this.canShowAppPage('payments')) return '';
          if (target === 'maintenance' && !this.canShowAppPage('maintenance')) return '';
          if (target === 'leases' && !this.canShowAppPage('leases')) return '';
          return target;
        },

        notificationTypeLabel(type) {
          const labels = {
            payment_submitted: 'Payment Submitted',
            payment_approved: 'Payment Approved',
            payment_rejected: 'Payment Rejected',
            lease_expiring: 'Lease Expiring',
            maintenance_new: 'Maintenance Request',
            maintenance_updated: 'Maintenance Updated',
            rent_due: 'Rent Due'
          };
          return labels[type] || this.titleCase(type);
        },

        notificationIcon(type) {
          if (type?.startsWith('payment')) return 'card';
          if (type?.startsWith('maintenance')) return 'wrench';
          if (type === 'lease_expiring' || type === 'rent_due') return 'file';
          return 'bell';
        },

        formatDateTime(value) {
          if (!value) return '-';
          return new Intl.DateTimeFormat(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          }).format(new Date(value));
        },

        startUnreadRefresh(profileId) {
          this.stopUnreadRefresh();
          if (!profileId) return;

          this.unreadRefreshTimer = window.setInterval(async () => {
            await this.loadUnreadCount(profileId);
            if (this.currentPage === 'notifications' || this.currentPage === 'tenant-notifications') {
              await this.loadNotifications();
            }
          }, 30000);
        },

        stopUnreadRefresh() {
          if (this.unreadRefreshTimer) {
            window.clearInterval(this.unreadRefreshTimer);
            this.unreadRefreshTimer = null;
          }
        },

        async signIn() {
          this.authError = '';
          this.successMessage = '';
          this.authLoading = true;

          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: this.loginForm.email,
            password: this.loginForm.password
          });

          this.authLoading = false;

          if (error) {
            this.authError = error.message;
            return;
          }

          const sameLoadedUser = data.user
            && this.user?.id === data.user.id
            && this.profile?.id === data.user.id
            && !['login', 'invite'].includes(this.currentShell);

          if (data.user && !sameLoadedUser) {
            await this.loadAuthenticatedUser(data.user);
          }
        },

        async signUpStaff() {
          this.authError = '';
          this.successMessage = '';

          if (this.staffSignupForm.password !== this.staffSignupForm.confirmPassword) {
            this.authError = 'Passwords do not match.';
            return;
          }

          if (!/^\d{6}$/.test(this.staffSignupForm.landlordCode)) {
            this.authError = 'Enter the 6 digit landlord code.';
            return;
          }

          this.authLoading = true;
          await supabaseClient.auth.signOut();

          const { data: codeValid, error: codeError } = await supabaseClient.rpc('validate_landlord_code', {
            p_landlord_code: this.staffSignupForm.landlordCode
          });

          if (codeError || !codeValid) {
            this.authError = codeError?.message || 'Landlord code not found.';
            this.authLoading = false;
            return;
          }

          const { data, error } = await supabaseClient.auth.signUp({
            email: this.staffSignupForm.email,
            password: this.staffSignupForm.password
          });

          if (error) {
            this.authError = error.message;
            this.authLoading = false;
            return;
          }

          if (!data.session || !data.user) {
            this.authLoading = false;
            this.successMessage = 'Check your email to verify your staff account, then sign in and request access.';
            this.authMode = 'login';
            return;
          }

          const { error: registerError } = await supabaseClient.rpc('register_staff_with_landlord_code', {
            p_full_name: this.staffSignupForm.fullName,
            p_phone: this.staffSignupForm.phone || '',
            p_landlord_code: this.staffSignupForm.landlordCode
          });

          if (registerError) {
            this.authError = registerError.message;
            this.authLoading = false;
            return;
          }

          await supabaseClient.auth.signOut();
          this.authLoading = false;
          this.authMode = 'login';
          this.loginForm.email = this.staffSignupForm.email;
          this.staffSignupForm = {
            fullName: '',
            phone: '',
            email: '',
            password: '',
            confirmPassword: '',
            landlordCode: ''
          };
          this.successMessage = 'Staff account created. Your request was sent to the landlord for approval.';
        },

        async loadAuthenticatedUser(authUser) {
          const previousShell = this.currentShell;
          const previousPage = this.currentPage;

          this.booting = true;
          this.user = authUser;
          this.authError = '';

          const { data: profile, error: profileError } = await this.withTimeout(
            supabaseClient
              .from('profiles')
              .select('*')
              .eq('id', authUser.id)
              .maybeSingle(),
            12000,
            'Profile loading is taking too long. Please refresh once or sign in again.'
          );

          if (profileError || !profile) {
            await supabaseClient.auth.signOut();
            this.authError = 'Your account does not exist or has been removed. Please contact your landlord or Mushavo administrator.';
            this.currentShell = 'login';
            this.booting = false;
            return;
          }

          if (profile.archived_at) {
            await supabaseClient.auth.signOut();
            this.authError = 'Your account has been archived. Please contact your landlord or Mushavo administrator.';
            this.currentShell = 'login';
            this.booting = false;
            return;
          }

          this.profile = profile;

          if (profile.role === 'super_admin') {
            this.currentShell = 'super_admin';
            this.currentPage = this.resolveActivePage('landlord-management', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            if (!this.admin.financeForm.paidAt) this.resetAdminFinanceForm();
            this.booting = false;
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'landlord') {
            const hasAccess = await this.withTimeout(
              this.checkLandlordSubscription(profile.id),
              12000,
              'Subscription check is taking too long. Please refresh once.'
            );
            if (!hasAccess) {
              this.currentShell = 'suspended';
              this.booting = false;
              return;
            }

            this.currentShell = 'app';
            this.currentPage = this.resolveActivePage('dashboard', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'staff') {
            const hasStaffAccess = await this.withTimeout(
              this.loadStaffPermissions(profile.id),
              12000,
              'Staff permissions are taking too long. Please refresh once.'
            );
            if (!hasStaffAccess) {
              await supabaseClient.auth.signOut();
              this.authError = 'Your staff account is waiting for landlord approval. Please try again after the landlord approves your request.';
              this.currentShell = 'login';
              this.booting = false;
              return;
            }
            this.currentShell = 'app';
            this.currentPage = previousShell === 'app' && this.isPageAllowed(previousPage) ? previousPage : 'dashboard';
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'management_leader') {
            const hasManagementAccess = await this.withTimeout(
              this.loadManagementPermissions(profile.id),
              12000,
              'Management account loading is taking too long. Please refresh once.'
            );
            if (!hasManagementAccess) {
              await supabaseClient.auth.signOut();
              this.authError = 'Your management account is not active. Please contact the Mushavo administrator.';
              this.currentShell = 'login';
              this.booting = false;
              return;
            }
            this.currentShell = 'app';
            this.currentPage = previousShell === 'app' && this.isPageAllowed(previousPage) ? previousPage : 'dashboard';
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'management_staff') {
            const hasManagementStaffAccess = await this.withTimeout(
              this.loadManagementStaffPermissions(profile.id),
              12000,
              'Management staff permissions are taking too long. Please refresh once.'
            );
            if (!hasManagementStaffAccess) {
              await supabaseClient.auth.signOut();
              this.authError = 'Your management staff account is waiting for approval or has no assigned landlord yet.';
              this.currentShell = 'login';
              this.booting = false;
              return;
            }
            this.currentShell = 'app';
            this.currentPage = this.resolveActivePage('dashboard', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'tenant') {
            this.currentShell = 'tenant';
            this.currentPage = this.resolveActivePage('tenant-home', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            await this.refreshCurrentPage();
            return;
          }

          await supabaseClient.auth.signOut();
          this.authError = 'This account role is not supported.';
          this.currentShell = 'login';
          this.booting = false;
        },

        async checkLandlordSubscription(landlordId) {
          const { data, error } = await supabaseClient
            .from('landlord_subscriptions')
            .select('status, expires_at, notes, property_limit')
            .eq('landlord_id', landlordId)
            .maybeSingle();

          if (error || !data) {
            this.subscription = null;
            return false;
          }

          this.subscription = data;
          const expiresAt = new Date(data.expires_at);
          const activeStatus = data.status === 'active' || data.status === 'trial';
          return activeStatus && expiresAt.getTime() > Date.now();
        },

        async loadStaffPermissions(staffProfileId) {
          const { data, error } = await supabaseClient
            .from('staff_permissions')
            .select('*, landlord:profiles!staff_permissions_landlord_id_fkey(id, full_name, email, landlord_code)')
            .eq('staff_profile_id', staffProfileId)
            .eq('status', 'approved')
            .order('accepted_at', { ascending: true });

          if (error) return false;

          this.staffContext.relationships = data || [];
          if (this.staffContext.relationships.length === 0) {
            if (this.profile?.staff_type === 'freelancer') {
              this.staffContext.activeLandlordId = '';
              this.permissions = this.permissionStateFromRow({});
              return true;
            }

            return false;
          }

          let activeLandlordId = this.profile?.landlord_id || '';
          if (!this.staffContext.relationships.some(row => row.landlord_id === activeLandlordId)) {
            activeLandlordId = this.staffContext.relationships[0].landlord_id;
            const { error: switchError } = await supabaseClient.rpc('switch_staff_landlord', {
              p_landlord_id: activeLandlordId
            });
            if (switchError) return false;
            this.profile.landlord_id = activeLandlordId;
          }

          this.staffContext.activeLandlordId = activeLandlordId;
          const active = this.staffContext.relationships.find(row => row.landlord_id === activeLandlordId) || this.staffContext.relationships[0];
          this.permissions = this.permissionStateFromRow(active);
          return true;
        },

        async loadManagementPermissions(leaderProfileId) {
          const { data: company, error: companyError } = await supabaseClient
            .from('management_companies')
            .select('id, leader_profile_id, country_id, company_name, phone, max_landlords, max_properties, max_staff, subscription_status, subscription_expires_at, notes, created_at')
            .eq('leader_profile_id', leaderProfileId)
            .is('archived_at', null)
            .maybeSingle();

          if (companyError || !company) return false;

          const status = company.subscription_status || 'trial';
          if (status === 'suspended') return false;
          if (company.subscription_expires_at && this.daysUntil(company.subscription_expires_at) < 0) return false;
          this.subscription = {
            status,
            expires_at: company.subscription_expires_at,
            property_limit: company.max_properties,
            notes: company.notes || ''
          };

          const permissionSelect = 'id, management_company_id, leader_profile_id, landlord_id, all_properties, property_ids, can_view_properties, can_add_properties, can_edit_properties, can_archive_properties, can_view_units, can_add_units, can_edit_units, can_mark_units_vacant, can_view_tenants, can_add_tenants, can_edit_tenants, can_archive_tenants, can_view_leases, can_create_leases, can_edit_leases, can_terminate_leases, can_view_lease_documents, can_upload_lease_documents, can_manage_maintenance, can_create_maintenance, can_assign_maintenance, can_add_resolution_notes, can_view_payments, can_log_payments, can_reject_payments, can_view_payment_proofs, can_verify_payments, can_manage_leases, can_manage_staff, can_view_finance, status, accepted_at, landlord:profiles!management_landlord_permissions_landlord_id_fkey(id, full_name, email, landlord_code)';
          const [permissionsResult, requestsResult] = await Promise.all([
            supabaseClient
              .from('management_landlord_permissions')
              .select(permissionSelect)
              .eq('management_company_id', company.id)
              .eq('status', 'approved')
              .order('accepted_at', { ascending: true }),
            supabaseClient
              .from('management_landlord_requests')
              .select('id, management_company_id, leader_profile_id, landlord_id, landlord_code, status, requested_at, landlord:profiles!management_landlord_requests_landlord_id_fkey(id, full_name, email, landlord_code)')
              .eq('management_company_id', company.id)
              .eq('status', 'pending')
              .order('requested_at', { ascending: false })
          ]);

          if (permissionsResult.error || requestsResult.error) return false;

          this.managementContext.company = company;
          this.managementContext.relationships = permissionsResult.data || [];
          this.managementContext.requests = requestsResult.data || [];

          if (this.managementContext.relationships.length === 0) {
            this.managementContext.activeLandlordId = '';
            this.permissions = this.permissionStateFromRow({});
            return true;
          }

          let activeLandlordId = this.managementContext.activeLandlordId || localStorage.getItem('mushavo_management_landlord_id') || '';
          if (!this.managementContext.relationships.some(row => row.landlord_id === activeLandlordId)) {
            activeLandlordId = this.managementContext.relationships[0].landlord_id;
          }

          this.managementContext.activeLandlordId = activeLandlordId;
          localStorage.setItem('mushavo_management_landlord_id', activeLandlordId);
          const active = this.managementContext.relationships.find(row => row.landlord_id === activeLandlordId) || this.managementContext.relationships[0];
          this.permissions = this.permissionStateFromRow(active);
          return true;
        },

        async loadManagementStaffPermissions(staffProfileId) {
          if (!this.profile?.landlord_id) return false;

          const staffSelect = 'id, management_company_id, staff_profile_id, all_properties, property_ids, can_view_properties, can_add_properties, can_edit_properties, can_archive_properties, can_view_units, can_add_units, can_edit_units, can_mark_units_vacant, can_view_tenants, can_add_tenants, can_edit_tenants, can_archive_tenants, can_view_leases, can_create_leases, can_edit_leases, can_terminate_leases, can_view_lease_documents, can_upload_lease_documents, can_manage_maintenance, can_create_maintenance, can_assign_maintenance, can_add_resolution_notes, can_view_payments, can_log_payments, can_reject_payments, can_view_payment_proofs, can_verify_payments, can_manage_leases, can_manage_staff, can_view_finance, status, company:management_companies!management_staff_permissions_management_company_id_fkey(id, leader_profile_id, country_id, company_name, subscription_status, subscription_expires_at)';
          const { data: staffPermission, error: staffError } = await supabaseClient
            .from('management_staff_permissions')
            .select(staffSelect)
            .eq('staff_profile_id', staffProfileId)
            .eq('status', 'approved')
            .maybeSingle();

          if (staffError || !staffPermission?.company) return false;

          const company = staffPermission.company;
          if (company.subscription_status === 'suspended') return false;
          if (company.subscription_expires_at && this.daysUntil(company.subscription_expires_at) < 0) return false;

          const { data: landlordPermission, error: landlordError } = await supabaseClient
            .from('management_landlord_permissions')
            .select('id, management_company_id, leader_profile_id, landlord_id, all_properties, property_ids, status, landlord:profiles!management_landlord_permissions_landlord_id_fkey(id, full_name, email, landlord_code)')
            .eq('management_company_id', staffPermission.management_company_id)
            .eq('landlord_id', this.profile.landlord_id)
            .eq('status', 'approved')
            .maybeSingle();

          if (landlordError || !landlordPermission) return false;

          this.managementContext.company = company;
          this.managementContext.relationships = [landlordPermission];
          this.managementContext.requests = [];
          this.managementContext.activeLandlordId = this.profile.landlord_id;
          this.permissions = this.permissionStateFromRow(staffPermission);
          return true;
        },

        async loadUnreadCount(profileId) {
          const { count, error } = await supabaseClient
            .from('notifications')
            .select('id', { count: 'exact', head: true })
            .eq('profile_id', profileId)
            .eq('is_read', false);

          if (!error) {
            this.unreadCount = count || 0;
          }
        },

        async refreshCurrentPage() {
          if (this.currentShell === 'super_admin') {
            await this.loadSuperAdminData();
            if (!this.admin.financeForm.paidAt) this.resetAdminFinanceForm();
            return;
          }

          if (this.currentShell === 'app') {
            if (this.currentPage === 'dashboard') await this.loadDashboardData();
          if (this.currentPage === 'properties') await this.loadPropertyUnitData();
            if (this.currentPage === 'tenants' || this.currentPage === 'leases') await this.loadTenantLeaseData();
            if (this.currentPage === 'payments') await this.loadPaymentsData();
            if (this.currentPage === 'finance') await this.loadLandlordFinanceData();
            if (this.currentPage === 'maintenance') await this.loadMaintenanceData();
            if (this.currentPage === 'staff') await this.loadStaffData();
            if (this.currentPage === 'notifications') await this.loadNotifications();
            if (this.currentPage === 'settings') this.loadSettingsData();
            if (this.currentPage === 'my-account') await this.loadMyAccountData();
            return;
          }

          if (this.currentShell === 'tenant') {
            if (this.currentPage === 'tenant-home' || this.currentPage === 'tenant-payments' || this.currentPage === 'tenant-maintenance') await this.loadTenantData();
            if (this.currentPage === 'tenant-notifications') await this.loadNotifications();
            if (this.currentPage === 'tenant-settings') this.loadSettingsData();
          }
        },

        async navigate(page) {
          if (!this.isPageAllowed(page)) return;

          this.currentPage = page;
          this.pageTitle = this.titleForPage(page);
          this.sidebarOpen = false;
          this.storeCurrentPage(page);

          if (page === 'dashboard' && this.currentShell === 'app') {
            await this.loadDashboardData();
          }

          if (page === 'properties' && this.currentShell === 'app') {
            await this.loadPropertyUnitData();
          }

          if ((page === 'tenants' || page === 'leases') && this.currentShell === 'app') {
            await this.loadTenantLeaseData();
          }

          if (page === 'payments' && this.currentShell === 'app') {
            await this.loadPaymentsData();
          }

          if (page === 'finance' && this.currentShell === 'app') {
            await this.loadLandlordFinanceData();
          }

          if ((page === 'admin-finance' || page === 'landlord-management' || page === 'admin-tenants' || page === 'admin-staff') && this.currentShell === 'super_admin') {
            if (!this.admin.financeForm.paidAt) this.resetAdminFinanceForm();
            await this.loadSuperAdminData();
          }

          if (page === 'maintenance' && this.currentShell === 'app') {
            await this.loadMaintenanceData();
          }

          if (page === 'staff' && this.currentShell === 'app') {
            await this.loadStaffData();
          }

          if (page === 'notifications' && this.currentShell === 'app') {
            await this.loadNotifications();
          }

          if (page === 'settings' && this.currentShell === 'app') {
            this.loadSettingsData();
          }

          if (page === 'my-account' && this.currentShell === 'app') {
            await this.loadMyAccountData();
          }

          if (this.currentShell === 'tenant') {
            if (page === 'tenant-home' || page === 'tenant-payments' || page === 'tenant-maintenance') {
              await this.loadTenantData();
            }

            if (page === 'tenant-notifications') {
              await this.loadNotifications();
            }

            if (page === 'tenant-settings') {
              this.loadSettingsData();
            }
          }
        },

        titleForPage(page) {
          const titles = {
            dashboard: 'Dashboard',
            properties: 'Properties',
            tenants: 'Tenants',
            leases: 'Leases',
            payments: 'Payments',
            finance: 'Finance',
            maintenance: 'Maintenance',
            staff: 'Staff',
            notifications: 'Notifications',
            'my-account': 'My Account',
            settings: 'Settings',
            'admin-finance': 'Finance',
            'admin-tenants': 'Tenant Management',
            'admin-staff': 'Staff Management',
            'landlord-management': 'Landlord Management',
            'tenant-home': 'Home',
            'tenant-payments': 'Payments',
            'tenant-maintenance': 'Maintenance',
            'tenant-notifications': 'Notifications',
            'tenant-settings': 'Settings'
          };

          return titles[page] || 'Mushavo';
        },

        async logout() {
          this.clearStoredPage();
          await supabaseClient.auth.signOut();
          this.resetSessionState();
        },

        resetSessionState() {
          this.stopUnreadRefresh();
          this.clearStoredPage();
          this.user = null;
          this.profile = null;
          this.subscription = null;
          this.permissions = {
            all_properties: false,
            property_ids: [],
            can_view_tenants: false,
            can_manage_maintenance: false,
            can_view_payments: false,
            can_verify_payments: false,
            can_manage_leases: false
          };
          this.unreadCount = 0;
          this.notifications.items = [];
          this.dashboard.stats = {
            properties: 0,
            units: 0,
            occupied: 0,
            vacant: 0,
            pendingSubmissions: 0,
            maintenanceTotal: 0,
            maintenanceOpen: 0,
            maintenanceInProgress: 0,
            maintenanceResolved: 0
          };
          this.dashboard.recentPayments = [];
          this.dashboard.leaseExpirations = [];
          this.dashboard.selectedPayment = null;
          this.finance = {
            loading: false,
            error: '',
            payments: [],
            byProperty: [],
            stats: {
              totalRevenue: 0,
              monthRevenue: 0,
              yearRevenue: 0,
              averagePayment: 0
            }
          };
          this.tenant = {
            loading: false,
            saving: false,
            error: '',
            tenantRows: [],
            tenantRow: null,
            activeLease: null,
            leases: [],
            payments: [],
            paymentSubmissions: [],
            maintenanceRequests: [],
            paymentForm: {
              amount: 0,
              rentPeriodKey: '',
              date: '',
              method: 'bank_transfer',
              reference: '',
              proofFile: null
            },
            maintenanceForm: {
              priority: 'medium',
              description: '',
              photoFile: null
            }
          };
          this.settings = {
            loading: false,
            savingProfile: false,
            savingPassword: false,
            error: '',
            message: '',
            profileForm: {
              fullName: '',
              phone: '',
              email: ''
            },
            passwordForm: {
              password: '',
              confirmPassword: ''
            }
          };
          this.currentShell = 'login';
          this.currentPage = 'dashboard';
          this.pageTitle = 'Dashboard';
          this.loginForm.password = '';
          this.booting = false;
        }
      };
    }
  </script>
</body>
