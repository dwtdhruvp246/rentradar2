        async loadPropertyUnitData() {
          this.propertyUnit.loading = true;
          this.propertyUnit.error = '';

          const canLoadTenants = this.profile?.role === 'landlord' || this.permissions.can_view_tenants || this.permissions.can_manage_leases;
          const canLoadLeases = this.profile?.role === 'landlord' || this.permissions.can_manage_leases || this.permissions.can_view_tenants || this.permissions.can_view_payments || this.permissions.can_verify_payments;
          const unitSelect = this.canViewFinancials()
            ? 'id, property_id, unit_number, bedrooms, bathrooms, monthly_rent, status, created_at, properties(id, name, address, city)'
            : 'id, property_id, unit_number, bedrooms, bathrooms, status, created_at, properties(id, name, address, city)';
          const leaseSelect = this.canViewFinancials()
            ? 'id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at, tenants(id, full_name, email, phone)'
            : 'id, unit_id, tenant_id, landlord_id, start_date, end_date, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at, tenants(id, full_name, email, phone)';
          const results = await Promise.all([
            supabaseClient.from('properties').select('id, landlord_id, name, address, city, created_at').is('archived_at', null).order('created_at', { ascending: false }),
            supabaseClient.from('units').select(unitSelect).is('archived_at', null).order('created_at', { ascending: false }),
            canLoadTenants
              ? supabaseClient.from('tenants').select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_accepted, created_at').is('archived_at', null).order('full_name', { ascending: true })
              : Promise.resolve({ data: [], error: null }),
            canLoadLeases
              ? supabaseClient.from('leases').select(leaseSelect).order('end_date', { ascending: true })
              : Promise.resolve({ data: [], error: null })
          ]);

          const [propertiesResult, unitsResult, tenantsResult, leasesResult] = results;
          const firstError = propertiesResult.error || unitsResult.error || tenantsResult.error || leasesResult.error;

          if (firstError) {
            this.propertyUnit.error = firstError.message;
          }

          this.propertyUnit.properties = propertiesResult.data || [];
          this.propertyUnit.units = (unitsResult.data || []).map(unit => ({
            ...unit,
            property: unit.properties || null
          }));
          this.propertyUnit.tenants = tenantsResult.data || [];
          this.propertyUnit.leases = (leasesResult.data || []).map(lease => ({
            ...lease,
            tenant: lease.tenants || null
          }));

          if (this.propertyUnit.selectedUnit) {
            const refreshedUnit = this.propertyUnit.units.find(unit => unit.id === this.propertyUnit.selectedUnit.id);
            this.propertyUnit.selectedUnit = refreshedUnit || null;
            if (refreshedUnit) await this.loadUnitDetail(refreshedUnit);

        async addProperty() {
          this.propertyUnit.error = '';
          this.propertyUnit.saving = true;

          if (this.profile?.role === 'landlord') {
            const propertyLimit = Number(this.subscription?.property_limit || 5);
            const activeCount = this.propertyUnit.properties.filter(property => property.landlord_id === this.currentLandlordId()).length;
            if (activeCount >= propertyLimit) {
              this.propertyUnit.error = `Property limit reached. Your current subscription allows ${propertyLimit} properties.`;
              this.propertyUnit.saving = false;
              return;
            }
          }

          const { error } = await supabaseClient
            .from('properties')
            .insert({
              landlord_id: this.currentLandlordId(),
              name: this.propertyUnit.propertyForm.name,
              address: this.propertyUnit.propertyForm.address,
              city: this.propertyUnit.propertyForm.city
            });

          if (error) {
            this.propertyUnit.error = error.message;
            this.propertyUnit.saving = false;
            return;
          }

          this.propertyUnit.propertyForm = { name: '', address: '', city: '' };
          this.propertyUnit.saving = false;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        async deleteProperty(property) {
          if (!property) return;
          const confirmed = await this.requestConfirm({
            title: 'Archive property',
            message: `Archive ${property.name}? It will be removed from active property lists, but units, leases, payments, and maintenance records will stay saved.`,
            confirmText: 'Archive'
          });
          if (!confirmed) return;

          this.propertyUnit.error = '';
          const propertyUnitIds = this.propertyUnit.units
            .filter(unit => unit.property_id === property.id)
            .map(unit => unit.id);

          if (propertyUnitIds.length > 0) {
            const { error: leaseError } = await supabaseClient
              .from('leases')
              .update({ status: 'terminated' })
              .in('unit_id', propertyUnitIds)
              .eq('status', 'active');

            if (leaseError) {
              this.propertyUnit.error = leaseError.message;
              return;
            }
          }

          const { error: unitError } = await supabaseClient
            .from('units')
            .update({
              status: 'vacant',
              archived_at: new Date().toISOString(),
              archived_by: this.profile.id
            })
            .eq('property_id', property.id);

          if (unitError) {
            this.propertyUnit.error = unitError.message;
            return;
          }

          const { error } = await supabaseClient
            .from('properties')
            .update({
              archived_at: new Date().toISOString(),
              archived_by: this.profile.id
            })
            .eq('id', property.id);

          if (error) {
            this.propertyUnit.error = error.message;
            return;
          }

          if (this.propertyUnit.selectedPropertyId === property.id) this.propertyUnit.selectedPropertyId = '';
          if (this.propertyUnit.unitForm.propertyId === property.id) this.propertyUnit.unitForm.propertyId = '';
          if (this.propertyUnit.selectedUnit?.property_id === property.id) this.propertyUnit.selectedUnit = null;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

          this.propertyUnit.saving = true;

              .update({ status: 'terminated' })
              .eq('id', activeLease.id);

            if (error) {
              this.propertyUnit.error = error.message;

          } else {
            const { error } = await supabaseClient
              .from('units')
              .update({ status: 'vacant' })

              this.propertyUnit.error = error.message;
              return;

              : Promise.resolve({ data: [], error: null }),

          const unit = this.propertyUnit.selectedUnit;
          if (!unit) return;

          try {
            if (this.propertyUnit.currentLease) {
              const { error: updateError } = await supabaseClient
                .from('leases')
                .update({ status: 'terminated' })
                .eq('id', this.propertyUnit.currentLease.id);

              if (updateError) throw updateError;

            await this.createLease({

              endDate: this.propertyUnit.assignForm.endDate,
              monthlyRent: this.propertyUnit.assignForm.rent,
              depositAmount: this.propertyUnit.assignForm.depositAmount,
              depositPaid: this.propertyUnit.assignForm.depositPaid
            });

            this.propertyUnit.detailMode = '';

          }

        prepareUnitPayment() {
          if (!this.canVerifyPayments()) return;

          if (!this.propertyUnit.currentLease) {
            this.propertyUnit.error = 'A unit needs an active lease before a payment can be logged.';
            return;
          }

          this.propertyUnit.detailMode = 'payment';
          this.propertyUnit.paymentForm = {
            amount: Number(this.propertyUnit.currentLease.monthly_rent || 0),
            rentPeriodKey: '',
            date: this.toIsoDate(new Date()),
            method: 'cash',
            notes: '',
            proofFile: null
          };
          this.propertyUnit.paymentForm.rentPeriodKey = this.defaultRentPeriodKey('unitPayment');
          this.syncPaymentPeriodAmount('unitPayment');
          if (this.$refs.unitPaymentProofInput) this.$refs.unitPaymentProofInput.value = '';
        },

        async logPaymentForSelectedUnit() {
          if (!this.canVerifyPayments()) return;
          if (!this.propertyUnit.currentLease) return;
          const selectedPeriod = this.selectedPaymentPeriod('unitPayment');
          if (!selectedPeriod) {
            this.propertyUnit.error = 'Select what month this rent payment is for.';
            return;
          }

          const { data: paymentRows, error } = await supabaseClient
            .from('payments')
            .insert({
              lease_id: this.propertyUnit.currentLease.id,
              submission_id: null,
              amount_paid: Number(this.propertyUnit.paymentForm.amount || 0),
              payment_date: this.propertyUnit.paymentForm.date,
              payment_method: this.propertyUnit.paymentForm.method,
              rent_period_start: selectedPeriod.start,
              rent_period_end: selectedPeriod.end,
              rent_period_label: selectedPeriod.saveLabel,
              notes: this.propertyUnit.paymentForm.notes || null,
              recorded_by: this.profile.id
            })
            .select('id')
            .limit(1);

          if (error) {
            this.propertyUnit.error = error.message;
            return;
          }

          const paymentRow = paymentRows?.[0] || null;
          if (this.propertyUnit.paymentForm.proofFile && paymentRow?.id) {
            try {
              await this.attachPaymentRecordProof(paymentRow, this.propertyUnit.paymentForm.proofFile, this.currentLandlordId());
            } catch (proofError) {
              this.propertyUnit.detailMode = '';
              await this.loadUnitDetail(this.propertyUnit.selectedUnit);
              await this.loadDashboardData();
              this.propertyUnit.error = `Payment saved, but proof upload failed: ${proofError.message}`;
              return;
            }
          }

          this.propertyUnit.detailMode = '';
          await this.loadUnitDetail(this.propertyUnit.selectedUnit);
          await this.loadDashboardData();
          if (this.currentPage === 'payments') await this.loadPaymentsData();
        },

        normalizeLease(lease) {
          if (!lease) return null;
          return {
            ...lease,
            tenant: lease.tenant || lease.tenants || null,
            unit: lease.unit || lease.units || null
          };
        },

        normalizePayment(payment, recordedByMap = new Map()) {
          const lease = this.normalizeLease(payment.leases || payment.lease || null);
          return {
            ...payment,
            lease,
            recordedByName: recordedByMap.get(payment.recorded_by) || (payment.recorded_by === this.profile?.id ? this.profile.full_name : '')
          };
        },

        normalizeSubmission(submission) {
          return {
            ...submission,
            tenant: submission.tenants || null,
            lease: this.normalizeLease(submission.leases || null)
          };
        },

        async loadPaymentsData() {
          if (!this.canViewPayments()) return;

          this.payments.loading = true;
          this.payments.error = '';

          const [pendingResult, verifiedResult, leasesResult] = await Promise.all([
            supabaseClient
              .from('payment_submissions')

        async loadLandlordFinanceData() {
          if (!this.canViewFinancials()) return;

          this.finance.loading = true;
          this.finance.error = '';

          const { data, error } = await supabaseClient
            .from('payments')
            .select('id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, notes, receipt_number, created_at, leases(id, tenants(id, full_name, email), units(id, unit_number, properties(id, name, address, city)))')
            .order('payment_date', { ascending: false });

          if (error) {
            this.finance.error = error.message;
            this.finance.loading = false;
            return;
          }

          const payments = (data || []).map(payment => {
            const lease = payment.leases || {};
            const unit = lease.units || {};
            const property = unit.properties || {};
            return {
              id: payment.id,
              amount: Number(payment.amount_paid || 0),
              date: payment.payment_date || payment.created_at,
              method: payment.payment_method,
              period: this.paymentPeriodLabel(payment),
              notes: payment.notes || '',
              receipt: payment.receipt_number,
              tenant: lease.tenants?.full_name || '-',
              unit: unit.unit_number || '-',
              property: property.name || 'Unassigned property',
              propertyAddress: [property.address, property.city].filter(Boolean).join(', ')
            };
          });

          const now = new Date();
          const monthKey = now.toISOString().slice(0, 7);
          const yearKey = String(now.getFullYear());
          const totalRevenue = payments.reduce((sum, payment) => sum + payment.amount, 0);
          const byPropertyMap = new Map();
          payments.forEach(payment => {
            const current = byPropertyMap.get(payment.property) || { property: payment.property, count: 0, total: 0 };
            current.count += 1;
            current.total += payment.amount;
            byPropertyMap.set(payment.property, current);
          });

          this.finance.payments = payments;
          this.finance.byProperty = Array.from(byPropertyMap.values()).sort((a, b) => b.total - a.total);
          this.finance.stats = {
            totalRevenue,
            monthRevenue: payments.filter(payment => String(payment.date || '').slice(0, 7) === monthKey).reduce((sum, payment) => sum + payment.amount, 0),
            yearRevenue: payments.filter(payment => String(payment.date || '').slice(0, 4) === yearKey).reduce((sum, payment) => sum + payment.amount, 0),
            averagePayment: payments.length ? totalRevenue / payments.length : 0
          };
          this.finance.loading = false;
        },

        financePropertyOptions() {
          return [...new Set((this.finance.payments || []).map(payment => payment.property).filter(Boolean))].sort();
        },

        filteredFinancePayments() {
          const filters = this.finance.filters || {};
          const search = String(filters.search || '').toLowerCase();
          return (this.finance.payments || []).filter(payment => {
            if (filters.property && payment.property !== filters.property) return false;
            if (filters.startDate && String(payment.date || '').slice(0, 10) < filters.startDate) return false;
            if (filters.endDate && String(payment.date || '').slice(0, 10) > filters.endDate) return false;
            if (search) {
              const haystack = [payment.tenant, payment.unit, payment.property, payment.period, payment.receipt, payment.notes, payment.method].join(' ').toLowerCase();
              if (!haystack.includes(search)) return false;
            }
            return true;
          });
        },

        filteredFinanceSummary() {
          const payments = this.filteredFinancePayments();
          const now = new Date();
          const monthKey = now.toISOString().slice(0, 7);
          const yearKey = String(now.getFullYear());
          const totalRevenue = payments.reduce((sum, payment) => sum + Number(payment.amount || 0), 0);
          return {
            totalRevenue,
            monthRevenue: payments.filter(payment => String(payment.date || '').slice(0, 7) === monthKey).reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
            yearRevenue: payments.filter(payment => String(payment.date || '').slice(0, 4) === yearKey).reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
            averagePayment: payments.length ? totalRevenue / payments.length : 0
          };
        },

        filteredFinanceByProperty() {
          const byPropertyMap = new Map();
          this.filteredFinancePayments().forEach(payment => {
            const current = byPropertyMap.get(payment.property) || { property: payment.property, count: 0, total: 0 };
            current.count += 1;
            current.total += Number(payment.amount || 0);
            byPropertyMap.set(payment.property, current);
          });
          return Array.from(byPropertyMap.values()).sort((a, b) => b.total - a.total);
        },

        financeChartBars() {
          const byMonth = new Map();
          this.filteredFinancePayments().forEach(payment => {
            const month = String(payment.date || '').slice(0, 7);
            if (!month) return;
            byMonth.set(month, (byMonth.get(month) || 0) + Number(payment.amount || 0));
          });
          const rows = Array.from(byMonth.entries())
            .sort(([a], [b]) => a.localeCompare(b))
            .slice(-12)
            .map(([month, total]) => ({ month, total }));
          const max = Math.max(...rows.map(row => row.total), 0);
          return rows.map(row => ({
            ...row,
            label: row.month,
            height: max > 0 ? Math.max(8, Math.round((row.total / max) * 100)) : 0
          }));
        },

        downloadFinanceCsv() {
          const rows = this.filteredFinancePayments();
          if (rows.length === 0) return;
          const headers = ['Date', 'Property', 'Unit', 'Tenant', 'Period', 'Amount', 'Method', 'Receipt', 'Notes'];
          const escapeCell = value => `"${String(value ?? '').replace(/"/g, '""')}"`;
          const csv = [
            headers.map(escapeCell).join(','),
            ...rows.map(row => [
              row.date,
              row.property,
              row.unit,
              row.tenant,
              row.period,
              row.amount,
              row.method,
              row.receipt,
              row.notes
            ].map(escapeCell).join(','))
          ].join('\n');
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `mushavo-finance-${this.toIsoDate(new Date())}.csv`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        },

        paymentUnitLabel(row) {
          const lease = row.lease || this.normalizeLease(row.leases || null);
          return lease?.unit?.unit_number || '-';
        },

        manualLeaseLabel(lease) {
          const tenant = lease?.tenant?.full_name || '-';
          const unit = lease?.unit?.unit_number || '-';
          const property = lease?.unit?.properties?.name || lease?.unit?.property?.name || '-';
          return `${tenant} - ${property} / Unit ${unit} - ${this.formatCurrency(lease?.monthly_rent)}`;
        },

        dateOnly(value) {
          if (!value) return null;
          const date = new Date(`${String(value).slice(0, 10)}T00:00:00`);
          return Number.isNaN(date.getTime()) ? null : date;
        },

        toIsoDate(date) {
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        },

        monthStart(value) {
          const date = value instanceof Date ? value : this.dateOnly(value);
          if (!date) return null;
          return new Date(date.getFullYear(), date.getMonth(), 1);
        },

        monthEnd(monthStart) {
          return new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 0);
        },

        addMonths(date, count) {
          return new Date(date.getFullYear(), date.getMonth() + count, 1);
        },

        monthKey(value) {
          const start = this.monthStart(value);
          return start ? this.toIsoDate(start).slice(0, 7) : '';
        },

        rentPeriodBaseLabel(startDate) {
          const date = this.monthStart(startDate);
          if (!date) return '-';
          return new Intl.DateTimeFormat(undefined, { month: 'long', year: 'numeric' }).format(date);
        },

        paymentPeriodLabel(row) {
          if (row?.rent_period_label) return row.rent_period_label;
          if (row?.rent_period_start) return `${this.rentPeriodBaseLabel(row.rent_period_start)} rent`;
          if (row?.payment_date) return `${this.rentPeriodBaseLabel(row.payment_date)} rent`;
          return '-';
        },

        buildRentPeriodOptions(lease, payments = [], submissions = []) {
          if (!lease?.start_date) return [];

          const leaseStart = this.monthStart(lease.start_date);
          const leaseEnd = lease.end_date ? this.monthStart(lease.end_date) : null;
          const currentMonth = this.monthStart(new Date());
          if (!leaseStart || !currentMonth) return [];

          const monthlyRent = Number(lease.monthly_rent || 0);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const lastDueMonth = leaseEnd && leaseEnd < currentMonth ? leaseEnd : currentMonth;
          const coveredByMonth = new Map();

          payments
            .filter(payment => payment.lease_id === lease.id)
            .forEach(payment => {
              const key = this.monthKey(payment.rent_period_start || payment.payment_date);
              if (!key) return;
              coveredByMonth.set(key, (coveredByMonth.get(key) || 0) + Number(payment.amount_paid || 0));
            });

          submissions
            .filter(submission => submission.lease_id === lease.id && submission.status === 'pending')
            .forEach(submission => {
              const key = this.monthKey(submission.rent_period_start || submission.payment_date);
              if (!key) return;
              coveredByMonth.set(key, (coveredByMonth.get(key) || 0) + Number(submission.amount_claimed || 0));
            });

          const options = [];
          for (let cursor = leaseStart; cursor <= lastDueMonth; cursor = this.addMonths(cursor, 1)) {
            const key = this.toIsoDate(cursor);
            const covered = coveredByMonth.get(key.slice(0, 7)) || 0;
            if (monthlyRent && covered >= monthlyRent - 0.005) continue;

            const periodEnd = this.monthEnd(cursor);
            const status = periodEnd < today ? 'overdue' : 'current';
            const baseLabel = `${this.rentPeriodBaseLabel(cursor)} rent`;
            options.push({
              key,
              start: key,
              end: this.toIsoDate(periodEnd),
              label: `${baseLabel} - ${status}`,
              saveLabel: baseLabel,
              amount: monthlyRent,
              status
            });
          }

          const advanceStart = this.addMonths(currentMonth, 1);
          const advanceKey = this.toIsoDate(advanceStart);
          const advanceCovered = coveredByMonth.get(advanceKey.slice(0, 7)) || 0;
          if ((!leaseEnd || advanceStart <= leaseEnd) && (!monthlyRent || advanceCovered < monthlyRent - 0.005)) {
            const baseLabel = `${this.rentPeriodBaseLabel(advanceStart)} rent`;
            options.push({
              key: advanceKey,
              start: advanceKey,
              end: this.toIsoDate(this.monthEnd(advanceStart)),
              label: `${baseLabel} - advance`,
              saveLabel: baseLabel,
              amount: monthlyRent,
              status: 'advance'
            });
          }

          return options;
        },

        unitPaymentPeriodOptions() {
          return this.buildRentPeriodOptions(this.propertyUnit.currentLease, this.propertyUnit.payments);
        },

        manualPaymentPeriodOptions() {
          const lease = this.payments.leases.find(row => row.id === this.payments.manualForm.leaseId);
          return this.buildRentPeriodOptions(lease, this.payments.verifiedPayments, this.payments.pendingSubmissions);
        },

        tenantPaymentPeriodOptions() {
          return this.buildRentPeriodOptions(this.tenant.activeLease, this.tenant.payments, this.tenant.paymentSubmissions);
        },

        selectedPaymentPeriod(scope) {
          const config = {
            unitPayment: { form: this.propertyUnit.paymentForm, options: this.unitPaymentPeriodOptions() },
            manualPayment: { form: this.payments.manualForm, options: this.manualPaymentPeriodOptions() },
            tenantPayment: { form: this.tenant.paymentForm, options: this.tenantPaymentPeriodOptions() }
          }[scope];
          if (!config) return null;
          return config.options.find(option => option.key === config.form.rentPeriodKey) || null;
        },

        syncPaymentPeriodAmount(scope) {
          const selected = this.selectedPaymentPeriod(scope);
          if (!selected) return;
          if (scope === 'unitPayment') this.propertyUnit.paymentForm.amount = selected.amount;
          if (scope === 'manualPayment') this.payments.manualForm.amount = selected.amount;
          if (scope === 'tenantPayment') this.tenant.paymentForm.amount = selected.amount;
        },

        defaultRentPeriodKey(scope) {
          const options = {
            unitPayment: this.unitPaymentPeriodOptions(),
            manualPayment: this.manualPaymentPeriodOptions(),
            tenantPayment: this.tenantPaymentPeriodOptions()
          }[scope] || [];
          return options[0]?.key || '';
        },

        openManualPaymentModal() {
          this.payments.error = '';
          this.payments.modal = 'manual';
          this.payments.manualForm = {
            leaseId: '',
            amount: 0,
            rentPeriodKey: '',
            date: this.toIsoDate(new Date()),
            method: 'cash',
            notes: '',
            proofFile: null
          };
          if (this.$refs.manualPaymentProofInput) this.$refs.manualPaymentProofInput.value = '';
        },

        closePaymentModal() {
          this.payments.modal = '';
          this.payments.selectedSubmission = null;
          this.payments.rejectForm = { reason: '' };
          this.payments.manualForm.proofFile = null;
          if (this.$refs.manualPaymentProofInput) this.$refs.manualPaymentProofInput.value = '';
          this.payments.saving = false;
        },

        handleManualPaymentLeaseChange() {
          const lease = this.payments.leases.find(row => row.id === this.payments.manualForm.leaseId);
          if (lease) this.payments.manualForm.amount = Number(lease.monthly_rent || 0);
          this.payments.manualForm.rentPeriodKey = this.defaultRentPeriodKey('manualPayment');
          this.syncPaymentPeriodAmount('manualPayment');
        },

        async logManualPayment() {
          if (!this.canVerifyPayments()) return;

          this.payments.error = '';
          this.payments.saving = true;
          const selectedPeriod = this.selectedPaymentPeriod('manualPayment');
          if (!selectedPeriod) {
            this.payments.error = 'Select what month this rent payment is for.';
            this.payments.saving = false;
            return;
          }

          const { data: paymentRows, error } = await supabaseClient
            .from('payments')
            .insert({
              lease_id: this.payments.manualForm.leaseId,
              submission_id: null,
              amount_paid: Number(this.payments.manualForm.amount || 0),
              payment_date: this.payments.manualForm.date,
              payment_method: this.payments.manualForm.method,
              rent_period_start: selectedPeriod.start,
              rent_period_end: selectedPeriod.end,
              rent_period_label: selectedPeriod.saveLabel,
              notes: this.payments.manualForm.notes || null,
              recorded_by: this.profile.id
            })
            .select('id')
            .limit(1);

          if (error) {
            this.payments.error = error.message;
            this.payments.saving = false;
            return;
          }

          const paymentRow = paymentRows?.[0] || null;
          if (this.payments.manualForm.proofFile && paymentRow?.id) {
            try {
              await this.attachPaymentRecordProof(paymentRow, this.payments.manualForm.proofFile, this.currentLandlordId());
            } catch (proofError) {
              this.payments.activeTab = 'verified';
              this.closePaymentModal();
              await this.loadPaymentsData();
              await this.loadDashboardData();
              this.payments.error = `Payment saved, but proof upload failed: ${proofError.message}`;
              return;
            }
          }

          this.closePaymentModal();
          this.payments.activeTab = 'verified';
          await this.loadPaymentsData();
          await this.loadDashboardData();
        },

        async approvePaymentSubmission(submission) {
          if (!this.canVerifyPayments()) return;

          this.payments.error = '';
          this.payments.saving = true;

          const { error } = await supabaseClient.rpc('accept_payment_submission', {
            p_submission_id: submission.id
          });

          if (error) {
            this.payments.error = error.message;
            this.payments.saving = false;
            return;
          }

          this.payments.saving = false;
          this.payments.activeTab = 'verified';
          await this.loadPaymentsData();
          await this.loadDashboardData();
        },

        openRejectPaymentModal(submission) {
          if (!this.canVerifyPayments()) return;
          this.payments.error = '';
          this.payments.selectedSubmission = submission;
          this.payments.rejectForm = { reason: '' };
          this.payments.modal = 'reject';
        },

        async rejectPaymentSubmission() {
          if (!this.canVerifyPayments() || !this.payments.selectedSubmission) return;

          this.payments.error = '';
          this.payments.saving = true;

          const { error } = await supabaseClient
            .from('payment_submissions')
            .update({
              status: 'rejected',
              rejection_reason: this.payments.rejectForm.reason,
              reviewed_by: this.profile.id,
              reviewed_at: new Date().toISOString()
            })
            .eq('id', this.payments.selectedSubmission.id);

          if (error) {
            this.payments.error = error.message;
            this.payments.saving = false;
            return;
          }

          this.closePaymentModal();
          await this.loadPaymentsData();
          await this.loadDashboardData();
        },

        async paymentForReceipt(payment, leaseContext = null) {
          let normalized = this.normalizePayment({
            ...payment,
            lease: leaseContext || payment.lease || payment.leases || null
          });

          if (!normalized.lease && payment.id) {
            const { data, error } = await supabaseClient
              .from('payments')
              .select('id, lease_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, notes, receipt_number, recorded_by, created_at, leases(id, monthly_rent, tenants(id, full_name, email), units(id, unit_number, property_id, properties(id, name, address, city)))')
              .eq('id', payment.id)
              .maybeSingle();

            if (error) throw error;
            normalized = this.normalizePayment(data || payment);
          }

          if (leaseContext && !normalized.lease?.unit && this.propertyUnit.selectedUnit) {
            normalized.lease = {
              ...normalized.lease,
              unit: {
                ...this.propertyUnit.selectedUnit,
                properties: this.propertyUnit.selectedUnit.property || this.propertyUnit.properties.find(property => property.id === this.propertyUnit.selectedUnit.property_id) || null
              }
            };
          }

          return normalized;
        },

        async downloadReceipt(payment, leaseContext = null) {
          this.payments.error = '';

          try {
            const receiptPayment = await this.paymentForReceipt(payment, leaseContext);
            const lease = receiptPayment.lease || {};
            const unit = lease.unit || {};
            const property = unit.properties || unit.property || {};
            const tenant = lease.tenant || {};
            const landlordName = this.profile?.role === 'landlord' ? this.profile.full_name : this.profile?.landlord_name || 'Landlord';
            const amountPaid = Number(receiptPayment.amount_paid || 0);
            const monthlyRent = Number(lease.monthly_rent || 0);
            const remainingBalance = Math.max(monthlyRent - amountPaid, 0);
            const receiptNumber = receiptPayment.receipt_number || `RR-${receiptPayment.id?.slice(0, 8) || Date.now()}`;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(20);
            doc.text('Mushavo', 20, 22);
            doc.setFontSize(13);
            doc.text('Payment Receipt', 20, 32);

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.text(`Receipt Number: ${receiptNumber}`, 140, 22);
            doc.text(`Date: ${this.formatDate(receiptPayment.payment_date)}`, 140, 29);

            doc.setDrawColor(16, 185, 129);
            doc.setLineWidth(0.8);
            doc.line(20, 40, 190, 40);

            const rows = [
              ['Landlord', landlordName || '-'],
              ['Tenant', tenant.full_name || '-'],
              ['Unit', unit.unit_number || '-'],
              ['Property Address', [property.name, property.address, property.city].filter(Boolean).join(', ') || '-'],
              ['Amount Paid', this.formatCurrency(amountPaid)],
              ['Rent Period', this.paymentPeriodLabel(receiptPayment)],
              ['Method', this.titleCase(receiptPayment.payment_method)],
              ['Remaining Balance', this.formatCurrency(remainingBalance)]
            ];

            let y = 56;
            rows.forEach(([label, value]) => {
              doc.setFont('helvetica', 'bold');
              doc.text(`${label}:`, 20, y);
              doc.setFont('helvetica', 'normal');
              doc.text(String(value), 66, y, { maxWidth: 120 });
              y += label === 'Property Address' ? 14 : 10;
            });

            if (receiptPayment.notes) {
              doc.setFont('helvetica', 'bold');
              doc.text('Notes:', 20, y + 2);
              doc.setFont('helvetica', 'normal');
              doc.text(String(receiptPayment.notes), 66, y + 2, { maxWidth: 120 });
            }

            doc.setDrawColor(226, 232, 240);
            doc.line(20, 270, 190, 270);
            doc.setFontSize(11);
            doc.text('Thank you for your payment', 20, 280);
            doc.save(`${receiptNumber}.pdf`);
          } catch (error) {
            const message = error.message || 'Receipt could not be generated.';
            this.payments.error = message;
            this.propertyUnit.error = message;
            this.tenant.error = message;
          }
        },

        priorityBadgeClass(priority) {
          const classes = {
            low: 'bg-slate-100 text-slate-600',
            medium: 'bg-yellow-100 text-amber-700',
            high: 'bg-red-100 text-red-700'
          };
          return classes[priority] || 'bg-slate-100 text-slate-600';
        },

        async loadMaintenanceData() {
          if (this.profile?.role !== 'landlord' && !this.permissions.can_manage_maintenance) return;

          this.maintenance.loading = true;
          this.maintenance.error = '';

          const [requestsResult, propertiesResult, unitsResult, leasesResult, staffResult] = await Promise.all([

              .is('archived_at', null)
              .order('created_at', { ascending: false }),
            supabaseClient
              .from('properties')
              .select('id, name, address, city')
              .is('archived_at', null)
              .order('name', { ascending: true }),
            supabaseClient

                  accepted_at: permission.accepted_at || profile.created_at
                };
              });
            }
          }
          this.managementContext.loading = false;

        openStaffInviteModal() {
          this.staff.error = '';
          this.staff.generatedInviteLink = '';
          this.staff.selectedMember = null;
          this.staff.form = this.defaultStaffForm();
          this.staff.modal = 'invite';
        },

        openStaffPermissionsModal(member) {
          this.staff.error = '';
          this.staff.generatedInviteLink = '';
          this.staff.selectedMember = member;
          this.staff.form = this.staffFormFromMember(member);
          this.staff.modal = 'edit';
        },

        closeStaffModal() {
          this.staff.modal = '';
          this.staff.selectedMember = null;
          this.staff.saving = false;
        },

        async createStaffInvite() {
          this.staff.error = '';
          this.staff.saving = true;
          this.staff.generatedInviteLink = '';

          if (this.profile?.role === 'management_leader' && !this.managementContext.company?.id) {
            this.staff.error = 'Management company record not found.';
            this.staff.saving = false;
            return;
          }

          if (this.profile?.role === 'management_leader' && !this.currentLandlordId()) {
            this.staff.error = 'Connect to at least one landlord before inviting management staff.';
            this.staff.saving = false;
            return;
          }

          const token = this.generateSecureToken();
          const permissions = this.staffFormPayload();
          const metadata = {
            full_name: this.staff.form.fullName,
            phone: this.staff.form.phone || '',
            staff_type: this.profile?.role === 'management_leader' ? 'management' : 'landlord',
            management_company_id: this.profile?.role === 'management_leader' ? this.managementContext.company.id : null,
            ...permissions
          };

          const { error } = await supabaseClient
            .from('invite_tokens')
            .insert({
              token,
              email: this.staff.form.email,
              role: this.profile?.role === 'management_leader' ? 'management_staff' : 'staff',
              landlord_id: this.currentLandlordId(),
              metadata,
              expires_at: this.addHoursIso(48)
            });

          if (error) {
            this.staff.error = error.message;
            this.staff.saving = false;
            return;
          }

          this.staff.generatedInviteLink = this.buildInviteLink(token);
          this.closeStaffModal();
          await this.loadStaffData();
        },

        async saveStaffPermissions() {
          if (!this.staff.selectedMember) return;

          this.staff.error = '';
          this.staff.saving = true;
          const permissions = this.staffFormPayload();
          const member = this.staff.selectedMember;
          const validationError = this.staffAssignmentValidationError(member, permissions);

          if (validationError) {
            this.staff.error = validationError;
            this.staff.saving = false;
            return;
          }

          if (this.profile?.role === 'management_leader') {
            if (!member.accepted || !member.permission_id) {
              this.staff.error = 'Management staff invite permissions can be edited after the account is accepted.';
              this.staff.saving = false;
              return;
            }

            const { error } = await supabaseClient
              .from('management_staff_permissions')
              .update(permissions)
              .eq('id', member.permission_id)
              .eq('management_company_id', this.managementContext.company?.id);

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }

            this.closeStaffModal();
            await this.loadStaffData();
            return;
          }

          if (member.accepted) {
            const permissionPayload = {
              landlord_id: this.currentLandlordId(),
              staff_profile_id: member.profile_id,
              ...permissions
            };

            const saveQuery = member.permission_id
              ? supabaseClient.from('staff_permissions').update(permissions).eq('id', member.permission_id)
              : supabaseClient.from('staff_permissions').insert(permissionPayload);

            const { error } = await saveQuery;

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }
          } else {
            const metadata = {
              full_name: this.staff.form.fullName,
              phone: this.staff.form.phone || '',
              staff_type: member.staff_type || (this.profile?.role === 'management_leader' ? 'management' : 'landlord'),
              ...permissions
            };

            const { error } = await supabaseClient
              .from('invite_tokens')
              .update({ metadata })
              .eq('id', member.invite_id);

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }
          }

          this.closeStaffModal();
          await this.loadStaffData();
        },

        async approveStaffRequest(member) {
          if (!member?.request_id) return;
          this.staff.error = '';
          this.staff.saving = true;

          if (member.staff_type === 'freelancer' && this.externalAssignmentConflict({
            all_properties: Boolean(member.all_properties),
            property_ids: member.property_ids || []
          })) {
            this.staff.error = 'This property is already assigned to a management company or freelancer staff member. Remove that external assignment first.';
            this.staff.saving = false;
            return;
          }

          const { error } = await supabaseClient.rpc('approve_staff_landlord_request', {
            p_request_id: member.request_id
          });

          if (error) {
            this.staff.error = error.message;
            this.staff.saving = false;
            return;
          }

          this.staff.saving = false;
          await this.loadStaffData();
        },

            this.staff.saving = false;

        async rejectManagementRequest(request) {

        async removeStaff(member) {
          const confirmed = await this.requestConfirm({
            title: member.invite_id && !member.accepted ? 'Delete staff invite' : 'Remove staff access',
            message: member.invite_id && !member.accepted
              ? `Delete the invite for ${member.full_name || member.email}? The invite link will stop working.`
              : this.profile?.role === 'management_leader'
              ? `Permanently delete ${member.full_name || member.email} from this management company? Their management staff login will be removed.`
              : `Remove ${member.full_name || member.email} from this landlord? Their staff login will stay available for other landlords.`,
            confirmText: member.invite_id && !member.accepted ? 'Delete Invite' : 'Remove'
          });
          if (!confirmed) return;

          this.staff.error = '';
          this.staff.saving = true;

          if (this.profile?.role === 'management_leader') {
            const { error } = await supabaseClient.rpc('permanently_delete_management_staff_account', {
              p_profile_id: member.profile_id
            });

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }

            this.staff.saving = false;
            await this.loadStaffData();
            return;
          }

          if (member.accepted) {
            const { error } = await supabaseClient.rpc('delete_staff_account', {
              p_profile_id: member.profile_id
            });

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }
          } else {
            const { error } = await supabaseClient
              .from('invite_tokens')
              .delete()
              .eq('id', member.invite_id);

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }
          }

          this.staff.saving = false;
          await this.loadStaffData();
          await this.loadMaintenanceData();
        },

        async loadTenantData() {
          if (this.profile?.role !== 'tenant') return;

          this.tenant.loading = true;
          this.tenant.error = '';

          const { error: linkError } = await supabaseClient.rpc('link_current_tenant_account');

          if (linkError) {
            this.tenant.error = linkError.message;
            this.tenant.loading = false;
            return;
          }

          const { data: tenantRows, error: tenantError } = await supabaseClient
            .from('tenants')
            .select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_accepted, created_at')
            .eq('profile_id', this.profile.id)
            .is('archived_at', null)
            .order('created_at', { ascending: false });

          if (tenantError) {
            this.tenant.error = tenantError.message;
            this.tenant.loading = false;
            return;
          }

          this.tenant.tenantRows = tenantRows || [];

          if (this.tenant.tenantRows.length === 0) {
            this.tenant.tenantRow = null;
            this.tenant.activeLease = null;
            this.tenant.leases = [];
            this.tenant.payments = [];
            this.tenant.paymentSubmissions = [];
            this.tenant.maintenanceRequests = [];
            this.tenant.contacts = [];
            this.tenant.error = 'No tenant record is linked to this account yet.';
            this.tenant.loading = false;
            return;
          }

          const tenantIds = this.tenant.tenantRows.map(row => row.id);
          const { data: leases, error: leaseError } = await supabaseClient
            .from('leases')
            .select('id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at, units(id, unit_number, property_id, properties(id, name, address, city))')
            .in('tenant_id', tenantIds)
            .order('created_at', { ascending: false });

          if (leaseError) {
            this.tenant.error = leaseError.message;
            this.tenant.loading = false;
            return;
          }

          this.tenant.leases = (leases || []).map(lease => this.normalizeLease(lease));
          this.tenant.activeLease = this.tenant.leases.find(lease => lease.status === 'active') || this.tenant.leases[0] || null;
          this.tenant.tenantRow = this.tenant.tenantRows.find(row => row.id === this.tenant.activeLease?.tenant_id) || this.tenant.tenantRows[0] || null;
          this.tenant.contacts = [];
          if (this.tenant.activeLease?.unit_id) {
            const { data: contacts, error: contactsError } = await supabaseClient.rpc('tenant_unit_contacts', {
              p_unit_id: this.tenant.activeLease.unit_id
            });
            if (!contactsError) this.tenant.contacts = contacts || [];
          }
          const leaseIds = this.tenant.leases.map(lease => lease.id);

          if (leaseIds.length === 0) {
            this.tenant.payments = [];
            this.tenant.paymentSubmissions = [];
            this.tenant.maintenanceRequests = [];
            this.tenant.contacts = [];
            this.tenant.loading = false;
            return;
          }

          const [paymentsResult, submissionsResult, maintenanceResult] = await Promise.all([
            supabaseClient
              .from('payments')
              .select('id, lease_id, submission_id, amount_paid, payment_date, payment_method, notes, receipt_number, recorded_by, created_at, leases(id, monthly_rent, tenants(id, full_name, email), units(id, unit_number, property_id, properties(id, name, address, city)))')
              .in('lease_id', leaseIds)
              .order('payment_date', { ascending: false }),
            supabaseClient
              .from('payment_submissions')
              .select('id, lease_id, tenant_id, amount_claimed, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, reference_note, proof_image_url, proof_image_path, proof_image_name, proof_image_size, proof_image_uploaded_by, proof_image_uploaded_at, status, rejection_reason, reviewed_at, created_at')
              .in('lease_id', leaseIds)
              .order('created_at', { ascending: false }),
            supabaseClient
              .from('maintenance_requests')
              .select('id, unit_id, lease_id, landlord_id, submitted_by_profile_id, description, photo_url, photo_path, photo_name, photo_size, photo_uploaded_by, photo_uploaded_at, status, priority, resolution_notes, created_at, resolved_at')
              .in('lease_id', leaseIds)
              .is('archived_at', null)
              .order('created_at', { ascending: false })
          ]);

          const firstError = paymentsResult.error || submissionsResult.error || maintenanceResult.error;
          if (firstError) {
            this.tenant.error = firstError.message;
            this.tenant.loading = false;
            return;
          }

          this.tenant.payments = (paymentsResult.data || []).map(payment => this.normalizePayment(payment));
          this.tenant.paymentSubmissions = submissionsResult.data || [];
          this.tenant.maintenanceRequests = maintenanceResult.data || [];
          this.resetTenantForms();
          this.tenant.loading = false;
        },

        resetTenantForms() {
          this.tenant.paymentForm = {
            amount: Number(this.tenant.activeLease?.monthly_rent || 0),
            rentPeriodKey: '',
            date: this.toIsoDate(new Date()),
            method: 'bank_transfer',
            reference: '',
            proofFile: null
          };
          this.tenant.paymentForm.rentPeriodKey = this.defaultRentPeriodKey('tenantPayment');
          this.syncPaymentPeriodAmount('tenantPayment');
          this.tenant.maintenanceForm = {
            priority: 'medium',
            description: '',
            photoFile: null
          };
          if (this.$refs.tenantPaymentProofInput) this.$refs.tenantPaymentProofInput.value = '';
          if (this.$refs.tenantMaintenancePhotoInput) this.$refs.tenantMaintenancePhotoInput.value = '';
        },

        tenantHomeSubtitle() {
          if (!this.tenant.activeLease) return 'No active lease is linked yet.';
          return `${this.tenantPropertyLabel()} / Unit ${this.tenantUnitLabelFromActiveLease()}`;
        },

        tenantUnitFromActiveLease() {
          return this.tenant.activeLease?.unit || this.tenant.activeLease?.units || null;
        },

        tenantPropertyFromActiveLease() {
          const unit = this.tenantUnitFromActiveLease();
          return unit?.properties || unit?.property || null;
        },

        tenantUnitLabelFromActiveLease() {
          return this.tenantUnitFromActiveLease()?.unit_number || '-';
        },

        tenantPropertyLabel() {
          return this.tenantPropertyFromActiveLease()?.name || '-';
        },

        tenantPropertyAddress() {
          const property = this.tenantPropertyFromActiveLease();
          return [property?.address, property?.city].filter(Boolean).join(', ') || '-';
        },

        tenantCurrentBalance() {
          const activeLease = this.tenant.activeLease;
          if (!activeLease) return 0;

          const monthPrefix = new Date().toISOString().slice(0, 7);
          const paidThisMonth = this.tenant.payments
            .filter(payment => payment.lease_id === activeLease.id && String(payment.payment_date || '').startsWith(monthPrefix))
            .reduce((sum, payment) => sum + Number(payment.amount_paid || 0), 0);
          return Math.max(Number(activeLease.monthly_rent || 0) - paidThisMonth, 0);
        },

        async submitTenantPayment() {
          const lease = this.tenant.activeLease;
          const tenantRow = this.tenant.tenantRow;
          if (!lease || !tenantRow) {
            this.tenant.error = 'A current lease is required before submitting payment.';
            return;
          }

          this.tenant.error = '';
          this.tenant.saving = true;
          const selectedPeriod = this.selectedPaymentPeriod('tenantPayment');
          if (!selectedPeriod) {
            this.tenant.error = 'Select what month this rent payment is for.';
            this.tenant.saving = false;
            return;
          }

          const proofFile = this.tenant.paymentForm.proofFile;
          const { data: submissionRow, error } = await supabaseClient
            .from('payment_submissions')
            .insert({
              lease_id: lease.id,
              tenant_id: tenantRow.id,
              amount_claimed: Number(this.tenant.paymentForm.amount || 0),
              payment_date: this.tenant.paymentForm.date,
              payment_method: this.tenant.paymentForm.method,
              rent_period_start: selectedPeriod.start,
              rent_period_end: selectedPeriod.end,
              rent_period_label: selectedPeriod.saveLabel,
              reference_note: this.tenant.paymentForm.reference || null,
              status: 'pending'
            })
            .select('id')
            .single();

          if (error) {
            this.tenant.error = error.message;
            this.tenant.saving = false;
            return;
          }

          if (proofFile) {
            try {
              await this.attachPaymentProof(submissionRow, proofFile, lease.landlord_id);
            } catch (error) {
              this.tenant.error = `Payment was submitted, but the proof upload failed: ${error.message}`;
              this.tenant.saving = false;
              await this.loadTenantData();
              return;
            }
          }

          this.tenant.saving = false;
          await this.loadTenantData();
        },

        async submitTenantMaintenance() {
          const lease = this.tenant.activeLease;
          if (!lease) {
            this.tenant.error = 'A current lease is required before submitting maintenance.';
            return;
          }

          this.tenant.error = '';
          this.tenant.saving = true;

          const photoFile = this.tenant.maintenanceForm.photoFile;
          const { data: requestRow, error } = await supabaseClient
            .from('maintenance_requests')
            .insert({
              unit_id: lease.unit_id,
              lease_id: lease.id,
              landlord_id: lease.landlord_id,
              submitted_by_profile_id: this.profile.id,
              assigned_to_staff_id: null,
              description: this.tenant.maintenanceForm.description,
              status: 'open',
              priority: this.tenant.maintenanceForm.priority,
              resolution_notes: null
            })
            .select('id, landlord_id')
            .single();

          if (error) {
            this.tenant.error = error.message;
            this.tenant.saving = false;
            return;
          }

          if (photoFile) {
            try {
              await this.attachMaintenancePhoto(requestRow, photoFile);
            } catch (error) {
