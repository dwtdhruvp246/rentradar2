        },

        manualLeaseLabel(lease) {
          const tenant = lease?.tenant?.full_name || '-';
          const unit = lease?.unit?.unit_number || '-';
          const property = lease?.unit?.properties?.name || lease?.unit?.property?.name || '-';
          return `${tenant} - ${property} / Unit ${unit} - ${this.formatCurrency(lease?.monthly_rent)}`;
        },

        dateOnly(value) {
          if (!value) return null;
          const date = new Date(`${String(value).slice(0, 10)}T00:00:00`);
          return Number.isNaN(date.getTime()) ? null : date;
        },

        toIsoDate(date) {
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        },

        monthStart(value) {
          const date = value instanceof Date ? value : this.dateOnly(value);
          if (!date) return null;
          return new Date(date.getFullYear(), date.getMonth(), 1);
        },

        monthEnd(monthStart) {
          return new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 0);
        },

        addMonths(date, count) {
          return new Date(date.getFullYear(), date.getMonth() + count, 1);
        },

        monthKey(value) {
          const start = this.monthStart(value);
          return start ? this.toIsoDate(start).slice(0, 7) : '';
        },

        rentPeriodBaseLabel(startDate) {
          const date = this.monthStart(startDate);
          if (!date) return '-';
          return new Intl.DateTimeFormat(undefined, { month: 'long', year: 'numeric' }).format(date);
        },

        paymentPurpose(row) {
          const purpose = String(row?.payment_purpose || row?.purpose || '').trim().toLowerCase();
          if (purpose) return purpose;
          return row?.rent_period_start ? 'rent' : 'other';
        },

        paymentLikeAmount(row) {
          return Number(row?.amount_paid ?? row?.amount_claimed ?? row?.amount ?? 0);
        },

        isRentPayment(row) {
          const label = String(row?.rent_period_label || row?.period || '').trim();
          return this.paymentPurpose(row) === 'rent' && !/^other(?::|$)/i.test(label) && !/^deposit\b/i.test(label);
        },

        isDepositPayment(row) {
          const label = String(row?.rent_period_label || row?.period || '').trim();
          return this.paymentPurpose(row) === 'deposit' || /^deposit\b/i.test(label);
        },

        isRevenuePayment(row) {
          return this.isRentPayment(row);
        },

        leaseDepositDue(lease, payments = [], submissions = []) {
          if (!lease || Boolean(lease.deposit_paid)) return 0;
          const depositAmount = Number(lease.deposit_amount || 0);
          if (depositAmount <= 0) return 0;

          const paidDeposit = (payments || [])
            .filter(payment => payment.lease_id === lease.id && this.isDepositPayment(payment))
            .reduce((sum, payment) => sum + this.paymentLikeAmount(payment), 0);
          const pendingDeposit = (submissions || [])
            .filter(submission => submission.lease_id === lease.id && submission.status === 'pending' && this.isDepositPayment(submission))
            .reduce((sum, submission) => sum + this.paymentLikeAmount(submission), 0);

          return Math.max(depositAmount - paidDeposit - pendingDeposit, 0);
        },

        paymentPeriodLabel(row) {
          if (row?.rent_period_label) return row.rent_period_label;
          if (this.isDepositPayment(row)) return 'Deposit';
          if (row?.rent_period_start) return `${this.rentPeriodBaseLabel(row.rent_period_start)} rent`;
          if (row?.payment_date) return `${this.rentPeriodBaseLabel(row.payment_date)} rent`;
          return '-';
        },

        buildRentPeriodOptions(lease, payments = [], submissions = [], config = {}) {
          if (!lease?.start_date) return [];

          const leaseStart = this.monthStart(lease.start_date);
          const leaseEnd = lease.end_date ? this.monthStart(lease.end_date) : null;
          const currentMonth = this.monthStart(new Date());
          if (!leaseStart || !currentMonth) return [];

          const monthlyRent = Number(lease.monthly_rent || 0);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const lastDueMonth = leaseEnd && leaseEnd < currentMonth ? leaseEnd : currentMonth;
          const coveredByMonth = new Map();

          payments
            .filter(payment => payment.lease_id === lease.id)
            .forEach(payment => {
              if (!this.isRentPayment(payment)) return;
              if (!payment.rent_period_start && /^other:/i.test(String(payment.rent_period_label || ''))) return;
              const key = this.monthKey(payment.rent_period_start || payment.payment_date);
              if (!key) return;
              coveredByMonth.set(key, (coveredByMonth.get(key) || 0) + Number(payment.amount_paid || 0));
            });

          submissions
            .filter(submission => submission.lease_id === lease.id && submission.status === 'pending')
            .forEach(submission => {
              if (!this.isRentPayment(submission)) return;
              if (!submission.rent_period_start && /^other:/i.test(String(submission.rent_period_label || ''))) return;
              const key = this.monthKey(submission.rent_period_start || submission.payment_date);
              if (!key) return;
              coveredByMonth.set(key, (coveredByMonth.get(key) || 0) + Number(submission.amount_claimed || 0));
            });

          const options = [];
          for (let cursor = leaseStart; cursor <= lastDueMonth; cursor = this.addMonths(cursor, 1)) {
            const key = this.toIsoDate(cursor);
            const covered = coveredByMonth.get(key.slice(0, 7)) || 0;
            if (monthlyRent && covered >= monthlyRent - 0.005) continue;

            const periodEnd = this.monthEnd(cursor);
            const status = periodEnd < today ? 'overdue' : 'current';
            const baseLabel = `${this.rentPeriodBaseLabel(cursor)} rent`;
            options.push({
              key,
              start: key,
              end: this.toIsoDate(periodEnd),
              label: `${baseLabel} - ${status}`,
              saveLabel: baseLabel,
              amount: monthlyRent,
              status
            });
          }

          const advanceStart = this.addMonths(currentMonth, 1);
          const advanceKey = this.toIsoDate(advanceStart);
          const advanceCovered = coveredByMonth.get(advanceKey.slice(0, 7)) || 0;
          if ((!leaseEnd || advanceStart <= leaseEnd) && (!monthlyRent || advanceCovered < monthlyRent - 0.005)) {
            const baseLabel = `${this.rentPeriodBaseLabel(advanceStart)} rent`;
            options.push({
              key: advanceKey,
              start: advanceKey,
              end: this.toIsoDate(this.monthEnd(advanceStart)),
              label: `${baseLabel} - advance`,
              saveLabel: baseLabel,
              amount: monthlyRent,
              status: 'advance'
            });
          }

          const depositDue = this.leaseDepositDue(lease, payments, submissions);
          if (depositDue > 0) {
            options.push({
              key: 'deposit',
              start: null,
              end: null,
              label: 'Deposit',
              saveLabel: 'Deposit',
              amount: depositDue,
              status: 'deposit',
              isDeposit: true
            });
          }

          if (config.includeHistorical) {
            options.push({
              key: 'historical',
              start: null,
              end: null,
              label: 'Historical rent month',
              saveLabel: 'Historical rent',
              amount: monthlyRent,
              status: 'historical',
              isHistorical: true
            });
          }

          options.push({
            key: 'other',
            start: null,
            end: null,
            label: 'Other',
            saveLabel: 'Other',
            amount: 0,
            status: 'other',
            isOther: true
          });

          return options;
        },

        unitPaymentPeriodOptions() {
          return this.buildRentPeriodOptions(this.propertyUnit.currentLease, this.propertyUnit.payments, [], { includeHistorical: true });
        },

        manualPaymentPeriodOptions() {
          const lease = this.payments.leases.find(row => row.id === this.payments.manualForm.leaseId);
          return this.buildRentPeriodOptions(lease, this.payments.verifiedPayments, this.payments.pendingSubmissions, { includeHistorical: true });
        },

        tenantPaymentPeriodOptions() {
          return this.buildRentPeriodOptions(this.tenant.activeLease, this.tenant.payments, this.tenant.paymentSubmissions);
        },

        selectedPaymentPeriod(scope) {
          const config = {
            unitPayment: { form: this.propertyUnit.paymentForm, options: this.unitPaymentPeriodOptions() },
            manualPayment: { form: this.payments.manualForm, options: this.manualPaymentPeriodOptions() },
            tenantPayment: { form: this.tenant.paymentForm, options: this.tenantPaymentPeriodOptions() }
          }[scope];
          if (!config) return null;
          return config.options.find(option => option.key === config.form.rentPeriodKey) || null;
        },

        paymentPeriodForm(scope) {
          return {
            unitPayment: this.propertyUnit.paymentForm,
            manualPayment: this.payments.manualForm,
            tenantPayment: this.tenant.paymentForm
          }[scope] || null;
        },

        paymentPeriodPayload(scope) {
          const selectedPeriod = this.selectedPaymentPeriod(scope);
          if (!selectedPeriod) return { error: 'Select what this payment is for.' };

          if (selectedPeriod.isDeposit) {
            return {
              start: null,
              end: null,
              label: 'Deposit',
              purpose: 'deposit',
              purposeDescription: 'Refundable lease deposit',
              isHistorical: false
            };
          }

          if (selectedPeriod.isOther) {
            const description = String(this.paymentPeriodForm(scope)?.otherDescription || '').trim();
            if (!description) return { error: 'Enter what this payment is for.' };
            return {
              start: null,
              end: null,
              label: `Other: ${description}`,
              purpose: 'other',
              purposeDescription: description,
              isHistorical: false
            };
          }

          if (selectedPeriod.isHistorical) {
            const form = this.paymentPeriodForm(scope);
            const month = String(form?.historicalMonth || '').trim();
            if (!/^\d{4}-\d{2}$/.test(month)) return { error: 'Select the historical rent month.' };
            const startDate = this.monthStart(`${month}-01`);
            if (!startDate) return { error: 'Select a valid historical rent month.' };
            const baseLabel = `${this.rentPeriodBaseLabel(startDate)} rent`;
            return {
              start: this.toIsoDate(startDate),
              end: this.toIsoDate(this.monthEnd(startDate)),
              label: `${baseLabel} - historical`,
              purpose: 'rent',
              purposeDescription: 'Historical rent record',
              isHistorical: true
            };
          }

          return {
            start: selectedPeriod.start,
            end: selectedPeriod.end,
            label: selectedPeriod.saveLabel,
            purpose: 'rent',
            purposeDescription: null,
            isHistorical: false
          };
        },

        syncPaymentPeriodAmount(scope) {
          const selected = this.selectedPaymentPeriod(scope);
          if (!selected) return;
          const form = this.paymentPeriodForm(scope);
          if (form && !selected.isHistorical) form.historicalMonth = '';
          if (form && !selected.isOther) form.otherDescription = '';
          if (selected.isOther) return;
          if (scope === 'unitPayment') this.propertyUnit.paymentForm.amount = selected.amount;
          if (scope === 'manualPayment') this.payments.manualForm.amount = selected.amount;
          if (scope === 'tenantPayment') this.tenant.paymentForm.amount = selected.amount;
        },

        paymentAmountLabel(scope) {
          const selected = this.selectedPaymentPeriod(scope);
          return selected?.isOther || selected?.isDeposit ? 'Amount' : 'Rent amount';
        },

        defaultRentPeriodKey(scope) {
          const options = {
            unitPayment: this.unitPaymentPeriodOptions(),
            manualPayment: this.manualPaymentPeriodOptions(),
            tenantPayment: this.tenantPaymentPeriodOptions()
          }[scope] || [];
          return options[0]?.key || '';
        },

        openManualPaymentModal() {
          this.payments.error = '';
          this.payments.modal = 'manual';
          this.payments.manualForm = {
            leaseId: '',
            amount: 0,
            rentPeriodKey: '',
            historicalMonth: '',
            otherDescription: '',
            date: this.toIsoDate(new Date()),
            method: 'cash',
            notes: '',
            proofFile: null
          };
          if (this.$refs.manualPaymentProofInput) this.$refs.manualPaymentProofInput.value = '';
        },

        closePaymentModal() {
          this.payments.modal = '';
          this.payments.selectedSubmission = null;
          this.payments.rejectForm = { reason: '' };
          this.payments.manualForm.proofFile = null;
          if (this.$refs.manualPaymentProofInput) this.$refs.manualPaymentProofInput.value = '';
          this.payments.saving = false;
        },

        handleManualPaymentLeaseChange() {
          const lease = this.payments.leases.find(row => row.id === this.payments.manualForm.leaseId);
          if (lease) this.payments.manualForm.amount = Number(lease.monthly_rent || 0);
          this.payments.manualForm.rentPeriodKey = this.defaultRentPeriodKey('manualPayment');
          this.syncPaymentPeriodAmount('manualPayment');
        },

        async logManualPayment() {
          if (!this.canVerifyPayments()) return;

          this.payments.error = '';
          this.payments.saving = true;
          const selectedPeriod = this.selectedPaymentPeriod('manualPayment');
          if (!selectedPeriod) {
            this.payments.error = 'Select what this payment is for.';
            this.payments.saving = false;
            return;
          }
          const periodPayload = this.paymentPeriodPayload('manualPayment');
          if (periodPayload.error) {
            this.payments.error = periodPayload.error;
            this.payments.saving = false;
            return;
          }

          const { data: paymentRows, error } = await supabaseClient
            .from('payments')
            .insert({
              lease_id: this.payments.manualForm.leaseId,
              submission_id: null,
              amount_paid: Number(this.payments.manualForm.amount || 0),
              payment_date: this.payments.manualForm.date,
              payment_method: this.payments.manualForm.method,
              rent_period_start: periodPayload.start,
              rent_period_end: periodPayload.end,
              rent_period_label: periodPayload.label,
              notes: this.payments.manualForm.notes || null,
              payment_purpose: periodPayload.purpose,
              purpose_description: periodPayload.purposeDescription,
              is_historical: periodPayload.isHistorical,
              recorded_by: this.profile.id
            })
            .select('id')
            .limit(1);

          if (error) {
            this.payments.error = error.message;
            this.payments.saving = false;
            return;
          }

          const paymentRow = paymentRows?.[0] || null;
          if (this.payments.manualForm.proofFile && paymentRow?.id) {
            try {
              await this.attachPaymentRecordProof(paymentRow, this.payments.manualForm.proofFile, this.currentLandlordId());
            } catch (proofError) {
              this.payments.activeTab = 'verified';
              this.closePaymentModal();
              await this.loadPaymentsData();
              await this.loadDashboardData();
              this.payments.error = `Payment saved, but proof upload failed: ${proofError.message}`;
              return;
            }
          }

          this.closePaymentModal();
          this.payments.activeTab = 'verified';
          await this.loadPaymentsData();
          await this.loadDashboardData();
        },

        async approvePaymentSubmission(submission) {
          if (!this.canVerifyPayments()) return;

          this.payments.error = '';
          this.payments.saving = true;

          const { error } = await supabaseClient.rpc('accept_payment_submission', {
            p_submission_id: submission.id
          });

          if (error) {
            this.payments.error = error.message;
            this.payments.saving = false;
            return;
          }

          this.payments.saving = false;
          this.payments.activeTab = 'verified';
          await this.loadPaymentsData();
          await this.loadDashboardData();
        },

        openRejectPaymentModal(submission) {
          if (!this.canVerifyPayments()) return;
          this.payments.error = '';
          this.payments.selectedSubmission = submission;
          this.payments.rejectForm = { reason: '' };
          this.payments.modal = 'reject';
        },

        async rejectPaymentSubmission() {
          if (!this.canVerifyPayments() || !this.payments.selectedSubmission) return;

          this.payments.error = '';
          this.payments.saving = true;

          const { error } = await supabaseClient
            .from('payment_submissions')
            .update({
              status: 'rejected',
              rejection_reason: this.payments.rejectForm.reason,
              reviewed_by: this.profile.id,
              reviewed_at: new Date().toISOString()
            })
            .eq('id', this.payments.selectedSubmission.id);

          if (error) {
            this.payments.error = error.message;
            this.payments.saving = false;
            return;
          }

          this.closePaymentModal();
          await this.loadPaymentsData();
          await this.loadDashboardData();
        },

        async paymentForReceipt(payment, leaseContext = null) {
          let normalized = this.normalizePayment({
            ...payment,
            lease: leaseContext || payment.lease || payment.leases || null
          });

          if (!normalized.lease && payment.id) {
            const { data, error } = await supabaseClient
              .from('payments')
              .select('id, lease_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, payment_purpose, purpose_description, is_historical, notes, receipt_number, recorded_by, created_at, leases(id, monthly_rent, tenants(id, full_name, email), units(id, unit_number, property_id, properties(id, name, address, city)))')
              .eq('id', payment.id)
              .maybeSingle();

            if (error) throw error;
            normalized = this.normalizePayment(data || payment);
          }

          if (leaseContext && !normalized.lease?.unit && this.propertyUnit.selectedUnit) {
            normalized.lease = {
              ...normalized.lease,
              unit: {
                ...this.propertyUnit.selectedUnit,
                properties: this.propertyUnit.selectedUnit.property || this.propertyUnit.properties.find(property => property.id === this.propertyUnit.selectedUnit.property_id) || null
              }
            };
          }

          return normalized;
        },

        async downloadReceipt(payment, leaseContext = null) {
          this.payments.error = '';

          try {
            const receiptPayment = await this.paymentForReceipt(payment, leaseContext);
            const lease = receiptPayment.lease || {};
            const unit = lease.unit || {};
            const property = unit.properties || unit.property || {};
            const tenant = lease.tenant || {};
            const landlordName = this.profile?.role === 'landlord' ? this.profile.full_name : this.profile?.landlord_name || 'Landlord';
            const amountPaid = Number(receiptPayment.amount_paid || 0);
            const monthlyRent = Number(lease.monthly_rent || 0);
            const isRentPayment = Boolean(receiptPayment.rent_period_start)
              && (receiptPayment.payment_purpose || 'rent') === 'rent'
              && !/^other(?::|$)/i.test(String(receiptPayment.rent_period_label || '').trim());
            const remainingBalance = isRentPayment ? Math.max(monthlyRent - amountPaid, 0) : null;
            const receiptNumber = receiptPayment.receipt_number || `RR-${receiptPayment.id?.slice(0, 8) || Date.now()}`;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(20);
            doc.text('Mushavo', 20, 22);
            doc.setFontSize(13);
            doc.text('Payment Receipt', 20, 32);

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.text(`Receipt Number: ${receiptNumber}`, 140, 22);
            doc.text(`Date: ${this.formatDate(receiptPayment.payment_date)}`, 140, 29);

            doc.setDrawColor(16, 185, 129);
            doc.setLineWidth(0.8);
            doc.line(20, 40, 190, 40);

            const rows = [
              ['Landlord', landlordName || '-'],
              ['Tenant', tenant.full_name || '-'],
              ['Unit', unit.unit_number || '-'],
              ['Property Address', [property.name, property.address, property.city].filter(Boolean).join(', ') || '-'],
              ['Amount Paid', this.formatCurrency(amountPaid)],
              ['Payment For', this.paymentPeriodLabel(receiptPayment)],
              ['Method', this.titleCase(receiptPayment.payment_method)]
            ];
            if (isRentPayment) rows.push(['Remaining Rent Balance', this.formatCurrency(remainingBalance)]);

            let y = 56;
            rows.forEach(([label, value]) => {
              doc.setFont('helvetica', 'bold');
              doc.text(`${label}:`, 20, y);
              doc.setFont('helvetica', 'normal');
              doc.text(String(value), 66, y, { maxWidth: 120 });
              y += label === 'Property Address' ? 14 : 10;
            });

            if (receiptPayment.notes) {
              doc.setFont('helvetica', 'bold');
              doc.text('Notes:', 20, y + 2);
              doc.setFont('helvetica', 'normal');
              doc.text(String(receiptPayment.notes), 66, y + 2, { maxWidth: 120 });
            }

            doc.setDrawColor(226, 232, 240);
            doc.line(20, 270, 190, 270);
            doc.setFontSize(11);
            doc.text('Thank you for your payment', 20, 280);
            doc.save(`${receiptNumber}.pdf`);
          } catch (error) {
            const message = error.message || 'Receipt could not be generated.';
            this.payments.error = message;
            this.propertyUnit.error = message;
            this.tenant.error = message;
          }
        },

        async loadMaintenanceData() {

              .is('archived_at', null)
              .order('created_at', { ascending: false }),
            supabaseClient
              .from('properties')
              .select('id, name, address, city')
              .is('archived_at', null)
              .order('name', { ascending: true }),
            supabaseClient
              .from('units')
              .select('id, property_id, unit_number, status, properties(id, name, address, city)')
              .is('archived_at', null)
              .order('unit_number', { ascending: true }),
            supabaseClient
              .from('leases')

              .eq('status', 'active'),
            this.canAssignMaintenance()

              : Promise.resolve({ data: [], error: null }),

          ]);

          const firstError = requestsResult.error || propertiesResult.error || unitsResult.error || leasesResult.error || staffResult.error || assignableUnitsResult.error;

        async saveManagementCompanyPermissions() {
          const target = this.staff.selectedMember;
          if (!target) return;

          this.staff.error = '';
          this.staff.saving = true;
          const permissions = this.staffFormPayload();
          const scope = this.staffScopeFromPermissions(permissions);

          if (!scope.all_properties && scope.property_ids.length === 0) {
            this.staff.error = 'Select at least one property, or choose All properties.';
            this.staff.saving = false;
            return;
          }

          if (this.externalAssignmentConflict({
            ...scope,
            excludeManagementId: target.managementMode === 'edit' ? target.id : null
          })) {
            this.staff.error = 'This property is already assigned to a PMC or IPM. Remove that external assignment first.';
            this.staff.saving = false;
            return;
          }

          if (target.managementMode === 'request') {
            const { error } = await supabaseClient.rpc('approve_management_landlord_request_with_permissions', {
              p_request_id: target.id,
              p_permissions: permissions
            });

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }
          } else {
            const { error } = await supabaseClient
              .from('management_landlord_permissions')
              .update(permissions)
              .eq('id', target.id)
              .eq('landlord_id', this.currentLandlordId());

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }
          }

          this.closeStaffModal();
          await this.loadStaffData();

        async saveStaffPermissions() {
          if (!this.staff.selectedMember) return;

          this.staff.error = '';
          this.staff.saving = true;
          const permissions = this.staffFormPayload();
          const member = this.staff.selectedMember;
          const validationError = this.staffAssignmentValidationError(member, permissions);

          if (validationError) {
            this.staff.error = validationError;
            this.staff.saving = false;
            return;
          }

          if (this.profile?.role === 'management_leader') {
            if (!member.accepted || !member.permission_id) {
              this.staff.error = 'PMC staff invite permissions can be edited after the account is accepted.';
              this.staff.saving = false;
              return;
            }

            const { error } = await supabaseClient
              .from('management_staff_permissions')
              .update(permissions)
              .eq('id', member.permission_id)
              .eq('management_company_id', this.managementContext.company?.id);

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }

            this.closeStaffModal();
            await this.loadStaffData();
            return;
          }

          if (member.accepted) {
            const permissionPayload = {
              landlord_id: this.currentLandlordId(),
              staff_profile_id: member.profile_id,
              ...permissions
            };

            const saveQuery = member.permission_id
              ? supabaseClient.from('staff_permissions').update(permissions).eq('id', member.permission_id)
              : supabaseClient.from('staff_permissions').insert(permissionPayload);

            const { error } = await saveQuery;

            if (error) {
              this.staff.error = this.friendlyDatabaseError(error, 'Staff permissions could not be saved. Check property limits and permissions, then try again.');
              this.staff.saving = false;
              return;
            }
          } else if (member.request_id) {
            const { error } = await supabaseClient.rpc('approve_staff_landlord_request_with_permissions', {
              p_request_id: member.request_id,
              p_permissions: permissions
            });

            if (error) {
              this.staff.error = this.friendlyDatabaseError(error, 'Staff request could not be approved. Check property limits and permissions, then try again.');
              this.staff.saving = false;
              return;
            }
          } else {
            const metadata = {
              full_name: this.staff.form.fullName,
              phone: this.staff.form.phone || '',
              staff_type: member.staff_type || (this.profile?.role === 'management_leader' ? 'management' : 'landlord'),
              ...permissions
            };

            const { error } = await supabaseClient
              .from('invite_tokens')
              .update({ metadata })
              .eq('id', member.invite_id);

            if (error) {
              this.staff.error = error.message;
              this.staff.saving = false;
              return;
            }
          }

          this.closeStaffModal();
          await this.loadStaffData();

          if (linkError) {
            this.tenant.error = linkError.message;
            this.finishDataLoad('tenant', this.tenant);
            return;
          }

          const { data: tenantRows, error: tenantError } = await supabaseClient
            .from('tenants')
            .select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_accepted, created_at')
            .eq('profile_id', this.profile.id)
            .is('archived_at', null)
            .order('created_at', { ascending: false });

          if (tenantError) {
            this.tenant.error = tenantError.message;
            this.finishDataLoad('tenant', this.tenant);
            return;
          }

          this.tenant.tenantRows = tenantRows || [];

          if (this.tenant.tenantRows.length === 0) {
            this.tenant.tenantRow = null;
            this.tenant.landlord = null;
            this.tenant.activeLease = null;
            this.tenant.leases = [];
            this.tenant.payments = [];
            this.tenant.paymentSubmissions = [];
            this.tenant.maintenanceRequests = [];
            this.tenant.contacts = [];
            this.tenant.error = 'No tenant record is linked to this account yet.';
            this.finishDataLoad('tenant', this.tenant);
            return;
          }

          const tenantIds = this.tenant.tenantRows.map(row => row.id);
          const { data: leases, error: leaseError } = await supabaseClient
            .from('leases')
            .select('id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at, units(id, unit_number, property_id, properties(id, name, address, city))')
            .in('tenant_id', tenantIds)
            .order('created_at', { ascending: false });

          if (leaseError) {
            this.tenant.error = leaseError.message;
            this.finishDataLoad('tenant', this.tenant);
            return;
          }

          this.tenant.leases = (leases || []).map(lease => this.normalizeLease(lease));
          this.tenant.activeLease = this.tenant.leases.find(lease => lease.status === 'active') || this.tenant.leases[0] || null;
          this.tenant.tenantRow = this.tenant.tenantRows.find(row => row.id === this.tenant.activeLease?.tenant_id) || this.tenant.tenantRows[0] || null;
          this.tenant.landlord = null;
          if (this.tenant.activeLease?.landlord_id) {
            const { data: landlordRows, error: landlordError } = await supabaseClient.rpc('current_tenant_landlord');
            if (!landlordError) this.tenant.landlord = Array.isArray(landlordRows) ? landlordRows[0] || null : landlordRows || null;
          }
          this.tenant.contacts = [];
          if (this.tenant.activeLease?.unit_id) {
            const { data: contacts, error: contactsError } = await supabaseClient.rpc('tenant_unit_contacts', {
              p_unit_id: this.tenant.activeLease.unit_id
            });
            if (!contactsError) this.tenant.contacts = contacts || [];
          }
          const leaseIds = this.tenant.leases.map(lease => lease.id);

          if (leaseIds.length === 0) {
            this.tenant.payments = [];
            this.tenant.paymentSubmissions = [];
            this.tenant.maintenanceRequests = [];
            this.tenant.contacts = [];
            this.tenant.landlord = null;
            this.finishDataLoad('tenant', this.tenant);
            return;
          }

          const [paymentsResult, submissionsResult, maintenanceResult] = await Promise.all([
            supabaseClient
              .from('payments')
              .select('id, lease_id, submission_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, payment_purpose, purpose_description, is_historical, notes, receipt_number, recorded_by, created_at, leases(id, monthly_rent, tenants(id, full_name, email), units(id, unit_number, property_id, properties(id, name, address, city)))')
              .in('lease_id', leaseIds)
              .order('payment_date', { ascending: false }),
            supabaseClient
              .from('payment_submissions')
              .select('id, lease_id, tenant_id, amount_claimed, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, payment_purpose, purpose_description, reference_note, proof_image_url, proof_image_path, proof_image_name, proof_image_size, proof_image_uploaded_by, proof_image_uploaded_at, status, rejection_reason, reviewed_at, created_at')
              .in('lease_id', leaseIds)
              .order('created_at', { ascending: false }),
            supabaseClient
              .from('maintenance_requests')
              .select('id, unit_id, lease_id, landlord_id, submitted_by_profile_id, description, photo_url, photo_path, photo_name, photo_size, photo_uploaded_by, photo_uploaded_at, status, priority, resolution_notes, created_at, resolved_at')
              .in('lease_id', leaseIds)
              .is('archived_at', null)
              .order('created_at', { ascending: false })
          ]);

          const firstError = paymentsResult.error || submissionsResult.error || maintenanceResult.error;
          if (firstError) {
            this.tenant.error = firstError.message;
            this.finishDataLoad('tenant', this.tenant);
            return;
          }

          this.tenant.payments = (paymentsResult.data || []).map(payment => this.normalizePayment(payment));
          this.tenant.paymentSubmissions = submissionsResult.data || [];
          this.tenant.maintenanceRequests = maintenanceResult.data || [];
          this.resetTenantForms();
          this.finishDataLoad('tenant', this.tenant);
        },

        resetTenantForms() {
          this.tenant.paymentForm = {
            amount: Number(this.tenant.activeLease?.monthly_rent || 0),
            rentPeriodKey: '',
            otherDescription: '',
            date: this.toIsoDate(new Date()),
            method: 'bank_transfer',
            reference: '',
            proofFile: null
          };
          this.tenant.paymentForm.rentPeriodKey = this.defaultRentPeriodKey('tenantPayment');
          this.syncPaymentPeriodAmount('tenantPayment');

            priority: 'medium',

          };
