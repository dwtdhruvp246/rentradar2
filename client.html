        },

        tenantHomeSubtitle() {
          if (!this.tenant.activeLease) return 'No active lease is linked yet.';
          return `${this.tenantPropertyLabel()} / Unit ${this.tenantUnitLabelFromActiveLease()}`;
        },

        tenantUnitFromActiveLease() {
          return this.tenant.activeLease?.unit || this.tenant.activeLease?.units || null;
        },

        tenantPropertyFromActiveLease() {
          const unit = this.tenantUnitFromActiveLease();
          return unit?.properties || unit?.property || null;
        },

        tenantUnitLabelFromActiveLease() {
          return this.tenantUnitFromActiveLease()?.unit_number || '-';
        },

        tenantPropertyLabel() {
          return this.tenantPropertyFromActiveLease()?.name || '-';
        },

        tenantPropertyAddress() {
          const property = this.tenantPropertyFromActiveLease();
          return [property?.address, property?.city].filter(Boolean).join(', ') || '-';
        },

        tenantLandlordName() {
          return this.tenant.landlord?.full_name || '-';
        },

        tenantCurrentBalance() {
          const activeLease = this.tenant.activeLease;
          if (!activeLease) return 0;

          const currentRentMonth = this.monthKey(new Date());
          const paidThisMonth = this.tenant.payments
            .filter(payment => (
              payment.lease_id === activeLease.id
              && Boolean(payment.rent_period_start)
              && this.monthKey(payment.rent_period_start) === currentRentMonth
              && (payment.payment_purpose || 'rent') === 'rent'
              && !/^other(?::|$)/i.test(String(payment.rent_period_label || '').trim())
            ))
            .reduce((sum, payment) => sum + Number(payment.amount_paid || 0), 0);
          return Math.max(Number(activeLease.monthly_rent || 0) - paidThisMonth, 0);
        },

        async submitTenantPayment() {
          const lease = this.tenant.activeLease;
          const tenantRow = this.tenant.tenantRow;
          if (!lease || !tenantRow) {
            this.tenant.error = 'A current lease is required before submitting payment.';
            return;
          }

          this.tenant.error = '';
          this.tenant.saving = true;
          const selectedPeriod = this.selectedPaymentPeriod('tenantPayment');
          if (!selectedPeriod) {
            this.tenant.error = 'Select what this payment is for.';
            this.tenant.saving = false;
            return;
          }
          const periodPayload = this.paymentPeriodPayload('tenantPayment');
          if (periodPayload.error) {
            this.tenant.error = periodPayload.error;
            this.tenant.saving = false;
            return;
          }

          const proofFile = this.tenant.paymentForm.proofFile;
          const { data: submissionRow, error } = await supabaseClient
            .from('payment_submissions')
            .insert({
              lease_id: lease.id,
              tenant_id: tenantRow.id,
              amount_claimed: Number(this.tenant.paymentForm.amount || 0),
              payment_date: this.tenant.paymentForm.date,
              payment_method: this.tenant.paymentForm.method,
              rent_period_start: periodPayload.start,
              rent_period_end: periodPayload.end,
              rent_period_label: periodPayload.label,
              payment_purpose: periodPayload.purpose,
              purpose_description: periodPayload.purposeDescription,
              reference_note: this.tenant.paymentForm.reference || null,
              status: 'pending'
            })
            .select('id')
            .single();

          if (error) {
            this.tenant.error = error.message;
            this.tenant.saving = false;
            return;
          }

          if (proofFile) {
            try {
              await this.attachPaymentProof(submissionRow, proofFile, lease.landlord_id);
            } catch (error) {
              this.tenant.error = `Payment was submitted, but the proof upload failed: ${error.message}`;
              this.tenant.saving = false;
              await this.loadTenantData();
              return;
            }
          }

          this.tenant.saving = false;
          await this.loadTenantData();
        },

        async submitTenantMaintenance() {
          const lease = this.tenant.activeLease;
          if (!lease) {
            this.tenant.error = 'A current lease is required before submitting maintenance.';
            return;
          }

          this.tenant.error = '';
          this.tenant.saving = true;

          const photoFile = this.tenant.maintenanceForm.photoFile;
          const { data: requestRow, error } = await supabaseClient
            .from('maintenance_requests')
            .insert({
              unit_id: lease.unit_id,
              lease_id: lease.id,
              landlord_id: lease.landlord_id,
              submitted_by_profile_id: this.profile.id,
              assigned_to_staff_id: null,
              description: this.tenant.maintenanceForm.description,
              status: 'open',
              priority: this.tenant.maintenanceForm.priority,
              resolution_notes: null
            })
            .select('id, landlord_id')
            .single();

          if (error) {
            this.tenant.error = error.message;
            this.tenant.saving = false;
            return;
          }

          if (photoFile) {
            try {
              await this.attachMaintenancePhoto(requestRow, photoFile);
            } catch (error) {
              this.tenant.error = `Request was submitted, but the photo upload failed: ${error.message}`;
              this.tenant.saving = false;
              await this.loadTenantData();
              return;
            }
          }

          this.tenant.saving = false;
          await this.loadTenantData();
        },

        async loadTenantLeaseData() {
          this.beginDataLoad('tenantLease', this.tenantLease);
          this.tenantLease.error = '';

          const canLoadProperties = this.canViewProperties();
          const canLoadUnits = this.canViewUnits();
          const canLoadTenants = this.canViewTenants();
          const canLoadLeases = this.canViewUnits() && (this.canViewTenants() || this.canManageLeases() || this.canViewPayments());
          const results = await Promise.all([
            canLoadProperties
              ? supabaseClient.from('properties').select('id, landlord_id, name, address, city, created_at').is('archived_at', null).order('name', { ascending: true })
              : Promise.resolve({ data: [], error: null }),
            canLoadUnits
              ? supabaseClient.from('units').select('id, property_id, unit_number, bedrooms, bathrooms, monthly_rent, status, properties(id, name, address, city)').is('archived_at', null).order('unit_number', { ascending: true })
              : Promise.resolve({ data: [], error: null }),
            canLoadTenants
              ? supabaseClient.from('tenants').select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_token, invite_accepted, created_at').is('archived_at', null).order('created_at', { ascending: false })
              : Promise.resolve({ data: [], error: null }),
            canLoadLeases
              ? supabaseClient.from('leases').select('id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at, tenants(id, full_name, email, phone), units(id, unit_number, property_id, properties(id, name, address, city))').order('created_at', { ascending: false })
              : Promise.resolve({ data: [], error: null })
          ]);

          const [propertiesResult, unitsResult, tenantsResult, leasesResult] = results;
          const firstError = propertiesResult.error || unitsResult.error || tenantsResult.error || leasesResult.error;
          if (firstError) this.tenantLease.error = firstError.message;

          this.tenantLease.properties = propertiesResult.data || [];
          this.tenantLease.units = (unitsResult.data || []).map(unit => ({ ...unit, property: unit.properties || null }));
          this.tenantLease.tenants = (tenantsResult.data || []).map(tenant => ({
            ...tenant,
            invite_accepted: Boolean(tenant.invite_accepted)
          }));
          this.tenantLease.leases = (leasesResult.data || []).map(lease => ({
            ...lease,
            tenant: lease.tenants || null,
            unit: lease.units || null
          }));

          if (this.tenantLease.selectedTenant) {
            const refreshedTenant = this.tenantLease.tenants.find(tenant => tenant.id === this.tenantLease.selectedTenant.id);
            if (refreshedTenant) await this.viewTenant(refreshedTenant);
          }

          if (this.tenantLease.selectedLease) {
            const refreshedLease = this.tenantLease.leases.find(lease => lease.id === this.tenantLease.selectedLease.id);
            if (refreshedLease) await this.viewLease(refreshedLease);
          }

          this.finishDataLoad('tenantLease', this.tenantLease);
        },

        async addTenantInvite() {
          this.tenantLease.error = '';
          if (!this.canAddTenants()) {
            this.tenantLease.error = 'You do not have permission to add tenants.';
            return;
          }
          const lookupResult = this.tenantLease.lookup.result;
          const normalizedLookupEmail = String(lookupResult?.email || this.tenantLease.lookup.email || '').trim().toLowerCase();
          const normalizedFormEmail = String(this.tenantLease.tenantForm.email || '').trim().toLowerCase();
          const canInviteExistingTenant = Boolean(lookupResult?.account_found && normalizedLookupEmail && normalizedFormEmail === normalizedLookupEmail);
          const canAddNewTenant = Boolean(!lookupResult?.account_found && this.tenantLease.showNewTenantForm && normalizedLookupEmail && normalizedFormEmail === normalizedLookupEmail);
          if (!canInviteExistingTenant && !canAddNewTenant) {
            this.tenantLease.error = 'Search for the tenant email first. If no tenant is found, click Add New Tenant before entering their details.';
            return;
          }
          this.tenantLease.saving = true;
          this.tenantLease.generatedInviteLink = '';

          const { data: inviteData, error: tenantError } = await supabaseClient.rpc('create_tenant_invite', {
            p_landlord_id: this.currentLandlordId(),
            p_full_name: this.tenantLease.tenantForm.fullName,
            p_phone: this.tenantLease.tenantForm.phone || null,
            p_email: this.tenantLease.tenantForm.email,
            p_id_number: this.tenantLease.tenantForm.idNumber || null
          });

          if (tenantError) {
            this.tenantLease.error = this.friendlyDatabaseError(tenantError, 'Tenant request could not be sent.');
            this.tenantLease.saving = false;
            return;
          }

          const inviteRow = Array.isArray(inviteData) ? inviteData[0] : inviteData;
          if (canInviteExistingTenant) {
            this.tenantLease.generatedInviteLink = '';
            this.successMessage = 'Tenant link request sent. The tenant must accept before they appear in your accepted tenants list.';
          } else {
            this.tenantLease.generatedInviteLink = this.buildInviteLink(inviteRow.invite_token);
            this.successMessage = 'Tenant invite link created. Copy and send it to the tenant to create their account.';
          }
          this.tenantLease.tenantForm = { fullName: '', phone: '', email: '', idNumber: '' };
          this.tenantLease.showNewTenantForm = false;
          this.tenantLease.saving = false;
          await this.loadTenantLeaseData();
        },

        closeTenantInvitePanel() {
          this.tenantLease.showTenantInvitePanel = false;
          this.tenantLease.showNewTenantForm = false;
          this.tenantLease.generatedInviteLink = '';
          this.tenantLease.lookup = { email: '', result: null };
          this.tenantLease.tenantForm = { fullName: '', phone: '', email: '', idNumber: '' };
        },

        async searchTenantByEmail() {
          this.tenantLease.error = '';
          this.tenantLease.generatedInviteLink = '';
          this.tenantLease.lookup.result = null;
          this.tenantLease.showNewTenantForm = false;
          if (!this.canAddTenants()) {
            this.tenantLease.error = 'You do not have permission to add tenants.';
            return;
          }
          if (!this.tenantLease.lookup.email) {
            this.tenantLease.error = 'Enter the tenant email address.';
            return;
          }

          const { data, error } = await supabaseClient.rpc('search_tenant_by_email', {
            p_email: this.tenantLease.lookup.email
          });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          this.tenantLease.lookup.result = Array.isArray(data) ? data[0] : data;
          if (this.tenantLease.lookup.result && !this.tenantLease.lookup.result.account_found) {
            this.tenantLease.tenantForm = {
              fullName: '',
              phone: '',
              email: this.tenantLease.lookup.result.email || this.tenantLease.lookup.email,
              idNumber: ''
            };
          }
        },

        prepareNewTenantInvite() {
          const result = this.tenantLease.lookup.result;
          if (!result || result.account_found) return;
          this.tenantLease.error = '';
          this.tenantLease.generatedInviteLink = '';
          this.tenantLease.tenantForm = {
            fullName: '',
            phone: '',
            email: result.email || this.tenantLease.lookup.email,
            idNumber: ''
          };
          this.tenantLease.showNewTenantForm = true;
        },

        async inviteFoundTenant() {
          const result = this.tenantLease.lookup.result;
          if (!result?.account_found) return;

          this.tenantLease.showNewTenantForm = false;
          this.tenantLease.tenantForm = {
            fullName: result.full_name || 'Tenant',
            phone: result.phone || '',
            email: result.email || this.tenantLease.lookup.email,
            idNumber: ''
          };
          await this.addTenantInvite();
        },

        async deleteTenant(tenant) {
          if (!tenant) return;
          if (!this.canArchiveTenants()) {
            this.tenantLease.error = 'You do not have permission to archive tenants.';
            return;
          }
          const confirmed = await this.requestConfirm({
            title: 'Archive tenant',
            message: `Archive ${tenant.full_name}? They will be removed from active tenant lists and their active lease will be terminated, but payment and lease history will stay saved.`,
            confirmText: 'Archive'
          });
          if (!confirmed) return;

          this.tenantLease.error = '';
          const { error } = await supabaseClient.rpc('delete_tenant_account', {
            p_tenant_id: tenant.id
          });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          if (this.tenantLease.selectedTenant?.id === tenant.id) {
            this.tenantLease.selectedTenant = null;
            this.tenantLease.selectedTenantLeases = [];
            this.tenantLease.selectedTenantPayments = [];
          }
          await this.loadTenantLeaseData();
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        startEditTenant(tenant) {
          if (!tenant) return;
          if (!this.canEditTenants()) {
            this.tenantLease.error = 'You do not have permission to edit tenants.';
            return;
          }

          this.tenantLease.error = '';
          this.tenantLease.editTenantId = tenant.id;
          this.tenantLease.editTenantForm = {
            fullName: tenant.full_name || '',
            phone: tenant.phone || '',
            email: tenant.email || '',
            idNumber: tenant.id_number || ''
          };
        },

        cancelTenantEdit() {
          this.tenantLease.editTenantId = '';
          this.tenantLease.editTenantForm = {
            fullName: '',
            phone: '',
            email: '',
            idNumber: ''
          };
        },

        async saveTenantEdit() {
          const tenantId = this.tenantLease.editTenantId;
          if (!tenantId) return;
          if (!this.canEditTenants()) {
            this.tenantLease.error = 'You do not have permission to edit tenants.';
            return;
          }

          this.tenantLease.error = '';
          this.tenantLease.saving = true;
          const { error } = await supabaseClient
            .from('tenants')
            .update({
              full_name: this.tenantLease.editTenantForm.fullName,
              phone: this.tenantLease.editTenantForm.phone || null,
              email: this.tenantLease.editTenantForm.email,
              id_number: this.tenantLease.editTenantForm.idNumber || null
            })
            .eq('id', tenantId);

          if (error) {
            this.tenantLease.error = error.message;
            this.tenantLease.saving = false;
            return;
          }

          this.cancelTenantEdit();
          this.tenantLease.saving = false;
          await this.loadTenantLeaseData();
          await this.loadPropertyUnitData();
        },

        async deleteLease(lease) {
          if (!lease) return;
          if (!this.canTerminateLeases()) {
            this.tenantLease.error = 'You do not have permission to terminate leases.';
            return;
          }
          const confirmed = await this.requestConfirm({
            title: 'Terminate lease',
            message: `Terminate this lease for ${lease.tenant?.full_name || 'the tenant'}? Payment history, submissions, documents, and maintenance references will stay saved.`,
            confirmText: 'Terminate'
          });
          if (!confirmed) return;

          this.tenantLease.error = '';
          const { error } = await supabaseClient
            .from('leases')
            .update({ status: 'terminated' })
            .eq('id', lease.id);

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          if (lease.unit_id) {
            const { error: unitError } = await supabaseClient
              .from('units')
              .update({ status: 'vacant' })
              .eq('id', lease.unit_id);

            if (unitError) {
              this.tenantLease.error = unitError.message;
              return;
            }
          }

          if (this.tenantLease.selectedLease?.id === lease.id) {
            this.tenantLease.selectedLease = {
              ...this.tenantLease.selectedLease,
              status: 'terminated'
            };
          }
          await this.loadTenantLeaseData();
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        tenantActiveLease(tenantId) {
          return this.tenantLease.leases.find(lease => lease.tenant_id === tenantId && lease.status === 'active') || null;
        },

        tenantUnitLabel(tenantId) {
          const lease = this.tenantActiveLease(tenantId);
          return lease ? this.leaseUnitLabel(lease) : '-';
        },

        tenantPropertyLabelFromId(tenantId) {
          const lease = this.tenantActiveLease(tenantId);
          return lease ? this.leasePropertyLabel(lease) : '-';
        },

        filteredTenants() {
          const search = this.tenantLease.filters.search;
          return this.acceptedTenants().filter(tenant => this.includesSearch([
            tenant.full_name,
            tenant.phone,
            tenant.email,
            tenant.id_number,
            this.tenantPropertyLabelFromId(tenant.id),
            this.tenantUnitLabel(tenant.id),
            this.landlordNameForId(tenant.landlord_id)
          ], search));
        },

        tenantLinkAccepted(tenant) {
          return tenant?.invite_accepted === true && Boolean(tenant.profile_id);
        },

        acceptedTenants() {
          return this.tenantLease.tenants.filter(tenant => this.tenantLinkAccepted(tenant));
        },

        pendingTenantRequests() {
          return this.tenantLease.tenants.filter(tenant => !this.tenantLinkAccepted(tenant));
        },

        managementLandlordProperties(landlordId) {
          return this.propertyUnit.properties.filter(property => property.landlord_id === landlordId);
        },

        managementLandlordTenants(landlordId) {
          return this.tenantLease.tenants.filter(tenant => tenant.landlord_id === landlordId && this.tenantLinkAccepted(tenant));
        },

        managementLandlordPropertyNames(landlordId) {
          return this.managementLandlordProperties(landlordId).map(property => property.name).filter(Boolean).join(', ');
        },

        managementLandlordTenantNames(landlordId) {
          return this.managementLandlordTenants(landlordId).map(tenant => tenant.full_name).filter(Boolean).join(', ');
        },

        filteredManagementRelationships() {
          const search = this.managementContext.filters.search;
          return this.managementContext.relationships.filter(relationship => this.includesSearch([
            relationship.landlord?.full_name,
            relationship.landlord?.email,
            relationship.landlord?.phone,
            this.managementLandlordPropertyNames(relationship.landlord_id),
            this.managementLandlordTenantNames(relationship.landlord_id)
          ], search));
        },

        filteredManagementRequests() {
          const search = this.managementContext.filters.search;
          return this.managementContext.requests.filter(request => this.includesSearch([
            request.landlord?.full_name,
            request.landlord?.email,
            request.landlord?.phone
          ], search));
        },

        leaseUnitLabel(lease) {
          return lease?.unit?.unit_number || lease?.units?.unit_number || '-';
        },

        leasePropertyLabel(lease) {
          const property = lease?.unit?.properties || lease?.unit?.property || lease?.units?.properties;
          return property?.name || '-';
        },

        leaseDocumentPath(lease) {
          return lease?.lease_document_path || lease?.lease_document_url || '';
        },

        leaseDocumentLabel(lease) {
          if (!this.leaseDocumentPath(lease)) return 'No PDF';
          return lease?.lease_document_name || 'PDF uploaded';
        },

        setLeaseDocumentError(message) {
          if (this.currentShell === 'tenant') {
            this.tenant.error = message;
          } else if (this.currentPage === 'leases') {
            this.tenantLease.error = message;
          } else {
            this.propertyUnit.error = message;
          }
        },

        validateLeaseDocumentFile(file) {
          if (!file) return;
          const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
          if (!isPdf) throw new Error('Lease agreement must be a PDF file.');
          if (file.size > MAX_LEASE_DOCUMENT_SIZE) throw new Error('Lease agreement PDF must be 20 MB or smaller.');
        },

        handleLeaseDocumentSelection(event, target) {
          const file = event.target.files?.[0] || null;
          this.tenantLease.error = '';

          try {
            if (file) this.validateLeaseDocumentFile(file);
            if (target === 'selected') {
              this.tenantLease.selectedLeaseDocumentFile = file;
            } else {
              this.tenantLease.leaseForm.documentFile = file;
            }
          } catch (error) {
            event.target.value = '';
            if (target === 'selected') {
              this.tenantLease.selectedLeaseDocumentFile = null;
            } else {
              this.tenantLease.leaseForm.documentFile = null;
            }
            this.tenantLease.error = error.message;
          }
        },

        sanitizeLeaseDocumentName(fileName) {
          const cleaned = String(fileName || 'lease-agreement.pdf')
            .replace(/[^a-zA-Z0-9._-]/g, '-')
            .replace(/-+/g, '-')
            .slice(0, 120);
          return cleaned.toLowerCase().endsWith('.pdf') ? cleaned : `${cleaned}.pdf`;
        },

        async uploadLeaseDocument(lease, file) {
          if (!this.canUploadLeaseDocuments()) {
            throw new Error('You do not have permission to upload lease PDFs.');
          }
          this.validateLeaseDocumentFile(file);
          const landlordId = lease.landlord_id || this.currentLandlordId();
          const safeName = this.sanitizeLeaseDocumentName(file.name);
          const objectPath = `${landlordId}/${lease.id}/${Date.now()}-${this.generateSecureToken().slice(0, 16)}-${safeName}`;
          const previousPath = this.leaseDocumentPath(lease);

          const { error: uploadError } = await supabaseClient.storage
            .from(LEASE_DOCUMENT_BUCKET)
            .upload(objectPath, file, {
              cacheControl: '3600',
              contentType: 'application/pdf',
              upsert: false
            });

          if (uploadError) throw uploadError;

          const documentFields = {
            lease_document_url: objectPath,
            lease_document_path: objectPath,
            lease_document_name: file.name,
            lease_document_size: file.size,
            lease_document_uploaded_by: this.profile?.id || null,
            lease_document_uploaded_at: new Date().toISOString()
          };

          const { data, error: updateError } = await supabaseClient
            .from('leases')
            .update(documentFields)
            .eq('id', lease.id)
            .select('id, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at')
            .single();

          if (updateError) throw updateError;

          if (previousPath && previousPath !== objectPath && !/^https?:\/\//i.test(previousPath)) {
            await supabaseClient.storage.from(LEASE_DOCUMENT_BUCKET).remove([previousPath]);
          }

          return data;
        },

        async openLeaseDocument(lease) {
          const documentPath = this.leaseDocumentPath(lease);
          if (!documentPath) return;
          if (!this.canViewLeaseDocuments()) {
            this.setLeaseDocumentError('You do not have permission to view lease PDFs.');
            return;
          }

          if (/^https?:\/\//i.test(documentPath)) {
            window.open(documentPath, '_blank', 'noopener,noreferrer');
            return;
          }

          const documentWindow = window.open('', '_blank');
          if (documentWindow) documentWindow.opener = null;

          const { data, error } = await supabaseClient.storage
            .from(LEASE_DOCUMENT_BUCKET)
            .createSignedUrl(documentPath, 300, {
              download: lease?.lease_document_name || 'lease-agreement.pdf'
            });

          if (error) {
            if (documentWindow) documentWindow.close();
            this.setLeaseDocumentError(error.message);
            return;
          }

          if (documentWindow) {
            documentWindow.location.href = data.signedUrl;
          } else {
            window.open(data.signedUrl, '_blank', 'noopener,noreferrer');
          }
        },

        async uploadDocumentForSelectedLease() {
          if (!this.tenantLease.selectedLease || !this.tenantLease.selectedLeaseDocumentFile) return;
          if (!this.canUploadLeaseDocuments()) {
            this.tenantLease.error = 'You do not have permission to upload lease PDFs.';
            return;
          }

          this.tenantLease.error = '';
          this.tenantLease.saving = true;

          try {
            await this.uploadLeaseDocument(this.tenantLease.selectedLease, this.tenantLease.selectedLeaseDocumentFile);
            this.tenantLease.selectedLeaseDocumentFile = null;
            if (this.$refs.selectedLeaseDocumentInput) this.$refs.selectedLeaseDocumentInput.value = '';
            await this.loadTenantLeaseData();
            await this.loadPropertyUnitData();
          } catch (error) {
            this.tenantLease.error = error.message;
          }

          this.tenantLease.saving = false;
        },

        imageFormTarget(target) {
          const targets = {
            tenantPayment: { form: this.tenant.paymentForm, errorScope: 'tenant', inputRef: 'tenantPaymentProofInput' },
            manualPayment: { form: this.payments.manualForm, errorScope: 'payments', inputRef: 'manualPaymentProofInput' },
            unitPayment: { form: this.propertyUnit.paymentForm, errorScope: 'propertyUnit', inputRef: 'unitPaymentProofInput' },
            tenantMaintenance: { form: this.tenant.maintenanceForm, errorScope: 'tenant', inputRef: 'tenantMaintenancePhotoInput' },
            maintenanceLog: { form: this.maintenance.logForm, errorScope: 'maintenance', inputRef: 'maintenanceLogPhotoInput' }
          };
          return targets[target] || null;
        },

        setImageUploadError(scope, message) {
          if (scope === 'maintenance') {
            this.maintenance.error = message;
          } else if (scope === 'payments') {
            this.payments.error = message;
          } else if (scope === 'propertyUnit') {
            this.propertyUnit.error = message;
          } else {
            this.tenant.error = message;
          }
        },

        validateImageFile(file) {
          if (!file) return;
          const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
          const allowedExtension = /\.(jpe?g|png|webp)$/i.test(file.name);
          if (!allowedTypes.includes(file.type) && !allowedExtension) {
            throw new Error('Image must be a JPEG, PNG, or WebP file.');
          }
          if (file.size > MAX_IMAGE_UPLOAD_SIZE) throw new Error('Image must be 10 MB or smaller.');
        },

        validatePaymentProofFile(file) {
          if (!file) return;
          const allowedTypes = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
          const allowedExtension = /\.(jpe?g|png|webp|pdf)$/i.test(file.name);
          if (!allowedTypes.includes(file.type) && !allowedExtension) {
            throw new Error('Payment proof must be a JPEG, PNG, WebP, or PDF file.');
          }
          if (file.size > MAX_PAYMENT_PROOF_UPLOAD_SIZE) throw new Error('Payment proof must be 10 MB or smaller.');
        },

        handleImageSelection(event, target, fieldName) {
          const targetConfig = this.imageFormTarget(target);
          if (!targetConfig) return;

          const file = event.target.files?.[0] || null;
          this.setImageUploadError(targetConfig.errorScope, '');

          try {
            if (file) {
              if (target === 'tenantPayment' || target === 'manualPayment' || target === 'unitPayment') {
                this.validatePaymentProofFile(file);
              } else {
                this.validateImageFile(file);
              }
            }
            targetConfig.form[fieldName] = file;
          } catch (error) {
            event.target.value = '';
            targetConfig.form[fieldName] = null;
            this.setImageUploadError(targetConfig.errorScope, error.message);
          }
        },

        sanitizeImageName(fileName) {
          const cleaned = String(fileName || 'upload.jpg')
            .replace(/[^a-zA-Z0-9._-]/g, '-')
            .replace(/-+/g, '-')
            .slice(0, 120);
          return /\.(jpe?g|png|webp)$/i.test(cleaned) ? cleaned : `${cleaned}.jpg`;
        },

        sanitizePaymentProofName(fileName) {
          const cleaned = String(fileName || 'payment-proof.pdf')
            .replace(/[^a-zA-Z0-9._-]/g, '-')
            .replace(/-+/g, '-')
            .slice(0, 120);
          return /\.(jpe?g|png|webp|pdf)$/i.test(cleaned) ? cleaned : `${cleaned}.pdf`;
        },

        paymentProofContentType(file) {
          if (file?.type) return file.type;
          return /\.pdf$/i.test(file?.name || '') ? 'application/pdf' : 'image/jpeg';
        },

        async uploadPrivateImage(bucket, landlordId, rowId, file) {
          this.validateImageFile(file);
          const safeName = this.sanitizeImageName(file.name);
          const objectPath = `${landlordId}/${rowId}/${Date.now()}-${this.generateSecureToken().slice(0, 16)}-${safeName}`;
          const { error } = await supabaseClient.storage
            .from(bucket)
            .upload(objectPath, file, {
              cacheControl: '3600',
              contentType: file.type || 'image/jpeg',
              upsert: false
            });

          if (error) throw error;
          return objectPath;
        },

        async uploadPaymentProofFile(landlordId, rowId, file) {
          this.validatePaymentProofFile(file);
          const safeName = this.sanitizePaymentProofName(file.name);
          const objectPath = `${landlordId}/${rowId}/${Date.now()}-${this.generateSecureToken().slice(0, 16)}-${safeName}`;
          const { error } = await supabaseClient.storage
            .from(PAYMENT_PROOF_BUCKET)
            .upload(objectPath, file, {
              cacheControl: '3600',
              contentType: this.paymentProofContentType(file),
              upsert: false
            });

          if (error) throw error;
          return objectPath;
        },

        paymentProofPath(submission) {
          return submission?.proof_file_path
            || submission?.proof_image_path
            || submission?.proof_image_url
            || submission?.payment_submissions?.proof_image_path
            || submission?.payment_submissions?.proof_image_url
            || submission?.submission?.proof_image_path
            || submission?.submission?.proof_image_url
            || '';
        },

        maintenancePhotoPath(request) {
          return request?.photo_path || request?.photo_url || '';
        },

        async openPrivateImage(bucket, path, fileName, errorScope) {
          if (!path) return;

          if (/^https?:\/\//i.test(path)) {
            window.open(path, '_blank', 'noopener,noreferrer');
            return;
          }

          const imageWindow = window.open('', '_blank');
          if (imageWindow) imageWindow.opener = null;

          const { data, error } = await supabaseClient.storage
            .from(bucket)
            .createSignedUrl(path, 300, { download: fileName || 'image' });

          if (error) {
            if (imageWindow) imageWindow.close();
            this.setImageUploadError(errorScope, error.message);
            return;
          }

          if (imageWindow) {
            imageWindow.location.href = data.signedUrl;
          } else {
            window.open(data.signedUrl, '_blank', 'noopener,noreferrer');
          }
        },

        openPaymentProof(submission) {
          return this.openPrivateImage(
            PAYMENT_PROOF_BUCKET,
            this.paymentProofPath(submission),
            submission?.proof_file_name || submission?.proof_image_name || submission?.payment_submissions?.proof_image_name || submission?.submission?.proof_image_name || 'payment-proof',
            this.currentShell === 'tenant' ? 'tenant' : 'payments'
          );
        },

        openMaintenancePhoto(request) {
          return this.openPrivateImage(
            MAINTENANCE_PHOTO_BUCKET,
            this.maintenancePhotoPath(request),
            request?.photo_name || 'maintenance-photo',
            this.currentShell === 'tenant' ? 'tenant' : 'maintenance'
          );
        },

        async attachPaymentProof(submission, file, landlordId) {
          if (!file || !submission?.id) return;

          const objectPath = await this.uploadPaymentProofFile(landlordId, submission.id, file);
          const { error } = await supabaseClient.rpc('attach_payment_proof', {
            p_submission_id: submission.id,
            p_path: objectPath,
            p_name: file.name,
            p_size: file.size
          });

          if (error) {
            await supabaseClient.storage.from(PAYMENT_PROOF_BUCKET).remove([objectPath]);
            throw error;
          }
        },

        async attachPaymentRecordProof(payment, file, landlordId) {
          if (!file || !payment?.id) return;

          const objectPath = await this.uploadPaymentProofFile(landlordId, payment.id, file);
          const { error } = await supabaseClient.rpc('attach_payment_record_proof', {
            p_payment_id: payment.id,
            p_path: objectPath,
            p_name: file.name,
            p_size: file.size
          });

          if (error) {
            await supabaseClient.storage.from(PAYMENT_PROOF_BUCKET).remove([objectPath]);
            throw error;
          }
        },

        async attachMaintenancePhoto(request, file) {
          if (!file || !request?.id) return;

          const objectPath = await this.uploadPrivateImage(MAINTENANCE_PHOTO_BUCKET, request.landlord_id, request.id, file);
          const { error } = await supabaseClient.rpc('attach_maintenance_photo', {
            p_request_id: request.id,
            p_path: objectPath,
            p_name: file.name,
            p_size: file.size
          });

          if (error) {
            await supabaseClient.storage.from(MAINTENANCE_PHOTO_BUCKET).remove([objectPath]);
            throw error;
          }
        },

        async viewTenant(tenant) {
          if (!this.canViewTenants()) {
            this.tenantLease.error = 'You do not have permission to view tenants.';
            return;
          }
          this.tenantLease.selectedTenant = tenant;
          this.tenantLease.selectedTenantLeases = this.tenantLease.leases.filter(lease => lease.tenant_id === tenant.id);
          const leaseIds = this.tenantLease.selectedTenantLeases.map(lease => lease.id);

          if (leaseIds.length === 0 || !this.canViewFinancials()) {
            this.tenantLease.selectedTenantPayments = [];
            return;
          }

          const { data, error } = await supabaseClient
            .from('payments')
            .select('id, lease_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, payment_purpose, purpose_description, is_historical, notes, receipt_number, created_at')
            .in('lease_id', leaseIds)
            .order('payment_date', { ascending: false });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          this.tenantLease.selectedTenantPayments = data || [];
        },

        tenantsAvailableForLease() {
          const activeTenantIds = new Set(this.tenantLease.leases.filter(lease => lease.status === 'active').map(lease => lease.tenant_id));
          return this.tenantLease.tenants.filter(tenant => this.tenantLinkAccepted(tenant) && !activeTenantIds.has(tenant.id));
        },

        vacantUnitsForLeaseForm() {
          return this.tenantLease.units.filter(unit => {
            const propertyMatches = !this.tenantLease.leaseForm.propertyId || unit.property_id === this.tenantLease.leaseForm.propertyId;
            return propertyMatches && unit.status === 'vacant';
          });
        },

        prefillLeaseRent() {
          const unit = this.tenantLease.units.find(item => item.id === this.tenantLease.leaseForm.unitId);
          if (unit) this.tenantLease.leaseForm.rent = Number(unit.monthly_rent || 0);
        },

        async addLeaseFromPage() {
          this.tenantLease.error = '';
          if (!this.canAssignTenantToUnit()) {
            this.tenantLease.error = 'You need lease, unit, and tenant permissions to create a lease.';
            return;
          }
          this.tenantLease.saving = true;

          try {
            const documentFile = this.tenantLease.leaseForm.documentFile;
            let uploadWarning = '';
            const lease = await this.createLease({
              unitId: this.tenantLease.leaseForm.unitId,
              tenantId: this.tenantLease.leaseForm.tenantId,
              startDate: this.tenantLease.leaseForm.startDate,
              endDate: this.tenantLease.leaseForm.endDate,
              monthlyRent: this.tenantLease.leaseForm.rent,
              depositAmount: this.tenantLease.leaseForm.depositAmount,
              depositPaid: this.tenantLease.leaseForm.depositPaid
            });

            if (documentFile) {
              try {
                await this.uploadLeaseDocument(lease, documentFile);
              } catch (error) {
                uploadWarning = `Lease was created, but the PDF upload failed: ${error.message}`;
              }
            }

            this.tenantLease.leaseForm = {
              tenantId: '',
              propertyId: '',
              unitId: '',
              startDate: '',
              endDate: '',
              rent: 0,
              depositAmount: 0,
              depositPaid: false,
              documentFile: null
            };
            if (this.$refs.leaseDocumentInput) this.$refs.leaseDocumentInput.value = '';
            this.tenantLease.showLeaseForm = false;
            await this.loadTenantLeaseData();
            await this.loadPropertyUnitData();
            await this.loadDashboardData();
            if (uploadWarning) this.tenantLease.error = uploadWarning;
          } catch (error) {
            this.tenantLease.error = error.message;
          }

          this.tenantLease.saving = false;
        },

        async viewLease(lease) {
          this.tenantLease.selectedLease = lease;
          this.tenantLease.selectedLeaseDocumentFile = null;
          if (this.$refs.selectedLeaseDocumentInput) this.$refs.selectedLeaseDocumentInput.value = '';
          const { data, error } = await supabaseClient
            .from('payments')
            .select('id, lease_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, payment_purpose, purpose_description, is_historical, notes, receipt_number, created_at')
            .eq('lease_id', lease.id)
            .order('payment_date', { ascending: false });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          this.tenantLease.selectedLeasePayments = data || [];
        },

        async loadMyAccountData() {
          if (!['landlord', 'management_leader'].includes(this.profile?.role) && !(this.profile?.role === 'staff' && this.profile?.staff_type === 'freelancer')) return;

          this.beginDataLoad('account', this.account);
          this.account.error = '';

          let data = null;
          let error = null;

          if (this.profile.role === 'staff' && this.profile.staff_type === 'freelancer') {
            data = {
              id: this.profile.id,
              landlord_id: this.profile.id,
              subscription_plan: this.inferIpmPlanStatus(this.profile).split(':')[0],
              status: this.profile.staff_subscription_status || 'free',
              expires_at: this.profile.staff_subscription_expires_at || null,
              access_suspended_at: this.profile.access_suspended_at || null,
              landlord_limit: Number(this.profile.staff_max_landlords || 2),
              notes: 'IPMs can request access to landlords using their landlord code. Extra landlord access depends on the subscription limit set by admin.',
              created_at: this.profile.created_at,
              updated_at: null
            };
          } else if (this.profile.role === 'management_leader') {
            const result = await supabaseClient
              .from('management_companies')
              .select('id, leader_profile_id, company_name, subscription_status, subscription_expires_at, access_suspended_at, access_suspended_by, max_landlords, max_properties, max_staff, notes, created_at')
              .eq('leader_profile_id', this.profile.id)
              .maybeSingle();

            error = result.error;
            data = result.data
              ? {
                id: result.data.id,
                landlord_id: result.data.leader_profile_id,
                subscription_plan: this.inferPmcPlanStatus(result.data).split(':')[0],
                status: result.data.subscription_status || 'trial',
                expires_at: result.data.subscription_expires_at,
                access_suspended_at: result.data.access_suspended_at || null,
                landlord_limit: result.data.max_landlords,
                property_limit: result.data.max_properties,
                staff_limit: result.data.max_staff,
                notes: result.data.notes,
                created_at: result.data.created_at,
                updated_at: null
              }
              : null;
          } else {
            const result = await supabaseClient
              .from('landlord_subscriptions')
              .select('id, landlord_id, subscription_plan, status, expires_at, access_suspended_at, access_suspended_by, property_limit, unit_limit, personal_staff_limit, partner_connection_limit, notes, updated_at, created_at')
              .eq('landlord_id', this.profile.id)
              .maybeSingle();

            error = result.error;
            data = result.data || null;
          }

          if (error) {
            this.account.error = error.message;
          }

          this.account.subscription = data || null;
          this.finishDataLoad('account', this.account);
        },

        accountDaysRemaining() {
          if (!this.account.subscription?.expires_at) return '-';
          const days = this.daysUntil(this.account.subscription.expires_at.slice(0, 10));
          if (days < 0) return 'Expired';
          if (days === 0) return 'Expires today';
          return `${days} days`;
        },

        loadSettingsData() {
          this.settings.error = '';
          this.settings.message = '';
          this.settings.profileForm = {
            fullName: this.profile?.full_name || '',
            phone: this.profile?.phone || '',
            email: this.profile?.email || ''
          };
          this.settings.passwordForm = {
            password: '',
            confirmPassword: ''
          };
          if (this.profile?.role === 'tenant') {
            this.loadTenantSettingsLandlords();
          } else {
            this.settings.tenantLandlords = [];
          }
        },

        async loadTenantSettingsLandlords() {
          this.settings.error = '';
          const { data, error } = await supabaseClient.rpc('tenant_landlord_relationships');
          if (error) {
            this.settings.error = this.friendlyDatabaseError(error, 'Accepted landlords could not be loaded.');
            this.settings.tenantLandlords = [];
            return;
          }
          this.settings.tenantLandlords = data || [];
        },

        async dropTenantLandlord(relationship) {
          if (!relationship?.tenant_id) return;
          if (!relationship.can_drop) {
            this.settings.error = 'You can drop this landlord after the unit is marked vacant.';
            return;
          }
          const confirmed = await this.requestConfirm({
            title: 'Drop landlord',
            message: `Drop ${relationship.landlord_name || 'this landlord'}? They will no longer see you in their accepted tenants list. Your old lease and payment records stay safely stored with them.`,
            confirmText: 'Drop Landlord',
            tone: 'danger'
          });
          if (!confirmed) return;

          this.settings.error = '';
          this.settings.message = '';
          const { error } = await supabaseClient.rpc('drop_tenant_landlord', {
            p_tenant_id: relationship.tenant_id
          });
          if (error) {
            this.settings.error = this.friendlyDatabaseError(error, 'Landlord could not be dropped yet.');
            return;
          }
          this.settings.message = 'Landlord dropped.';
          await this.loadTenantSettingsLandlords();
          await this.loadTenantData();
        },

        async saveProfileSettings() {
          if (!this.profile?.id) return;

          this.settings.error = '';
          this.settings.message = '';
          this.settings.savingProfile = true;

          const { data, error } = await supabaseClient
            .from('profiles')
            .update({
              full_name: this.settings.profileForm.fullName,

            })
            .eq('id', this.profile.id)

        async loadNotifications() {
          if (!this.profile?.id) return;

          this.beginDataLoad('notifications', this.notifications);
          this.notifications.error = '';

          const { data, error } = await supabaseClient
            .from('notifications')
            .select('id, profile_id, landlord_id, type, message, related_id, response_status, is_read, created_at')
            .eq('profile_id', this.profile.id)
            .order('created_at', { ascending: false })
            .limit(80);

          if (error) {
            this.notifications.error = error.message;
            this.finishDataLoad('notifications', this.notifications);
            return;
          }

          this.notifications.items = data || [];
          this.finishDataLoad('notifications', this.notifications);
        },

        async markAllNotificationsRead() {
          if (!this.profile?.id) return;

          this.notifications.error = '';
          this.notifications.saving = true;

          const { error } = await supabaseClient
            .from('notifications')
            .update({ is_read: true })
            .eq('profile_id', this.profile.id)
            .eq('is_read', false);

          if (error) {
            this.notifications.error = error.message;
            this.notifications.saving = false;
            return;
          }

          this.notifications.items = this.notifications.items.map(item => ({ ...item, is_read: true }));
          this.unreadCount = 0;
          this.notifications.saving = false;
        },

        async respondTenantLinkRequest(notification, accept) {
          if (!notification?.related_id) return;

          this.notifications.error = '';
          this.notifications.saving = true;

          const { error } = await supabaseClient.rpc('respond_tenant_link_request', {
            p_tenant_id: notification.related_id,
            p_accept: Boolean(accept)
          });

          if (error) {
            this.notifications.error = this.friendlyDatabaseError(error, 'This tenant request could not be updated. Please refresh and try again.');
            this.notifications.saving = false;
            return;
          }

          notification.response_status = accept ? 'accepted' : 'rejected';
          notification.is_read = true;
          this.notifications.items = this.notifications.items.map(item => item.id === notification.id ? { ...item, response_status: notification.response_status, is_read: true } : item);
          await this.loadNotifications();
          await this.loadUnreadCount(this.profile.id);
          if (accept) {
            await this.loadTenantData();
            await this.loadTenantSettingsLandlords();
            this.successMessage = 'Tenant request accepted.';
          } else {
            await this.loadTenantSettingsLandlords();
            this.successMessage = 'Tenant request rejected.';
          }
          this.notifications.saving = false;
        },

        tenantRequestStatus(notification) {
          if (notification?.type !== 'tenant_link_request') return '';
          const status = String(notification?.response_status || 'pending').toLowerCase();
          return ['accepted', 'rejected'].includes(status) ? status : 'pending';
        },

        async openNotification(notification) {
          if (!notification) return;

          if (!notification.is_read) {
            const { error } = await supabaseClient
              .from('notifications')
              .update({ is_read: true })
              .eq('id', notification.id);

            if (!error) {
              notification.is_read = true;
              this.notifications.items = this.notifications.items.map(item => item.id === notification.id ? { ...item, is_read: true } : item);
              await this.loadUnreadCount(this.profile.id);
            }
          }

          const targetPage = this.notificationTargetPage(notification);
          if (targetPage && targetPage !== this.currentPage) {
            await this.navigate(targetPage);
          }
        },

        notificationTargetPage(notification) {
          const type = notification?.type || '';

          if (this.currentShell === 'tenant') {
            const tenantTargets = {
              payment_approved: 'tenant-payments',
              payment_rejected: 'tenant-payments',
              maintenance_updated: 'tenant-maintenance',
              rent_due: 'tenant-home',
              lease_expiring: 'tenant-home'
            };
            return tenantTargets[type] || 'tenant-notifications';
          }

          if (this.currentShell !== 'app') return '';

          const appTargets = {
            payment_submitted: 'payments',
            payment_approved: 'payments',
            payment_rejected: 'payments',
            maintenance_new: 'maintenance',
            maintenance_updated: 'maintenance',
            lease_expiring: 'leases',
            rent_due: 'leases'
          };
          const target = appTargets[type] || '';
          if (!target) return '';
          if (target === 'payments' && !this.canShowAppPage('payments')) return '';
          if (target === 'maintenance' && !this.canShowAppPage('maintenance')) return '';
          if (target === 'leases' && !this.canShowAppPage('leases')) return '';
          return target;
        },

        notificationTypeLabel(type) {
          const labels = {
            payment_submitted: 'Payment Submitted',
            payment_approved: 'Payment Approved',
            payment_rejected: 'Payment Rejected',
            lease_expiring: 'Lease Expiring',
            maintenance_new: 'Maintenance Request',
            maintenance_updated: 'Maintenance Updated',
            rent_due: 'Rent Due',
            tenant_link_request: 'Tenant Link Request'
          };
          return labels[type] || this.titleCase(type);
        },

        notificationIcon(type) {
          if (type?.startsWith('payment')) return 'card';
          if (type?.startsWith('maintenance')) return 'wrench';
          if (type === 'lease_expiring' || type === 'rent_due') return 'file';
          return 'bell';
        },

        formatDateTime(value) {
          if (!value) return '-';
          return new Intl.DateTimeFormat(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          }).format(new Date(value));
        },

        accountRealtimeTables() {
          return new Set([
            'profiles',

        startRealtimeSync() {
          this.stopRealtimeSync();
          if (!this.user?.id || ['login', 'invite', 'suspended'].includes(this.currentShell)) return;

          const channel = supabaseClient.channel(`mushavo-live-${this.user.id}`);
          this.realtimeTables().forEach(table => {
            channel.on(
              'postgres_changes',
              { event: '*', schema: 'public', table },
              payload => this.handleRealtimeChange(payload)
            );
          });

          channel.subscribe(status => {
            if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
              this.scheduleRealtimeRefresh();
            }
          });

          this.realtimeChannel = channel;
        },

        stopRealtimeSync() {
          if (this.realtimeRefreshTimer) {
            window.clearTimeout(this.realtimeRefreshTimer);
            this.realtimeRefreshTimer = null;
          }
          if (this.realtimeProfileTimer) {
            window.clearTimeout(this.realtimeProfileTimer);
            this.realtimeProfileTimer = null;
          }
          if (this.realtimeUnreadTimer) {
            window.clearTimeout(this.realtimeUnreadTimer);
            this.realtimeUnreadTimer = null;
          }
          if (this.realtimeChannel) {
            supabaseClient.removeChannel(this.realtimeChannel);
            this.realtimeChannel = null;
          }
          this.realtimeRefreshInProgress = false;
        },

        handleRealtimeChange(payload) {
          const table = payload?.table || '';
          if (!this.user || ['login', 'invite', 'suspended'].includes(this.currentShell)) return;

          if (table === 'notifications') {
            this.scheduleUnreadRealtimeRefresh();
          }

          if (this.accountRealtimeTables().has(table)) {
            this.scheduleRealtimeProfileRefresh();
            return;
          }

          this.scheduleRealtimeRefresh();
        },

        scheduleUnreadRealtimeRefresh() {
          if (!this.profile?.id) return;
          window.clearTimeout(this.realtimeUnreadTimer);
          this.realtimeUnreadTimer = window.setTimeout(async () => {
            await this.loadUnreadCount(this.profile.id);
            if (this.currentPage === 'notifications' || this.currentPage === 'tenant-notifications') {
              await this.loadNotifications();
            }
          }, 500);
        },

        scheduleRealtimeRefresh() {
          if (this.realtimeRefreshTimer) window.clearTimeout(this.realtimeRefreshTimer);
          this.realtimeRefreshTimer = window.setTimeout(async () => {
            if (!this.user || this.realtimeRefreshInProgress || ['login', 'invite', 'suspended'].includes(this.currentShell)) return;
            this.realtimeRefreshInProgress = true;
            try {
              await this.refreshCurrentPage();
              if (this.profile?.id) await this.loadUnreadCount(this.profile.id);
            } finally {
              this.realtimeRefreshInProgress = false;
            }
          }, 700);
        },

        scheduleRealtimeProfileRefresh() {
          if (this.realtimeProfileTimer) window.clearTimeout(this.realtimeProfileTimer);
          this.realtimeProfileTimer = window.setTimeout(async () => {
            if (!this.user || ['login', 'invite'].includes(this.currentShell)) return;
            const activeUser = this.user;
            await this.loadAuthenticatedUser(activeUser);
          }, 900);
        },

        async checkSignupIdentityAvailable(email, phone) {
          const normalizedEmail = String(email || '').trim().toLowerCase();
          const normalizedPhone = String(phone || '').replace(/\D/g, '');

          if (!normalizedEmail || normalizedPhone.length < 6) {
            return {
              available: false,
              message: 'Enter a valid email and phone number before creating the account.'
            };
          }

          const { data, error } = await supabaseClient.rpc('signup_identity_exists', {
            p_email: normalizedEmail,
            p_phone: phone || ''
          });

          if (error) {
            return {
              available: false,
              message: 'Mushavo could not safely check whether this account already exists. Please contact Mushavo support.'
            };
          }

          if (data === true) {
            return {
              available: false,
              message: 'Your account already exists. Please contact Mushavo support.'
            };
          }

          return { available: true, message: '' };
        },

        async checkTenantSignupIdentityAvailable(email, phone, idNumber) {
          const normalizedEmail = String(email || '').trim().toLowerCase();
          const normalizedPhone = String(phone || '').replace(/\D/g, '');
          const normalizedId = String(idNumber || '').trim();

          if (!normalizedEmail || normalizedPhone.length < 6 || !normalizedId) {
            return {
              available: false,
              message: 'Enter a valid email, phone number, and national ID number before creating the account.'
            };
          }

          const { data, error } = await supabaseClient.rpc('tenant_signup_identity_exists', {
            p_email: normalizedEmail,
            p_phone: phone || '',
            p_id_number: normalizedId
          });

          if (error) {
            return {
              available: false,
              message: 'Mushavo could not safely check whether this tenant account already exists. Please contact Mushavo support.'
            };
          }

          if (data === true) {
            return {
              available: false,
              message: 'Your account already exists. Please contact Mushavo support.'
            };
          }

          return { available: true, message: '' };
        },
