        async attachAdminStaffCountries(profile) {
          if (!profile || profile.role !== 'admin_staff') return profile;
          const countryIds = this.normalizeCountryIds(profile.country_ids || (profile.country_id ? [profile.country_id] : []));
          const { data, error } = await supabaseClient
            .from('admin_staff_country_assignments')
            .select('country_id')
            .eq('staff_profile_id', profile.id);
          if (!error) {
            (data || []).forEach(row => {
              if (row.country_id) countryIds.push(row.country_id);
            });
          }
          profile.country_ids = this.normalizeCountryIds(countryIds);
          if (!profile.country_id && profile.country_ids.length) profile.country_id = profile.country_ids[0];
          return profile;
        },

        async loadAuthenticatedUser(authUser) {
          const previousShell = this.currentShell;
          const previousPage = this.currentPage;

          this.booting = true;
          this.stopRealtimeSync();
          this.user = authUser;
          this.loadedDataSections = {};
          this.authError = '';
          this.clearSubscriptionPause();

          let { data: profile, error: profileError } = await this.withTimeout(
            supabaseClient
              .from('profiles')
              .select('*')
              .eq('id', authUser.id)
              .maybeSingle(),
            12000,
            'Profile loading is taking too long. Please refresh once or sign in again.'
          );

          if (profileError || !profile) {
            if (authUser.user_metadata?.mushavo_signup === 'landlord_free') {
              const { error: registerError } = await supabaseClient.rpc('register_free_landlord', {
                p_full_name: authUser.user_metadata?.full_name || authUser.email || 'Landlord',
                p_phone: authUser.user_metadata?.phone || ''
              });
              if (!registerError) {
                const retry = await supabaseClient
                  .from('profiles')
                  .select('*')
                  .eq('id', authUser.id)
                  .maybeSingle();
                profile = retry.data;
                profileError = retry.error;
              }
            }

            if ((profileError || !profile) && authUser.user_metadata?.mushavo_signup === 'tenant_direct') {
              const { error: registerError } = await supabaseClient.rpc('register_tenant_account', {
                p_full_name: authUser.user_metadata?.full_name || authUser.email || 'Tenant',
                p_phone: authUser.user_metadata?.phone || '',
                p_id_number: authUser.user_metadata?.id_number || ''
              });
              if (!registerError) {
                const retry = await supabaseClient
                  .from('profiles')
                  .select('*')
                  .eq('id', authUser.id)
                  .maybeSingle();
                profile = retry.data;
                profileError = retry.error;
              }
            }
          }

          if (profileError || !profile) {
            const { data: fallbackProfile, error: fallbackError } = await supabaseClient.rpc('get_current_profile');
            if (!fallbackError && fallbackProfile) {
              profile = Array.isArray(fallbackProfile) ? fallbackProfile[0] : fallbackProfile;
              profileError = null;
            }
          }

          if (profileError || !profile) {
            await supabaseClient.auth.signOut();
            this.authError = profileError?.message
              ? `Your login exists, but Mushavo could not load your profile: ${profileError.message}`
              : 'Your account does not exist or has been removed. Please contact your landlord or Mushavo administrator.';
            this.currentShell = 'login';
            this.booting = false;
            return;
          }

          if (profile.archived_at) {
            await supabaseClient.auth.signOut();
            this.authError = 'Your account has been archived. Please contact your landlord or Mushavo administrator.';
            this.currentShell = 'login';
            this.booting = false;
            return;
          }

          if (profile.role === 'admin_staff') {
            profile = await this.attachAdminStaffCountries(profile);
          }

          this.profile = profile;

          if (profile.role === 'super_admin' || profile.role === 'admin_staff') {
            if (profile.role === 'admin_staff' && profile.staff_subscription_status === 'suspended') {
              await supabaseClient.auth.signOut();
              this.authError = 'Your admin staff account is suspended. Please contact the Mushavo administrator.';
              this.currentShell = 'login';
              this.booting = false;
              return;
            }
            if (profile.role === 'admin_staff' && !this.normalizeCountryIds(profile.country_ids || (profile.country_id ? [profile.country_id] : [])).length) {
              await supabaseClient.auth.signOut();
              this.authError = 'Your admin staff account does not have a country assigned yet. Please contact the Mushavo administrator.';
              this.currentShell = 'login';
              this.booting = false;
              return;
            }
            this.currentShell = 'super_admin';
            if (profile.role === 'admin_staff') this.admin.selectedCountryId = profile.country_ids?.[0] || profile.country_id;
            this.currentPage = this.resolveActivePage('admin-dashboard', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            if (!this.admin.financeForm.paidAt) this.resetAdminFinanceForm();
            this.booting = false;
            this.startRealtimeSync();
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'landlord') {
            const hasAccess = await this.withTimeout(
              this.checkLandlordSubscription(profile.id),
              12000,
              'Subscription check is taking too long. Please refresh once.'
            );
            if (!hasAccess) {
              this.currentShell = 'suspended';
              this.booting = false;
              return;
            }

            this.currentShell = 'app';
            this.currentPage = this.resolveActivePage('dashboard', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            this.startRealtimeSync();
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'staff') {
            const hasStaffAccess = await this.withTimeout(
              this.loadStaffPermissions(profile.id),
              12000,
              'Staff permissions are taking too long. Please refresh once.'
            );
            if (!hasStaffAccess) {
              if (this.accessPaused) {
                this.currentShell = 'suspended';
              } else {
                await supabaseClient.auth.signOut();
                this.authError = 'Your staff account is waiting for landlord approval. Please try again after the landlord approves your request.';
                this.currentShell = 'login';
              }
              this.booting = false;
              return;
            }
            this.currentShell = 'app';
            this.currentPage = previousShell === 'app' && this.isPageAllowed(previousPage)
              ? previousPage
              : (profile.staff_type === 'freelancer' ? 'management-landlords' : 'dashboard');
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            this.startRealtimeSync();
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'management_leader') {
            const hasManagementAccess = await this.withTimeout(
              this.loadManagementPermissions(profile.id),
              12000,
              'PMC account loading is taking too long. Please refresh once.'
            );
            if (!hasManagementAccess) {
              if (this.accessPaused) {
                this.currentShell = 'suspended';
              } else {
                await supabaseClient.auth.signOut();
                this.authError = 'Your Property Management Company (PMC) account is not active. Please contact the Mushavo administrator.';
                this.currentShell = 'login';
              }
              this.booting = false;
              return;
            }
            this.currentShell = 'app';
            this.currentPage = previousShell === 'app' && this.isPageAllowed(previousPage) ? previousPage : 'dashboard';
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            this.startRealtimeSync();
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'management_staff') {
            const hasManagementStaffAccess = await this.withTimeout(
              this.loadManagementStaffPermissions(profile.id),
              12000,
              'PMC staff permissions are taking too long. Please refresh once.'
            );
            if (!hasManagementStaffAccess) {
              if (this.accessPaused) {
                this.currentShell = 'suspended';
              } else {
                await supabaseClient.auth.signOut();
                this.authError = 'Your PMC staff account could not be loaded. Please ask your PMC leader to resend the invite.';
                this.currentShell = 'login';
              }
              this.booting = false;
              return;
            }
            this.currentShell = 'app';
            this.currentPage = this.resolveActivePage('dashboard', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            this.startRealtimeSync();
            await this.refreshCurrentPage();
            return;
          }

          if (profile.role === 'tenant') {
            this.currentShell = 'tenant';
            this.currentPage = this.resolveActivePage('tenant-home', previousShell, previousPage);
            this.pageTitle = this.titleForPage(this.currentPage);
            this.storeCurrentPage(this.currentPage);
            await this.loadUnreadCount(profile.id);
            this.startUnreadRefresh(profile.id);
            this.loadSettingsData();
            this.booting = false;
            this.startRealtimeSync();
            await this.refreshCurrentPage();
            return;
          }

          await supabaseClient.auth.signOut();
          this.authError = 'This account role is not supported.';
          this.currentShell = 'login';
          this.booting = false;
        },

        async checkLandlordSubscription(landlordId) {
          const { data, error } = await supabaseClient
            .from('landlord_subscriptions')
            .select('status, expires_at, access_suspended_at, access_suspended_by, notes, subscription_plan, property_limit, unit_limit, personal_staff_limit, partner_connection_limit')
            .eq('landlord_id', landlordId)
            .maybeSingle();

          if (error || !data) {
            this.subscription = null;
            this.markSubscriptionPaused();
            return false;
          }

          this.subscription = data;
          if (this.isSubscriptionAccessSuspended(data)) {
            this.markAccountSuspended();
            return false;
          }
          const expiresAt = new Date(data.expires_at);
          const activeStatus = data.status === 'active' || data.status === 'trial';
          const freeActivePlan = data.subscription_plan === 'free' && data.status === 'active';
          const hasAccess = freeActivePlan || (activeStatus && expiresAt.getTime() > Date.now());
          if (!hasAccess) this.markSubscriptionPaused();
          return hasAccess;
        },

        async loadStaffPermissions(staffProfileId) {
          if (this.profile?.staff_type === 'freelancer') {
            const status = this.profile.staff_subscription_status || 'free';
            const expired = this.profile.staff_subscription_expires_at && this.daysUntil(this.profile.staff_subscription_expires_at) < 0;
            if (this.profile.access_suspended_at || status === 'suspended') {
              this.markAccountSuspended();
              return false;
            }
            if (expired) {
              this.markSubscriptionPaused();
              return false;
            }
          }

          const [permissionsResult, requestsResult] = await Promise.all([
            supabaseClient
              .from('staff_permissions')
              .select('*, landlord:profiles!staff_permissions_landlord_id_fkey(id, full_name, email, phone, landlord_code)')
              .eq('staff_profile_id', staffProfileId)
              .eq('status', 'approved')
              .order('accepted_at', { ascending: true }),
            supabaseClient
              .from('staff_landlord_requests')
              .select('id, staff_profile_id, landlord_id, landlord_code, status, requested_at, landlord:profiles!staff_landlord_requests_landlord_id_fkey(id, full_name, email, phone, landlord_code)')
              .eq('staff_profile_id', staffProfileId)
              .eq('status', 'pending')
              .order('requested_at', { ascending: false })
          ]);

          if (permissionsResult.error || requestsResult.error) return false;

          this.staffContext.relationships = permissionsResult.data || [];
          this.staffContext.requests = requestsResult.data || [];
          if (this.staffContext.relationships.length === 0) {
            if (this.profile?.staff_type === 'freelancer') {
              this.staffContext.activeLandlordId = '';
              this.permissions = this.permissionStateFromRow({});
              return true;
            }

            return false;
          }

          let activeLandlordId = this.profile?.landlord_id || '';
          if (!this.staffContext.relationships.some(row => row.landlord_id === activeLandlordId)) {
            activeLandlordId = this.staffContext.relationships[0].landlord_id;
            const { error: switchError } = await supabaseClient.rpc('switch_staff_landlord', {
              p_landlord_id: activeLandlordId
            });
            if (switchError) return false;
            this.profile.landlord_id = activeLandlordId;
          }

          this.staffContext.activeLandlordId = activeLandlordId;
          const active = this.staffContext.relationships.find(row => row.landlord_id === activeLandlordId) || this.staffContext.relationships[0];
          if (this.profile?.staff_type !== 'freelancer') {
            const landlordHasAccess = await this.checkLandlordSubscription(activeLandlordId);
            if (!landlordHasAccess) return false;
          }
          this.permissions = this.permissionStateFromRow(active);
          return true;
        },

        async loadManagementPermissions(leaderProfileId) {
          const { data: company, error: companyError } = await supabaseClient
            .from('management_companies')
            .select('id, leader_profile_id, country_id, company_name, phone, max_landlords, max_properties, max_staff, subscription_status, subscription_expires_at, access_suspended_at, access_suspended_by, notes, created_at')
            .eq('leader_profile_id', leaderProfileId)
            .is('archived_at', null)
            .maybeSingle();

          if (companyError || !company) return false;

          const status = company.subscription_status || 'trial';
          if (company.access_suspended_at || status === 'suspended') {
            this.markAccountSuspended();
            return false;
          }
          if (company.subscription_expires_at && this.daysUntil(company.subscription_expires_at) < 0) {
            this.markSubscriptionPaused();
            return false;
          }
          this.subscription = {
            status,
            subscription_plan: this.inferPmcPlanStatus(company).split(':')[0],
            expires_at: company.subscription_expires_at,
            access_suspended_at: company.access_suspended_at || null,
            property_limit: company.max_properties,
            notes: company.notes || ''
          };

          const permissionSelect = 'id, management_company_id, leader_profile_id, landlord_id, all_properties, property_ids, can_view_properties, can_add_properties, can_edit_properties, can_archive_properties, can_view_units, can_add_units, can_edit_units, can_archive_units, can_mark_units_vacant, can_view_tenants, can_add_tenants, can_edit_tenants, can_archive_tenants, can_view_leases, can_create_leases, can_edit_leases, can_terminate_leases, can_view_lease_documents, can_upload_lease_documents, can_manage_maintenance, can_create_maintenance, can_assign_maintenance, can_add_resolution_notes, can_view_payments, can_log_payments, can_reject_payments, can_view_payment_proofs, can_verify_payments, can_manage_leases, can_manage_staff, can_view_finance, status, accepted_at, landlord:profiles!management_landlord_permissions_landlord_id_fkey(id, full_name, email, phone, landlord_code)';
          const [permissionsResult, requestsResult] = await Promise.all([
            supabaseClient
              .from('management_landlord_permissions')
              .select(permissionSelect)
              .eq('management_company_id', company.id)
              .eq('status', 'approved')
              .order('accepted_at', { ascending: true }),
            supabaseClient
              .from('management_landlord_requests')
              .select('id, management_company_id, leader_profile_id, landlord_id, landlord_code, status, requested_at, landlord:profiles!management_landlord_requests_landlord_id_fkey(id, full_name, email, phone, landlord_code)')
              .eq('management_company_id', company.id)
              .eq('status', 'pending')
              .order('requested_at', { ascending: false })
          ]);

          if (permissionsResult.error || requestsResult.error) return false;

          this.managementContext.company = company;
          this.managementContext.relationships = permissionsResult.data || [];
          this.managementContext.requests = requestsResult.data || [];

          if (this.managementContext.relationships.length === 0) {
            this.managementContext.activeLandlordId = '';
            this.permissions = this.permissionStateFromRow({});
            return true;
          }

          let activeLandlordId = this.managementContext.activeLandlordId || localStorage.getItem('mushavo_management_landlord_id') || '';
          if (!this.managementContext.relationships.some(row => row.landlord_id === activeLandlordId)) {
            activeLandlordId = this.managementContext.relationships[0].landlord_id;
          }

          this.managementContext.activeLandlordId = activeLandlordId;
          localStorage.setItem('mushavo_management_landlord_id', activeLandlordId);
          const active = this.managementContext.relationships.find(row => row.landlord_id === activeLandlordId) || this.managementContext.relationships[0];
          this.permissions = this.permissionStateFromRow(active);
          return true;
        },

        async loadManagementStaffPermissions(staffProfileId) {
          const staffSelect = 'id, management_company_id, staff_profile_id, all_properties, property_ids, can_view_properties, can_add_properties, can_edit_properties, can_archive_properties, can_view_units, can_add_units, can_edit_units, can_archive_units, can_mark_units_vacant, can_view_tenants, can_add_tenants, can_edit_tenants, can_archive_tenants, can_view_leases, can_create_leases, can_edit_leases, can_terminate_leases, can_view_lease_documents, can_upload_lease_documents, can_manage_maintenance, can_create_maintenance, can_assign_maintenance, can_add_resolution_notes, can_view_payments, can_log_payments, can_reject_payments, can_view_payment_proofs, can_verify_payments, can_manage_leases, can_manage_staff, can_view_finance, status, company:management_companies!management_staff_permissions_management_company_id_fkey(id, leader_profile_id, country_id, company_name, subscription_status, subscription_expires_at, access_suspended_at)';
          const { data: staffPermission, error: staffError } = await supabaseClient
            .from('management_staff_permissions')
            .select(staffSelect)
            .eq('staff_profile_id', staffProfileId)
            .eq('status', 'approved')
            .maybeSingle();

          if (staffError || !staffPermission) return false;

          const company = staffPermission.company || {
            id: staffPermission.management_company_id,
            company_name: 'PMC',
            subscription_status: 'active',
            subscription_expires_at: null,
            access_suspended_at: null
          };
          if (staffPermission.company?.access_suspended_at || staffPermission.company?.subscription_status === 'suspended') {
            this.markAccountSuspended();
            return false;
          }
          if (staffPermission.company?.subscription_expires_at && this.daysUntil(staffPermission.company.subscription_expires_at) < 0) {
            this.markSubscriptionPaused();
            return false;
          }

          this.managementContext.company = company;
          this.managementContext.requests = [];

          if (!this.profile?.landlord_id) {
            this.managementContext.relationships = [];
            this.managementContext.activeLandlordId = '';
            this.permissions = this.permissionStateFromRow({});
            return true;
          }

          const { data: landlordPermission, error: landlordError } = await supabaseClient
            .from('management_landlord_permissions')
            .select('id, management_company_id, leader_profile_id, landlord_id, all_properties, property_ids, status, landlord:profiles!management_landlord_permissions_landlord_id_fkey(id, full_name, email, landlord_code)')
            .eq('management_company_id', staffPermission.management_company_id)
            .eq('landlord_id', this.profile.landlord_id)
            .eq('status', 'approved')
            .maybeSingle();

          if (landlordError) return false;

          if (!landlordPermission) {
            this.managementContext.relationships = [];
            this.managementContext.activeLandlordId = '';
            this.permissions = this.permissionStateFromRow({});
            return true;
          }

          this.managementContext.relationships = [landlordPermission];
          this.managementContext.activeLandlordId = this.profile.landlord_id;
          this.permissions = this.permissionStateFromRow(staffPermission);
          return true;
        },

        async loadUnreadCount(profileId) {
          const { count, error } = await supabaseClient
            .from('notifications')
            .select('id', { count: 'exact', head: true })
            .eq('profile_id', profileId)
            .eq('is_read', false);

          if (!error) {
            this.unreadCount = count || 0;
          }
        },

        async refreshCurrentPage() {
          if (this.currentShell === 'super_admin') {
            await this.loadSuperAdminData();
            if (!this.admin.financeForm.paidAt) this.resetAdminFinanceForm();
            return;
          }

          if (this.currentShell === 'app') {
            if (this.currentPage === 'dashboard') await this.loadDashboardData();
          if (this.currentPage === 'properties') await this.loadPropertyUnitData();
            if (this.currentPage === 'leases') await this.loadTenantLeaseData();
            if (this.currentPage === 'payments') await this.loadPaymentsData();
            if (this.currentPage === 'finance') await this.loadLandlordFinanceData();
            if (this.currentPage === 'maintenance') await this.loadMaintenanceData();
            if (this.currentPage === 'management-landlords') await this.loadManagementPageData();
            if (this.currentPage === 'staff') await this.loadStaffData();
            if (this.currentPage === 'notifications') await this.loadNotifications();
            if (this.currentPage === 'settings') this.loadSettingsData();
            if (this.currentPage === 'my-account') await this.loadMyAccountData();
            return;
          }

          if (this.currentShell === 'tenant') {
            if (this.currentPage === 'tenant-home' || this.currentPage === 'tenant-payments' || this.currentPage === 'tenant-maintenance') await this.loadTenantData();
            if (this.currentPage === 'tenant-notifications') await this.loadNotifications();
            if (this.currentPage === 'tenant-settings') this.loadSettingsData();
          }
        },

        async navigate(page) {
          if (!this.isPageAllowed(page)) return;

          this.currentPage = page;
          this.pageTitle = this.titleForPage(page);
          this.sidebarOpen = false;
          this.storeCurrentPage(page);

          if (page === 'dashboard' && this.currentShell === 'app') {
            await this.loadDashboardData();
          }

          if (page === 'properties' && this.currentShell === 'app') {
            await this.loadPropertyUnitData();
          }

          if (page === 'leases' && this.currentShell === 'app') {
            await this.loadTenantLeaseData();
          }

          if (page === 'payments' && this.currentShell === 'app') {
            await this.loadPaymentsData();
          }

          if (page === 'finance' && this.currentShell === 'app') {
            await this.loadLandlordFinanceData();
          }

          if ((page === 'admin-dashboard' || page === 'admin-finance' || page === 'admin-pricing' || page === 'landlord-management' || page === 'admin-tenants' || page === 'admin-enquiries' || page === 'admin-notes' || page === 'admin-team' || page === 'admin-staff' || page === 'admin-management') && this.currentShell === 'super_admin') {
            if (!this.admin.financeForm.paidAt) this.resetAdminFinanceForm();
            await this.loadSuperAdminData();
          }

          if (page === 'maintenance' && this.currentShell === 'app') {
            await this.loadMaintenanceData();
          }

          if (page === 'management-landlords' && this.currentShell === 'app') {
            if (this.profile?.role === 'management_leader') {
              await this.loadManagementPageData();
            } else if (this.profile?.role === 'staff' && this.profile?.staff_type === 'freelancer') {
              await this.loadStaffPermissions(this.profile.id);
            }
          }

          if (page === 'staff' && this.currentShell === 'app') {
            await this.loadStaffData();
          }

          if (page === 'notifications' && this.currentShell === 'app') {
            await this.loadNotifications();
          }

          if (page === 'settings' && this.currentShell === 'app') {
            this.loadSettingsData();
          }

          if (page === 'my-account' && this.currentShell === 'app') {
            await this.loadMyAccountData();
          }

          if (this.currentShell === 'tenant') {
            if (page === 'tenant-home' || page === 'tenant-payments' || page === 'tenant-maintenance') {
              await this.loadTenantData();
            }

            if (page === 'tenant-notifications') {
              await this.loadNotifications();
            }

            if (page === 'tenant-settings') {
              this.loadSettingsData();
            }
          }
        },

        titleForPage(page) {
          const titles = {
            dashboard: 'Dashboard',
            properties: 'Properties',
            tenants: 'Tenants',
            leases: 'Leases',
            payments: 'Payments',
            finance: 'Finance',
            maintenance: 'Maintenance',
            'management-landlords': 'Connected Landlords',
            staff: 'Staff',
            notifications: 'Notifications',
            'my-account': 'My Account',
            settings: 'Settings',
            'admin-dashboard': 'Dashboard',
            'admin-finance': 'Finance',
            'admin-pricing': 'Pricing',
            'admin-tenants': 'Tenant Management',
            'admin-enquiries': 'Enquiries',
            'admin-notes': 'Notes',
            'admin-team': 'Admin Staff',
            'admin-staff': 'IPM Management',
            'admin-management': 'Property Management Companies',
            'landlord-management': 'Landlord Management',
            'tenant-home': 'Home',
            'tenant-payments': 'Payments',
            'tenant-maintenance': 'Maintenance',
            'tenant-notifications': 'Notifications',
            'tenant-settings': 'Settings'
          };

          return titles[page] || 'Mushavo';
        },

        async logout() {
          this.clearStoredPage();
          await supabaseClient.auth.signOut();
          this.resetSessionState();
        },

        resetSessionState() {
          this.stopUnreadRefresh();
          this.stopRealtimeSync();
          this.clearStoredPage();
          this.user = null;
          this.profile = null;
          this.subscription = null;
          this.loadedDataSections = {};
          this.permissions = {
            all_properties: false,
            property_ids: [],
            can_view_tenants: false,
            can_manage_maintenance: false,
            can_view_payments: false,
            can_verify_payments: false,
            can_manage_leases: false
          };
          this.unreadCount = 0;
          this.notifications.items = [];
          this.dashboard.stats = {
            properties: 0,
            units: 0,
            occupied: 0,
            vacant: 0,
            pendingSubmissions: 0,
            maintenanceTotal: 0,
            maintenanceOpen: 0,
            maintenanceInProgress: 0,
            maintenanceResolved: 0
          };
          this.dashboard.recentPayments = [];
          this.dashboard.leaseExpirations = [];
          this.dashboard.selectedPayment = null;
          this.finance = {
            loading: false,
            error: '',
            payments: [],
            byProperty: [],
            stats: {
              totalRevenue: 0,
              monthRevenue: 0,
              yearRevenue: 0,
              averagePayment: 0
            }
          };
          this.tenant = {
            loading: false,
            saving: false,
            error: '',
            tenantRows: [],
            tenantRow: null,
            activeLease: null,
            leases: [],
            payments: [],
            paymentSubmissions: [],
            maintenanceRequests: [],
            paymentForm: {
              amount: 0,
              rentPeriodKey: '',
              otherDescription: '',
              date: '',
              method: 'bank_transfer',
              reference: '',
              proofFile: null
            },
            maintenanceForm: {
              priority: 'medium',
              description: '',
              photoFile: null
            }
          };
          this.settings = {
            loading: false,
            savingProfile: false,
            savingPassword: false,
            error: '',
            message: '',
            profileForm: {
              fullName: '',
              phone: '',
              email: ''
            },
            passwordForm: {
              password: '',
              confirmPassword: ''
            }
          };
          this.currentShell = 'login';
          this.currentPage = 'dashboard';
          this.pageTitle = 'Dashboard';
          this.loginForm.password = '';
          this.booting = false;
        }
      };
    }
  </script>
