        async saveAdminNote() {
          const title = String(this.admin.noteForm.title || '').trim();
          const body = String(this.admin.noteForm.body || '').trim();
          const visibility = this.admin.noteForm.visibility || 'personal';
          const assignedTo = visibility === 'assigned' ? this.admin.noteForm.assignedTo : null;
          this.admin.error = '';
          this.admin.message = '';

          if (!title) {
            this.admin.error = 'Enter a note title.';
            return;
          }

          if (visibility === 'assigned' && !assignedTo) {
            this.admin.error = 'Select the admin staff member for this note.';
            return;
          }

          this.admin.saving = true;
          const payload = {
            title,
            body,
            visibility,
            assigned_to: assignedTo,
            due_date: this.admin.noteForm.dueDate || null,
            updated_by: this.profile?.id || null
          };

          let result;
          if (this.admin.noteForm.id) {
            result = await supabaseClient
              .from('admin_notes')
              .update(payload)
              .eq('id', this.admin.noteForm.id)
              .select('id, title, body, visibility, assigned_to, created_by, status, due_date, completed_at, completed_by, updated_by, updated_at, created_at, assignee:profiles!admin_notes_assigned_to_fkey(id, full_name, email), creator:profiles!admin_notes_created_by_fkey(id, full_name, email), completer:profiles!admin_notes_completed_by_fkey(id, full_name, email)')
              .single();
          } else {
            result = await supabaseClient
              .from('admin_notes')
              .insert({
                ...payload,
                created_by: this.profile?.id
              })
              .select('id, title, body, visibility, assigned_to, created_by, status, due_date, completed_at, completed_by, updated_by, updated_at, created_at, assignee:profiles!admin_notes_assigned_to_fkey(id, full_name, email), creator:profiles!admin_notes_created_by_fkey(id, full_name, email), completer:profiles!admin_notes_completed_by_fkey(id, full_name, email)')
              .single();
          }

          this.admin.saving = false;
          if (result.error) {
            this.admin.error = this.friendlyDatabaseError(result.error, 'Note could not be saved.');
            return;
          }

          if (this.admin.noteForm.id) {
            this.admin.notes = this.admin.notes.map(note => note.id === result.data.id ? result.data : note);
            this.admin.message = 'Note updated.';
          } else {
            this.admin.notes = [result.data, ...this.admin.notes];
            this.admin.message = 'Note added.';
          }
          this.resetAdminNoteForm();
        },

            maxProperties: Number(company.max_properties || 0),
            maxStaff: Number(company.max_staff || 0),
            planStatus,
            subscriptionStatus: planStatus.split(':')[1] || 'active',
            expiresAt: this.toDateInputValue(company.subscription_expires_at || '')
          };
          this.admin.modal = 'management-edit';
        },

        resetAdminFinanceForm() {
          const today = this.toIsoDate(new Date());
          this.admin.financeForm = {
            id: '',
            payerType: 'landlord',
            accountId: '',
            landlordId: '',
            staffId: '',
            managementCompanyId: '',
            countryId: '',
            pricingPlanChoice: '',
            amount: 0,
            paidAt: today,
            periodStart: today,
            periodEnd: today,
            notes: ''
          };
        },

        async recordPlatformPayment() {
          this.admin.error = '';
          this.admin.message = '';
          this.admin.saving = true;

          const payerType = this.admin.financeForm.payerType || 'landlord';
          const accountId = this.admin.financeForm.accountId || this.admin.financeForm.landlordId || this.admin.financeForm.staffId || this.admin.financeForm.managementCompanyId || '';
          const landlord = payerType === 'landlord' ? this.admin.landlords.find(row => row.profile_id === accountId) || null : null;
          const staff = payerType === 'staff' ? this.admin.staffProfiles.find(row => row.id === accountId) || null : null;
          const managementCompany = payerType === 'management' ? this.admin.managementCompanies.find(row => row.id === accountId) || null : null;
          const staffCountryId = this.adminStaffCountryId(staff);
          const selectedPlan = this.findAdminFinancePlanOption(this.admin.financeForm.pricingPlanChoice);
          if (!selectedPlan) {
            this.admin.error = 'Select which subscription plan this payment is for.';
            this.admin.saving = false;
            return;
          }
          if (Number(this.admin.financeForm.amount || 0) <= 0) {
            this.admin.error = 'Enter the payment amount before saving.';
            this.admin.saving = false;
            return;
          }
          const payload = {
            payer_type: payerType,
            landlord_id: payerType === 'landlord' ? accountId : null,
            staff_id: payerType === 'staff' ? accountId : null,
            management_company_id: payerType === 'management' ? accountId : null,
            country_id: landlord?.country_id || staffCountryId || managementCompany?.country_id || this.admin.financeForm.countryId || null,
            payment_for: 'subscription',
            pricing_plan_id: selectedPlan?.plan?.id || null,
            plan_key: selectedPlan?.plan?.plan_key || null,
            plan_name: selectedPlan?.plan?.plan_name || null,
            billing_cycle: selectedPlan?.cycle || null,
            amount_paid: Number(this.admin.financeForm.amount || 0),
            paid_at: this.admin.financeForm.paidAt,
            period_start: this.admin.financeForm.periodStart,
            period_end: this.admin.financeForm.periodEnd,
            notes: this.admin.financeForm.notes || null,
            recorded_by: this.profile.id
          };
          const query = this.admin.financeForm.id
            ? supabaseClient.from('platform_payments').update(payload).eq('id', this.admin.financeForm.id)
            : supabaseClient.from('platform_payments').insert(payload);

          if (this.admin.financeForm.id && this.profile?.role !== 'super_admin') {
            this.admin.error = 'Only the admin can edit existing payment records.';
            this.admin.saving = false;
            return;
          }

          const { error } = await query;

          if (error) {
            this.admin.error = error.message;
            this.admin.saving = false;
            return;
          }

          this.admin.message = this.admin.financeForm.id ? 'Payment updated.' : 'Payment recorded.';
          this.admin.saving = false;
          this.resetAdminFinanceForm();
          await this.loadSuperAdminData();
        },

        editPlatformPayment(payment) {
          if (this.profile?.role !== 'super_admin') {
            this.admin.error = 'Only the admin can edit existing payment records.';
            return;
          }
          this.admin.error = '';
          this.admin.message = 'Editing payment. Update the form and click Save.';
          this.admin.financeForm = {
            id: payment.id,
            payerType: payment.payer_type || 'landlord',
            accountId: payment.payer_type === 'staff' ? payment.staff_id : (payment.payer_type === 'management' ? payment.management_company_id : payment.landlord_id),
            landlordId: payment.landlord_id || '',
            staffId: payment.staff_id || '',
            managementCompanyId: payment.management_company_id || '',
            countryId: payment.country_id || payment.landlord?.country_id || payment.staff?.country_id || payment.management_company?.country_id || '',
            pricingPlanChoice: this.adminFinancePlanChoiceForPayment(payment),
            amount: Number(payment.amount_paid || 0),
            paidAt: String(payment.paid_at || '').slice(0, 10),
            periodStart: String(payment.period_start || '').slice(0, 10),
            periodEnd: String(payment.period_end || '').slice(0, 10),
            notes: payment.notes || ''
          };
          this.$nextTick(() => {
            document.getElementById('admin-finance-form')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        },

        async deletePlatformPayment(payment) {
          if (!payment?.id) return;
          if (this.profile?.role !== 'super_admin') {
            this.admin.error = 'Only the admin can delete payment records.';
            return;
          }
          const confirmed = await this.requestConfirm({
            title: 'Delete payment record',
            message: 'Delete this platform payment record? This action cannot be undone.',
            confirmText: 'Delete'
          });
          if (!confirmed) return;

          this.admin.error = '';
          this.admin.message = '';
          this.admin.saving = true;
          const { error } = await supabaseClient
            .from('platform_payments')
            .delete()
            .eq('id', payment.id);

          if (error) {
            this.admin.error = error.message;
            this.admin.saving = false;
            return;
          }

          if (this.admin.financeForm.id === payment.id) this.resetAdminFinanceForm();
          this.admin.message = 'Payment deleted.';
          this.admin.saving = false;
          await this.loadSuperAdminData();
        },

        openEditLandlord(row) {
          this.admin.error = '';
          this.admin.message = '';
          this.admin.formError = '';
          this.admin.selectedRow = row;
          const country = this.resolveAdminCountryId(
            row.country_id
            || row.subscription?.country_id
            || row.country_name
            || row.subscription?.country_name
            || ''
          );
          this.admin.editForm = {
            fullName: row.full_name || '',
            phone: row.phone || '',
            countryId: country
          };
          this.admin.modal = 'edit';
        },

        openSubscriptionModal(row) {

          const planStatus = this.inferLandlordPlanStatus(row.subscription);
          const [plan = 'free', status = 'active'] = planStatus.split(':');

          this.admin.formError = '';

          this.admin.subscriptionForm = {
            planStatus,
            plan: plan === 'standard' ? 'custom' : plan,
            status: status === 'suspended' ? 'active' : status,
            expiresAt: this.toDateInputValue(expiresAt),

            unitLimit: Number(row.subscription?.unit_limit ?? defaults.unitLimit ?? 25),
            personalStaffLimit: Number(row.subscription?.personal_staff_limit ?? defaults.personalStaffLimit ?? 1),
            partnerConnectionLimit: Number(row.subscription?.partner_connection_limit ?? defaults.partnerConnectionLimit ?? 2),
            notes: row.subscription?.notes || '',

        countryById(countryId) {
          return (this.admin?.countries || []).find(country => country.id === countryId) || null;
        },

        pricingPlanCountryLabel(plan) {
          return plan?.country?.name || plan?.country_name || this.adminCountryName(plan?.country_id) || plan?.country_code || '-';
        },

        pricingPlanRows(accountType = '', countryId = '') {
          const rows = this.admin?.pricingPlans?.length ? this.admin.pricingPlans : this.defaultPricingPlans();
          const country = this.countryById(countryId);
          const countryCode = String(country?.code || '').toUpperCase();
          return rows
            .filter(row => !accountType || row.account_type === accountType)
            .filter(row => row.public_active !== false || this.profile?.role === 'super_admin')
            .filter(row => {
              if (!countryId) return true;
              return row.country_id === countryId || (countryCode && String(row.country_code || '').toUpperCase() === countryCode);
            })
            .sort((a, b) => Number(a.display_order || 100) - Number(b.display_order || 100));
        },

        pricingPlanStableKey(plan = {}) {
          if (plan.id) return `id:${plan.id}`;
          return [
            'plan',
            String(plan.country_id || ''),
            String(plan.country_code || '').toUpperCase(),
            String(plan.account_type || ''),
            String(plan.plan_key || '')
          ].join(':');
        },

        adminFinanceAccountType() {
          const payerType = this.admin?.financeForm?.payerType || 'landlord';
          if (payerType === 'staff') return 'ipm';
          if (payerType === 'management') return 'pmc';
          return 'landlord';
        },

        adminFinanceSelectedAccountCountryId() {
          const form = this.admin?.financeForm || {};
          const accountId = form.accountId || form.landlordId || form.staffId || form.managementCompanyId || '';
          if (!accountId) return form.countryId || (this.admin?.selectedCountryId && !['all', 'unassigned'].includes(this.admin.selectedCountryId) ? this.admin.selectedCountryId : '');
          if ((form.payerType || 'landlord') === 'staff') {
            return this.adminStaffCountryId((this.admin.staffProfiles || []).find(row => row.id === accountId)) || form.countryId || '';
          }
          if (form.payerType === 'management') {
            return (this.admin.managementCompanies || []).find(row => row.id === accountId)?.country_id || form.countryId || '';
          }
          return (this.admin.landlords || []).find(row => row.profile_id === accountId)?.country_id || form.countryId || '';
        },

        adminFinancePlanOptions() {
          const accountType = this.adminFinanceAccountType();
          const countryId = this.adminFinanceSelectedAccountCountryId();
          const rows = this.pricingPlanRows(accountType, countryId);
          const options = [];
          rows.forEach(plan => {
            const baseKey = this.pricingPlanStableKey(plan);
            ['monthly', 'yearly'].forEach(cycle => {
              const amountKey = cycle === 'yearly' ? 'yearly_amount' : 'monthly_amount';
              const amount = Number(plan[amountKey] || 0);
              if (amount <= 0 && !plan.custom_price_label) return;
              const priceLabel = this.formatPricingAmount(plan.currency_code, amount, plan.custom_price_label);
              const cycleLabel = cycle === 'yearly' ? 'Yearly' : 'Monthly';
              options.push({
                value: `${baseKey}|${cycle}`,
                label: `${plan.plan_name || this.titleCase(plan.plan_key)} - ${cycleLabel} (${priceLabel})`,
                plan,
                cycle,
                amount
              });
            });
          });
          return options;
        },

        findAdminFinancePlanOption(value = '') {
          if (!value) return null;
          return this.adminFinancePlanOptions().find(option => option.value === value) || null;
        },

        resetAdminFinancePlanSelection() {
          this.admin.financeForm.pricingPlanChoice = '';
          this.admin.financeForm.amount = 0;
        },

        applyAdminFinancePlanSelection() {
          const option = this.findAdminFinancePlanOption(this.admin.financeForm.pricingPlanChoice);
          if (!option) return;
          this.admin.financeForm.amount = Number(option.amount || 0);
        },

        adminFinancePlanChoiceForPayment(payment = {}) {
          if (!payment?.plan_key && !payment?.pricing_plan_id) return '';
          const accountType = payment.payer_type === 'staff' ? 'ipm' : payment.payer_type === 'management' ? 'pmc' : 'landlord';
          const cycle = payment.billing_cycle || 'monthly';
          const rows = this.pricingPlanRows(accountType, payment.country_id || '');
          const plan = rows.find(row => payment.pricing_plan_id && row.id === payment.pricing_plan_id)
            || rows.find(row => String(row.plan_key || '').toLowerCase() === String(payment.plan_key || '').toLowerCase())
            || this.pricingPlanRows(accountType, '').find(row => String(row.plan_key || '').toLowerCase() === String(payment.plan_key || '').toLowerCase());
          return plan ? `${this.pricingPlanStableKey(plan)}|${cycle}` : '';
        },

        platformPaymentPlanLabel(payment = {}) {
          const name = payment.plan_name || payment.pricing_plan?.plan_name || (payment.plan_key ? this.titleCase(payment.plan_key) : '');
          const cycle = payment.billing_cycle ? this.titleCase(payment.billing_cycle) : '';
          if (!name && !cycle) return 'Subscription';
          return [name || 'Subscription', cycle].filter(Boolean).join(' - ');
        },

        pricingPlanFor(accountType = 'landlord', plan = 'custom', countryId = '') {
          const normalizedPlan = String(plan || 'custom').toLowerCase() === 'standard' ? 'custom' : String(plan || 'custom').toLowerCase();
          const rows = this.pricingPlanRows(accountType, countryId);
          return rows.find(row => String(row.plan_key || '').toLowerCase() === normalizedPlan)
            || this.pricingPlanRows(accountType, '').find(row => String(row.plan_key || '').toLowerCase() === normalizedPlan)
            || (this.basePlanCatalog()[accountType] || []).find(row => row.plan_key === normalizedPlan)
            || {};
        },

        filteredPricingPlans() {
          const countryId = this.admin.pricingFilters.countryId;
          const accountType = this.admin.pricingFilters.accountType;
          return this.pricingPlanRows(accountType, countryId);
        },

        pricingPlanLimitsSummary(plan) {
          const accountType = plan?.account_type || 'landlord';
          if (accountType === 'landlord') {
            return `${Number(plan.property_limit || 0)} properties, ${Number(plan.unit_limit || 0)} units, ${Number(plan.personal_staff_limit || 0)} staff, ${Number(plan.partner_connection_limit || 0)} IPM or PMC connections`;
          }
          if (accountType === 'ipm') {
            return `${Number(plan.landlord_limit || 0)} landlords, ${Number(plan.properties_per_landlord_limit || 0)} properties per landlord`;
          }
          if (accountType === 'pmc') {
            return `${Number(plan.landlord_limit || 0)} landlords, ${Number(plan.property_limit || 0)} properties, ${Number(plan.unit_limit || 0)} units, ${Number(plan.staff_limit || 0)} staff`;
          }
          return '';
        },

        formatPricingAmount(currencyCode, amount, customLabel = '') {
          if (customLabel) return customLabel;
          const value = Number(amount || 0);
          if (value === 0) return 'Free';
          const symbol = String(currencyCode || '').toUpperCase() === 'MYR' ? 'RM' : String(currencyCode || '').toUpperCase() === 'USD' ? '$' : `${currencyCode || ''} `;
          return `${symbol}${value.toLocaleString(undefined, { maximumFractionDigits: value % 1 ? 2 : 0 })}`;
        },

        planStatusOptions(accountType = 'landlord') {
          const baseRows = this.pricingPlanRows(accountType, '');
          const rows = baseRows.length ? baseRows : (this.basePlanCatalog()[accountType] || this.basePlanCatalog().landlord);
          const seen = new Set();
          const plans = rows.filter(row => {
            const key = row.plan_key || '';
            if (!key || seen.has(key)) return false;
            seen.add(key);
            return true;
          });
          return plans.flatMap(row => {
            const statuses = row.statuses || (row.plan_key === 'free' && accountType === 'landlord' ? ['active'] : ['trial', 'active']);
            return statuses.map(status => ({
              value: `${row.plan_key}:${status}`,
              label: `${row.plan_name || this.titleCase(row.plan_key)} - ${this.titleCase(status)}`
            }));
          });
        },

        subscriptionPlanDefaults(accountType = 'landlord', plan = 'custom', countryId = '') {
          const row = this.pricingPlanFor(accountType, plan, countryId);
          if (accountType === 'landlord') {
            return {
              propertyLimit: Number(row.property_limit || 0),
              unitLimit: Number(row.unit_limit || 0),
              personalStaffLimit: Number(row.personal_staff_limit || 0),
              partnerConnectionLimit: Number(row.partner_connection_limit || 0)
            };
          }
          if (accountType === 'ipm') {
            return {
              maxLandlords: Number(row.landlord_limit || 0),
              maxPropertiesPerLandlord: Number(row.properties_per_landlord_limit || 0)
            };
          }
          if (accountType === 'pmc') {
            return {
              maxLandlords: Number(row.landlord_limit || 0),
              maxProperties: Number(row.property_limit || 0),
              maxStaff: Number(row.staff_limit || 0)
            };
          }
          return {};
        },

        subscriptionPlanStatusValue(plan, status, accountType = 'landlord') {
          const normalizedPlan = String(plan || 'free').toLowerCase() === 'standard'
            ? 'custom'
            : String(plan || 'free').toLowerCase();
          const normalizedStatus = String(status || 'active').toLowerCase() === 'suspended'
            ? 'active'
            : String(status || 'active').toLowerCase();
          const allowed = new Set(this.planStatusOptions(accountType).map(option => option.value));
          const value = `${normalizedPlan}:${normalizedStatus}`;
          const fallback = accountType === 'ipm'
            ? 'pro:active'
            : accountType === 'pmc'
              ? 'starter:active'
              : 'free:active';
          return allowed.has(value) ? value : fallback;
        },

        inferLandlordPlanStatus(subscription) {
          const status = ['trial', 'active'].includes(String(subscription?.status || '').toLowerCase())
            ? String(subscription.status).toLowerCase()
            : 'active';
          const storedPlan = String(subscription?.subscription_plan || 'free').toLowerCase() === 'standard'
            ? 'custom'
            : String(subscription?.subscription_plan || 'free').toLowerCase();
          const defaults = {
            free: this.subscriptionPlanDefaults('landlord', 'free'),
            starter: this.subscriptionPlanDefaults('landlord', 'starter'),
            growth: this.subscriptionPlanDefaults('landlord', 'growth'),
            portfolio: this.subscriptionPlanDefaults('landlord', 'portfolio')
          };
          const valuesMatch = plan => {
            const limits = defaults[plan] || {};
            return Number(subscription?.property_limit ?? limits.propertyLimit) === Number(limits.propertyLimit)
              && Number(subscription?.unit_limit ?? limits.unitLimit) === Number(limits.unitLimit)
              && Number(subscription?.personal_staff_limit ?? limits.personalStaffLimit) === Number(limits.personalStaffLimit)
              && Number(subscription?.partner_connection_limit ?? limits.partnerConnectionLimit) === Number(limits.partnerConnectionLimit);
          };

          if (storedPlan && storedPlan !== 'free') {
            return this.subscriptionPlanStatusValue(storedPlan, status, 'landlord');
          }
          if (valuesMatch('free')) {
            return this.subscriptionPlanStatusValue('free', 'active', 'landlord');
          }
          const inferredPlan = ['starter', 'growth', 'portfolio'].find(valuesMatch) || 'custom';
          return this.subscriptionPlanStatusValue(inferredPlan, status, 'landlord');
        },

        applySubscriptionPlanStatusSelection() {
          const selectedPlanStatus = this.subscriptionPlanStatusValue(
            String(this.admin.subscriptionForm.planStatus || 'free:active').split(':')[0],
            String(this.admin.subscriptionForm.planStatus || 'free:active').split(':')[1],
            'landlord'
          );
          const [plan = 'free', status = 'active'] = selectedPlanStatus.split(':');
          this.admin.subscriptionForm.planStatus = selectedPlanStatus;
          this.admin.subscriptionForm.plan = plan;
          this.admin.subscriptionForm.status = status;
          const countryId = this.admin.selectedRow?.country_id || this.admin.selectedRow?.subscription?.country_id || '';
          Object.assign(this.admin.subscriptionForm, this.subscriptionPlanDefaults('landlord', plan, countryId));
          if (plan === 'free' && status === 'active') {
            this.admin.subscriptionForm.expiresAt = '2099-12-31';
          }

        inferIpmPlanStatus(staffRow) {
          const status = ['trial', 'active'].includes(String(staffRow?.staff_subscription_status || '').toLowerCase())
            ? String(staffRow.staff_subscription_status).toLowerCase()
            : 'active';
          const landlords = Number(staffRow?.staff_max_landlords || 0);
          const propertiesPerLandlord = Number(staffRow?.staff_max_properties_per_landlord ?? 0);
          const rows = this.pricingPlanRows('ipm', this.adminStaffCountryId(staffRow)).filter(row => row.plan_key !== 'custom');
          const matched = rows.find(row => landlords <= Number(row.landlord_limit || 0) && propertiesPerLandlord <= Number(row.properties_per_landlord_limit || 0));
          const plan = matched?.plan_key || 'custom';
          return this.subscriptionPlanStatusValue(plan, status, 'ipm');
        },

        inferPmcPlanStatus(company) {
          const status = ['trial', 'active'].includes(String(company?.subscription_status || '').toLowerCase())
            ? String(company.subscription_status).toLowerCase()
            : 'active';
          const landlords = Number(company?.max_landlords || 0);
          const properties = Number(company?.max_properties || 0);
          const staff = Number(company?.max_staff || 0);
          const rows = this.pricingPlanRows('pmc', company?.country_id).filter(row => row.plan_key !== 'custom');
          const matched = rows.find(row => landlords <= Number(row.landlord_limit || 0) && properties <= Number(row.property_limit || 0) && staff <= Number(row.staff_limit || 0));
          const plan = matched?.plan_key || 'custom';
          return this.subscriptionPlanStatusValue(plan, status, 'pmc');
        },

            full_name: this.admin.managementAddForm.leaderName,

            country_id: countryId,
            max_landlords: Number(this.admin.managementAddForm.maxLandlords || 0),
            max_properties: Number(this.admin.managementAddForm.maxProperties || 0),
            max_staff: Number(this.admin.managementAddForm.maxStaff || 0),
            subscription_status: this.admin.managementAddForm.subscriptionStatus || 'trial',
            subscription_expires_at: this.admin.managementAddForm.expiresAt || null
          };

          if (row.accepted && row.id) {
            const { error: companyError } = await supabaseClient
              .from('management_companies')
              .update({
                company_name: metadata.company_name,
                phone: metadata.phone,
                country_id: countryId,
                max_landlords: metadata.max_landlords,
                max_properties: metadata.max_properties,
                max_staff: metadata.max_staff,
                subscription_status: metadata.subscription_status,
                subscription_expires_at: metadata.subscription_expires_at
              })
              .eq('id', row.id);

            if (companyError) {
              this.admin.formError = companyError.message;
              this.admin.saving = false;
              return;
            }

            if (row.leader_profile_id) {
              const { error: profileError } = await supabaseClient
                .from('profiles')
                .update({
                  full_name: metadata.full_name,
                  email: this.admin.managementAddForm.email,
                  phone: metadata.phone,
                  country_id: countryId
                })
                .eq('id', row.leader_profile_id)
                .eq('role', 'management_leader');

              if (profileError) {
                this.admin.formError = profileError.message;
                this.admin.saving = false;
                return;
              }
            }
          } else if (row.invite_id) {
            const { error: inviteError } = await supabaseClient
              .from('invite_tokens')
              .update({
                email: this.admin.managementAddForm.email,
                country_id: countryId,
                metadata
              })
              .eq('id', row.invite_id);

            if (inviteError) {
              this.admin.formError = inviteError.message;
              this.admin.saving = false;
              return;
            }
          }

          this.admin.message = 'PMC details updated.';
          this.closeAdminModal();
          await this.loadSuperAdminData();
        },

        buildInviteLink(token) {
          const baseUrl = window.location.href.split('#')[0];
          return `${baseUrl}#invite=${encodeURIComponent(token)}`;
        },

        generateSecureToken() {
          const bytes = new Uint8Array(32);
          window.crypto.getRandomValues(bytes);
          return Array.from(bytes, byte => byte.toString(16).padStart(2, '0')).join('');
        },

        addHoursIso(hours) {
          const date = new Date();
          date.setHours(date.getHours() + hours);
          return date.toISOString();
        },

        addDaysIso(days) {
          const date = new Date();
          date.setDate(date.getDate() + days);
          return date.toISOString();
        },

        toDateInputValue(value) {
          if (!value) return '';
          return new Date(value).toISOString().slice(0, 10);
        },

        formatDate(value) {
          if (!value) return '-';
          return new Intl.DateTimeFormat(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          }).format(new Date(value));
        },

        titleCase(value) {
          return String(value || '')
            .replace(/_/g, ' ')
            .replace(/\b\w/g, letter => letter.toUpperCase());
        },

        friendlyDatabaseError(error, fallback = 'Something went wrong. Please try again.') {
          const message = String(error?.message || error || '').trim();
          const lower = message.toLowerCase();

          if (!message) return fallback;
          if (lower.includes('row-level security') || lower.includes('violates row-level security policy')) {
            return 'You do not have permission to do this action, or your current plan does not allow it.';
          }
          if (lower.includes('duplicate key') || lower.includes('already exists') || lower.includes('unique constraint')) {
            return 'This record already exists. Please refresh and check the list before trying again.';
          }
          if (lower.includes('check constraint') || lower.includes('violates check constraint')) {
            return 'This action is not allowed with the current account settings.';
          }
          if (lower.includes('personal staff') || lower.includes('staff limit') || lower.includes('subscription allows')) {
            return message;
          }
          if (lower.includes('properties per landlord') || lower.includes('can only be assigned')) {
            return message;
          }
          return fallback;
        },

        statusBadgeClass(status) {
          const classes = {
            active: 'bg-emerald-100 text-emerald-700',
            trial: 'bg-yellow-100 text-amber-700',
            expired: 'bg-red-100 text-red-700',
            suspended: 'bg-red-100 text-red-700',
            archived: 'bg-slate-100 text-slate-700'
          };
          return classes[status] || 'bg-slate-100 text-slate-600';
        },

        isSubscriptionExpired(subscription) {
          if (!subscription?.expires_at) return false;
          if (subscription?.subscription_plan === 'free' && subscription?.status === 'active') return false;
          const days = this.daysUntil(subscription.expires_at);
          return Number.isFinite(days) && days < 0;
        },

        isSubscriptionAccessSuspended(subscription) {
          return Boolean(subscription?.access_suspended_at) || subscription?.status === 'suspended';
        },

        landlordSubscriptionStatus(row) {
          if (row?.archived_at) return 'archived';
          if (!row?.accepted) return 'pending';
          if (this.isSubscriptionAccessSuspended(row?.subscription)) return 'suspended';
          if (this.isSubscriptionExpired(row?.subscription)) return 'expired';
          return row?.subscription?.status || 'trial';
        },

        landlordSubscriptionStatusLabel(row) {
          const status = this.landlordSubscriptionStatus(row);
          if (status === 'pending') return 'Pending';
          return this.titleCase(status);
        },

        landlordPlanStatusLabel(row) {
          const status = this.landlordSubscriptionStatus(row);
          if (status === 'pending') return 'Pending';
          if (status === 'archived') return 'Archived';
          if (status === 'suspended') return 'Suspended';
          if (status === 'expired') return 'Expired';
          return this.subscriptionPlanStatusLabel(row?.subscription);
        },

        landlordSubscriptionStatusBadgeClass(row) {
          return this.statusBadgeClass(this.landlordSubscriptionStatus(row));
        },

        enquiryStatusBadgeClass(status) {
          const classes = {
            new: 'bg-amber-100 text-amber-700',
            in_progress: 'bg-slate-100 text-slate-700',
            resolved: 'bg-emerald-100 text-emerald-700',
            archived: 'bg-red-100 text-red-700'
          };
          return classes[status || 'new'] || 'bg-slate-100 text-slate-600';
        },

        requestConfirm(options = {}) {
          if (this.confirmDialog.resolver) this.confirmDialog.resolver(false);
          this.confirmDialog = {
            open: true,
            title: options.title || 'Confirm action',
            message: options.message || 'Are you sure you want to continue?',
            confirmText: options.confirmText || 'Confirm',
            cancelText: options.cancelText || 'Cancel',
            tone: options.tone || 'danger',
            resolver: null
          };
          return new Promise(resolve => {
            this.confirmDialog.resolver = resolve;
          });
        },

        resolveConfirm(confirmed) {
          const resolver = this.confirmDialog.resolver;
          this.confirmDialog.open = false;
          this.confirmDialog.resolver = null;
          if (resolver) resolver(Boolean(confirmed));
        },

        staffAccountStatus(staffRow) {
          if (staffRow?.accepted === false) return 'Invited';
          if (staffRow?.archived_at) return 'Archived';
          if (staffRow?.access_suspended_at || staffRow?.staff_subscription_status === 'suspended') return 'Suspended';
          if ((staffRow?.staff_type || 'freelancer') === 'freelancer') return 'Active';
          if (!Number(staffRow?.landlord_count || 0)) return 'Pending Approval';
          return 'Active';
        },

        staffAccountStatusBadgeClass(staffRow) {
          const status = this.staffAccountStatus(staffRow);
          if (status === 'Active') return 'bg-emerald-100 text-emerald-700';
          if (status === 'Suspended') return 'bg-red-100 text-red-700';
          if (status === 'Archived') return 'bg-slate-100 text-slate-700';
          if (status === 'Invited') return 'bg-yellow-100 text-amber-700';
          return 'bg-yellow-100 text-amber-700';
        },

        staffSubscriptionState(staffRow) {
          const status = String(staffRow?.staff_subscription_status || 'active').toLowerCase();
          const expiry = staffRow?.staff_subscription_expires_at ? new Date(staffRow.staff_subscription_expires_at) : null;
          const state = { status, expired: false, expiringSoon: false };
          if (['active', 'trial'].includes(status) && expiry && !Number.isNaN(expiry.getTime())) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            expiry.setHours(0, 0, 0, 0);
            const days = Math.ceil((expiry.getTime() - today.getTime()) / 86400000);
            state.expired = days < 0;
            state.expiringSoon = days >= 0 && days <= 7;
          }
          return state;
        },

        staffSubscriptionDisplayStatus(staffRow) {
          if (staffRow?.archived_at) return 'archived';

        async copyText(text) {
          if (!text) return;

          try {
            await navigator.clipboard.writeText(text);
          } catch (error) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
          }

          this.admin.message = 'Copied to clipboard.';
        },

        async loadDashboardData() {
          this.beginDataLoad('dashboard', this.dashboard);
          this.dashboard.error = '';

          const paymentAccess = this.profile?.role === 'landlord' || this.permissions.can_view_payments || this.permissions.can_verify_payments;
          const today = this.toIsoDate(new Date());

          const queryResults = await Promise.all([
            supabaseClient.from('properties').select('id', { count: 'exact', head: true }).is('archived_at', null),
            supabaseClient.from('units').select('id, status').is('archived_at', null),
            paymentAccess
              ? supabaseClient.from('payment_submissions').select('id', { count: 'exact', head: true }).eq('status', 'pending')
              : Promise.resolve({ count: 0, error: null }),
            paymentAccess
              ? supabaseClient
                .from('payments')
                .select('id, lease_id, submission_id, amount_paid, payment_date, payment_method, rent_period_start, rent_period_end, rent_period_label, payment_purpose, purpose_description, is_historical, notes, receipt_number, proof_file_path, proof_file_name, proof_file_size, proof_file_uploaded_by, proof_file_uploaded_at, recorded_by, created_at, payment_submissions(id, proof_image_url, proof_image_path, proof_image_name, proof_image_size), leases(id, monthly_rent, tenants(id, full_name, email), units(id, unit_number, property_id, properties(id, name, address, city)))')
                .order('payment_date', { ascending: false })
                .limit(8)
              : Promise.resolve({ data: [], error: null }),
            supabaseClient
              .from('leases')
              .select('id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, status, tenants(id, full_name, email, phone), units(id, unit_number, property_id, properties(id, name, address, city))')
              .eq('status', 'active')
              .gte('end_date', today)
              .order('end_date', { ascending: true })
              .limit(8),
            supabaseClient
              .from('maintenance_requests')
              .select('id, status')
              .is('archived_at', null)
          ]);

          const [propertiesResult, unitsResult, pendingResult, paymentsResult, leasesResult, maintenanceResult] = queryResults;
          const firstError = propertiesResult.error || unitsResult.error || pendingResult.error || paymentsResult.error || leasesResult.error || maintenanceResult.error;

          if (firstError) {
            this.dashboard.error = firstError.message;
          }

          const units = unitsResult.data || [];
          const maintenanceRows = maintenanceResult.data || [];
          this.dashboard.stats = {
            properties: propertiesResult.count || 0,
            units: units.length,
            occupied: units.filter(unit => unit.status === 'occupied').length,
            vacant: units.filter(unit => unit.status === 'vacant').length,
            pendingSubmissions: pendingResult.count || 0,
            maintenanceTotal: maintenanceRows.length,
            maintenanceOpen: maintenanceRows.filter(request => request.status === 'open').length,
            maintenanceInProgress: maintenanceRows.filter(request => request.status === 'in_progress').length,
            maintenanceResolved: maintenanceRows.filter(request => request.status === 'resolved').length
          };

          this.dashboard.recentPayments = (paymentsResult.data || []).map(payment => {
            const normalized = this.normalizePayment(payment);
            const lease = normalized.lease || {};
            const unit = lease.unit || {};
            const property = unit.properties || unit.property || {};
            return {
              ...normalized,
              tenant: lease.tenant?.full_name || '-',
              property: property.name || '-',
              unit: unit.unit_number || '-',
              amount: normalized.amount_paid,
              date: normalized.payment_date || normalized.created_at,
              method: normalized.payment_method
            };
          });

          this.dashboard.leaseExpirations = (leasesResult.data || []).map(lease => ({
            id: lease.id,
            tenant: lease.tenants?.full_name || '-',
            tenantEmail: lease.tenants?.email || '',
            tenantPhone: lease.tenants?.phone || '',
            property: lease.units?.properties?.name || '-',
            address: [lease.units?.properties?.address, lease.units?.properties?.city].filter(Boolean).join(', '),
            unit: lease.units?.unit_number || '-',
            startDate: lease.start_date,
            endDate: lease.end_date,
            daysRemaining: this.daysUntil(lease.end_date),
            monthlyRent: lease.monthly_rent,
            depositAmount: lease.deposit_amount,
            depositPaid: Boolean(lease.deposit_paid),
            raw: lease
          }));

          this.finishDataLoad('dashboard', this.dashboard);
        },

        parseDateOnly(dateValue) {
          if (!dateValue) return null;
          const raw = String(dateValue);
          const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
          if (match) {
            return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
          }
          const parsed = new Date(raw);
          if (Number.isNaN(parsed.getTime())) return null;
          return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate());
        },

        daysUntil(dateValue) {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const target = this.parseDateOnly(dateValue);
          if (!target) return Number.NaN;
          return Math.ceil((target.getTime() - today.getTime()) / 86400000);
        },

        leaseDaysBadgeClass(days) {
          if (days <= 7) return 'bg-red-100 text-red-700';
          if (days <= 30) return 'bg-yellow-100 text-amber-700';
          return 'bg-emerald-100 text-emerald-700';
        },

        subscriptionDisplayStatus(subscription = this.subscription) {
          if (this.isSubscriptionAccessSuspended(subscription)) return 'suspended';
          if (this.isSubscriptionExpired(subscription)) return 'expired';
          return subscription?.status || 'trial';
        },

        subscriptionPlanStatusLabel(subscription = this.subscription) {
          const status = this.subscriptionDisplayStatus(subscription);
          if (['expired', 'suspended'].includes(status)) return this.titleCase(status);

          const plan = subscription?.subscription_plan;
          if (!plan) {
            const statusLabel = this.titleCase(status);
            return this.subscriptionExpiringSoon(subscription) ? `${statusLabel} - Expiring soon` : statusLabel;
          }

          const baseLabel = plan === 'free' && status === 'active'
            ? 'Active - Free'
            : `${this.titleCase(plan)} - ${this.titleCase(status)}`;

          return this.subscriptionExpiringSoon(subscription) ? `${baseLabel} - Expiring soon` : baseLabel;
        },

        subscriptionExpiringSoon(subscription = this.subscription) {
          if (!subscription?.expires_at) return false;
          if (subscription?.subscription_plan === 'free' && subscription?.status === 'active') return false;
          if (this.isSubscriptionAccessSuspended(subscription)) return false;
          const days = this.daysUntil(subscription.expires_at);
          return Number.isFinite(days) && days >= 0 && days <= 7;
        },

        subscriptionPlanStatusBadgeClass(subscription = this.subscription) {
          const status = this.subscriptionDisplayStatus(subscription);
          if (status === 'expired' || status === 'suspended') return 'bg-red-100 text-red-700';
          if (this.subscriptionExpiringSoon(subscription)) return 'bg-yellow-100 text-amber-700';
          return this.statusBadgeClass(status);
        },

          return this.subscriptionPlanStatusLabel(this.subscription);
        },

        async switchStaffLandlord(landlordId) {

          this.staffContext.error = '';
          const { error } = await supabaseClient.rpc('switch_staff_landlord', {
            p_landlord_id: landlordId
          });
          if (error) {
            this.staffContext.error = error.message;
            return;
          }
          this.profile.landlord_id = landlordId;
          this.staffContext.activeLandlordId = landlordId;
          const active = this.staffContext.relationships.find(row => row.landlord_id === landlordId);
          this.permissions = this.permissionStateFromRow(active);
          await this.refreshCurrentPage();

        async requestAdditionalStaffLandlord() {
          this.staffContext.error = '';
          this.staffContext.message = '';
          if (this.profile?.staff_type !== 'freelancer') {
            this.staffContext.error = 'Only an Individual Portfolio Manager (IPM) can request access to another landlord.';
            return;
          }
          if (!/^\d{6}$/.test(this.staffContext.addCode)) {
            this.staffContext.error = 'Enter the 6 digit landlord code.';
            return;
          }

          const { error } = await supabaseClient.rpc('request_staff_landlord_access', {
            p_landlord_code: this.staffContext.addCode
          });

          if (error) {
            this.staffContext.error = error.message;
            return;
          }

          this.staffContext.addCode = '';
          this.staffContext.message = 'Request sent to landlord for approval.';
        },

          this.staffContext.error = '';

        async loadPropertyUnitData() {
          this.beginDataLoad('propertyUnit', this.propertyUnit);
          this.propertyUnit.error = '';

          const canLoadProperties = this.canViewProperties();
          const canLoadUnits = this.canViewUnits();
          const canLoadTenants = this.canViewTenants();
          const canLoadLeases = this.canViewUnits() && (this.canViewTenants() || this.canManageLeases() || this.canViewPayments() || this.canMarkUnitsVacant());
          const leaseTenantJoin = this.canViewTenants() ? ', tenants(id, full_name, email, phone)' : '';
          const unitSelect = this.canViewFinancials()
            ? 'id, property_id, unit_number, bedrooms, bathrooms, monthly_rent, status, created_at, properties(id, name, address, city)'
            : 'id, property_id, unit_number, bedrooms, bathrooms, status, created_at, properties(id, name, address, city)';
          const leaseSelect = this.canViewFinancials()
            ? `id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at${leaseTenantJoin}`
            : `id, unit_id, tenant_id, landlord_id, start_date, end_date, lease_document_url, lease_document_path, lease_document_name, lease_document_size, lease_document_uploaded_by, lease_document_uploaded_at, status, created_at${leaseTenantJoin}`;
          const results = await Promise.all([
            canLoadProperties
              ? supabaseClient.from('properties').select('id, landlord_id, name, address, city, created_at').is('archived_at', null).order('created_at', { ascending: false })
              : Promise.resolve({ data: [], error: null }),
            canLoadUnits
              ? supabaseClient.from('units').select(unitSelect).is('archived_at', null).order('created_at', { ascending: false })
              : Promise.resolve({ data: [], error: null }),
            canLoadTenants
              ? supabaseClient.from('tenants').select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_accepted, created_at').is('archived_at', null).order('full_name', { ascending: true })
              : Promise.resolve({ data: [], error: null }),
            canLoadLeases
              ? supabaseClient.from('leases').select(leaseSelect).order('end_date', { ascending: true })
              : Promise.resolve({ data: [], error: null })
          ]);

          const [propertiesResult, unitsResult, tenantsResult, leasesResult] = results;
          const firstError = propertiesResult.error || unitsResult.error || tenantsResult.error || leasesResult.error;

          if (firstError) {
            this.propertyUnit.error = firstError.message;
          }

          this.propertyUnit.properties = propertiesResult.data || [];
          this.propertyUnit.units = (unitsResult.data || []).map(unit => ({
            ...unit,
            property: unit.properties || null
          }));
          this.propertyUnit.tenants = (tenantsResult.data || []).map(tenant => ({
            ...tenant,
            invite_accepted: Boolean(tenant.invite_accepted)
          }));
          this.propertyUnit.leases = (leasesResult.data || []).map(lease => ({
            ...lease,
            tenant: lease.tenants || null
          }));

          if (this.propertyUnit.selectedUnit) {
            const refreshedUnit = this.propertyUnit.units.find(unit => unit.id === this.propertyUnit.selectedUnit.id);
            this.propertyUnit.selectedUnit = refreshedUnit || null;
            if (refreshedUnit) await this.loadUnitDetail(refreshedUnit);
          }

          this.finishDataLoad('propertyUnit', this.propertyUnit);
        },

        async submitPropertyForm() {
          if (this.propertyUnit.editPropertyId) {
            await this.savePropertyEdit();
          } else {
            await this.addProperty();

        },

        async addProperty() {
          this.propertyUnit.error = '';
          if (!this.canAddProperties()) {
            this.propertyUnit.error = 'You do not have permission to add properties.';
            return;
          }
          this.propertyUnit.saving = true;

          if (this.profile?.role === 'landlord') {
            const propertyLimit = Number(this.subscription?.property_limit || 5);
            const activeCount = this.propertyUnit.properties.filter(property => property.landlord_id === this.currentLandlordId()).length;
            if (activeCount >= propertyLimit) {
              this.propertyUnit.error = `Property limit reached. Your current subscription allows ${propertyLimit} properties.`;
              this.propertyUnit.saving = false;
              return;
            }
          }

          const { error } = await supabaseClient
            .from('properties')
            .insert({
              landlord_id: this.currentLandlordId(),
              name: this.propertyUnit.propertyForm.name,
              address: this.propertyUnit.propertyForm.address,
              city: this.propertyUnit.propertyForm.city
            });

          if (error) {
            this.propertyUnit.error = error.message;
            this.propertyUnit.saving = false;
            return;
          }

          this.propertyUnit.propertyForm = { name: '', address: '', city: '' };
          this.propertyUnit.showPropertyForm = false;
          this.propertyUnit.saving = false;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        startEditProperty(property) {
          if (!property || !this.canEditProperties()) return;
          this.propertyUnit.error = '';
          this.propertyUnit.editPropertyId = property.id;
          this.propertyUnit.showPropertyForm = true;
          this.propertyUnit.propertyForm = {
            name: property.name || '',
            address: property.address || '',
            city: property.city || ''
          };
          this.$nextTick(() => {
            document.querySelector('[data-property-form]')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        },

        cancelPropertyEdit() {
          this.propertyUnit.editPropertyId = '';
          this.propertyUnit.showPropertyForm = false;
          this.propertyUnit.propertyForm = { name: '', address: '', city: '' };
          this.propertyUnit.editPropertyForm = { name: '', address: '', city: '' };
        },

        async savePropertyEdit() {
          const propertyId = this.propertyUnit.editPropertyId;
          if (!propertyId) return;
          if (!this.canEditProperties()) {
            this.propertyUnit.error = 'You do not have permission to edit properties.';
            return;
          }

          this.propertyUnit.error = '';
          this.propertyUnit.saving = true;
          const { error } = await supabaseClient
            .from('properties')
            .update({
              name: this.propertyUnit.propertyForm.name,
              address: this.propertyUnit.propertyForm.address,
              city: this.propertyUnit.propertyForm.city
            })
            .eq('id', propertyId);

          if (error) {
            this.propertyUnit.error = error.message;
            this.propertyUnit.saving = false;
            return;
          }

          this.cancelPropertyEdit();
          this.propertyUnit.saving = false;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        async deleteProperty(property) {
          if (!property) return;
          if (!this.canArchiveProperties()) {
            this.propertyUnit.error = 'You do not have permission to archive properties.';
            return;
          }
          const confirmed = await this.requestConfirm({
            title: 'Archive property',
            message: `Archive ${property.name}? It will be removed from active property lists, but units, leases, payments, and maintenance records will stay saved.`,
            confirmText: 'Archive'
          });
          if (!confirmed) return;

          this.propertyUnit.error = '';
          const propertyUnitIds = this.propertyUnit.units
            .filter(unit => unit.property_id === property.id)
            .map(unit => unit.id);

          if (propertyUnitIds.length > 0) {
            const { error: leaseError } = await supabaseClient
              .from('leases')
              .update({ status: 'terminated' })
              .in('unit_id', propertyUnitIds)
              .eq('status', 'active');

            if (leaseError) {
              this.propertyUnit.error = leaseError.message;
              return;
            }
          }

          const { error: unitError } = await supabaseClient
            .from('units')
            .update({
              status: 'vacant',
              archived_at: new Date().toISOString(),
              archived_by: this.profile.id
            })
            .eq('property_id', property.id);

          if (unitError) {
            this.propertyUnit.error = unitError.message;
            return;
          }

          const { error } = await supabaseClient
            .from('properties')
            .update({
              archived_at: new Date().toISOString(),
              archived_by: this.profile.id
            })
            .eq('id', property.id);

          if (error) {
            this.propertyUnit.error = error.message;
            return;
          }

          if (this.propertyUnit.selectedPropertyId === property.id) this.propertyUnit.selectedPropertyId = '';
          if (this.propertyUnit.unitForm.propertyId === property.id) this.propertyUnit.unitForm.propertyId = '';
          if (this.propertyUnit.selectedUnit?.property_id === property.id) this.propertyUnit.selectedUnit = null;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        async addUnit() {
          this.propertyUnit.error = '';
          if (!this.canAddUnits()) {
            this.propertyUnit.error = 'You do not have permission to add units.';
            return;
          }
          this.propertyUnit.saving = true;
          const propertyId = this.propertyUnit.selectedPropertyId || this.propertyUnit.unitForm.propertyId;

          if (!propertyId) {
            this.propertyUnit.error = 'Open a property before adding a unit.';
            this.propertyUnit.saving = false;
            return;
          }

          const { error } = await supabaseClient
            .from('units')
            .insert({
              property_id: propertyId,
              unit_number: this.propertyUnit.unitForm.unitNumber,
              bedrooms: Number(this.propertyUnit.unitForm.bedrooms || 0),
              bathrooms: Number(this.propertyUnit.unitForm.bathrooms || 0),
              monthly_rent: Number(this.propertyUnit.unitForm.monthlyRent || 0),
              status: 'vacant'
            });

          if (error) {
            this.propertyUnit.error = error.message;
            this.propertyUnit.saving = false;
            return;
          }

          this.propertyUnit.unitForm = {
            propertyId,
            unitNumber: '',
            bedrooms: 1,
            bathrooms: 1,
            monthlyRent: 0
          };
          this.propertyUnit.saving = false;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        async deleteUnit(unit) {

          if (!this.canArchiveUnits()) {
            this.propertyUnit.error = 'You do not have permission to archive units.';
            return;
          }
          const confirmed = await this.requestConfirm({
            title: 'Archive unit',
            message: `Archive unit ${unit.unit_number}? It will be removed from active unit lists, but linked leases, payments, and maintenance records will stay saved.`,
            confirmText: 'Archive'
          });
          if (!confirmed) return;

          this.propertyUnit.error = '';
          const { error: leaseError } = await supabaseClient
            .from('leases')
            .update({ status: 'terminated' })
            .eq('unit_id', unit.id)
            .eq('status', 'active');

          if (leaseError) {
            this.propertyUnit.error = leaseError.message;
            return;
          }

          const { error } = await supabaseClient
            .from('units')
            .update({
              status: 'vacant',
              archived_at: new Date().toISOString(),
              archived_by: this.profile.id
            })
            .eq('id', unit.id);

          if (error) {
            this.propertyUnit.error = error.message;
            return;
          }

          if (this.propertyUnit.selectedUnit?.id === unit.id) this.propertyUnit.selectedUnit = null;

          await this.loadTenantLeaseData();

        async markUnitVacant(unit) {
          if (!unit) return;
          if (!this.canMarkUnitsVacant()) {
            this.propertyUnit.error = 'You do not have permission to mark units vacant.';
            return;
          }
          const confirmed = await this.requestConfirm({
            title: 'Mark unit vacant',
            message: `Mark unit ${unit.unit_number} as vacant? The active lease will be terminated if one is linked.`,
            confirmText: 'Mark Vacant',
            tone: 'neutral'
          });
          if (!confirmed) return;

          this.propertyUnit.error = '';
          const activeLease = this.propertyUnit.leases.find(lease => lease.unit_id === unit.id && lease.status === 'active') || null;

          if (activeLease) {
            const { error } = await supabaseClient
              .from('leases')
              .update({ status: 'terminated' })
              .eq('id', activeLease.id);

            if (error) {
              this.propertyUnit.error = error.message;
              return;
            }
          } else {
            const { error } = await supabaseClient
              .from('units')
              .update({ status: 'vacant' })
              .eq('id', unit.id);

            if (error) {
              this.propertyUnit.error = error.message;
              return;
            }
          }

          await this.loadPropertyUnitData();
          await this.loadTenantLeaseData();
          await this.loadDashboardData();
        },

            .from('leases')
            .insert({
              unit_id: payload.unitId,
              tenant_id: payload.tenantId,
              landlord_id: this.currentLandlordId(),
              start_date: payload.startDate,
              end_date: payload.endDate,
              monthly_rent: Number(payload.monthlyRent || 0),
              deposit_amount: Number(payload.depositAmount || 0),
              deposit_paid: Boolean(payload.depositPaid),
              lease_document_url: payload.leaseDocumentUrl || null,
              lease_document_path: payload.leaseDocumentPath || null,
              lease_document_name: payload.leaseDocumentName || null,
              lease_document_size: payload.leaseDocumentSize || null,
              lease_document_uploaded_by: payload.leaseDocumentUploadedBy || null,
              lease_document_uploaded_at: payload.leaseDocumentUploadedAt || null,
              status: 'active'
            })
            .select('id, landlord_id')
            .single();

          if (error) throw error;
          return data;
        },

        async loadLandlordFinanceData() {
          if (!this.canViewFinancials()) return;

          this.beginDataLoad('finance', this.finance);

            .from('payments')

            .order('payment_date', { ascending: false });

          if (error) {
            this.finance.error = error.message;
            this.finishDataLoad('finance', this.finance);
            return;
          }

          const payments = (data || []).map(payment => {
            const lease = payment.leases || {};
            const unit = lease.units || {};
            const property = unit.properties || {};
            return {
              id: payment.id,
              amount: Number(payment.amount_paid || 0),
              date: payment.payment_date || payment.created_at,
              method: payment.payment_method,
              period: this.paymentPeriodLabel(payment),
              notes: payment.notes || '',
              receipt: payment.receipt_number,
              purpose: payment.payment_purpose || (payment.rent_period_start ? 'rent' : 'other'),
              purposeDescription: payment.purpose_description || '',

              property: property.name || 'Unassigned property',
              propertyAddress: [property.address, property.city].filter(Boolean).join(', ')
            };
          });

          const now = new Date();
          const monthKey = now.toISOString().slice(0, 7);
          const yearKey = String(now.getFullYear());
          const revenuePayments = payments.filter(payment => payment.isRevenue);
          const totalRevenue = revenuePayments.reduce((sum, payment) => sum + payment.amount, 0);
          const byPropertyMap = new Map();
          revenuePayments.forEach(payment => {
            const current = byPropertyMap.get(payment.property) || { property: payment.property, count: 0, total: 0 };
            current.count += 1;
            current.total += payment.amount;
            byPropertyMap.set(payment.property, current);
          });

          this.finance.payments = payments;
          this.finance.byProperty = Array.from(byPropertyMap.values()).sort((a, b) => b.total - a.total);
          this.finance.stats = {
            totalRevenue,
            monthRevenue: revenuePayments.filter(payment => String(payment.date || '').slice(0, 7) === monthKey).reduce((sum, payment) => sum + payment.amount, 0),
            yearRevenue: revenuePayments.filter(payment => String(payment.date || '').slice(0, 4) === yearKey).reduce((sum, payment) => sum + payment.amount, 0),
            averagePayment: revenuePayments.length ? totalRevenue / revenuePayments.length : 0
          };
          this.finishDataLoad('finance', this.finance);

        filteredFinancePayments() {
          const filters = this.finance.filters || {};
          const search = String(filters.search || '').toLowerCase();
          return (this.finance.payments || []).filter(payment => {
            if (filters.property && payment.property !== filters.property) return false;
            if (filters.startDate && String(payment.date || '').slice(0, 10) < filters.startDate) return false;
            if (filters.endDate && String(payment.date || '').slice(0, 10) > filters.endDate) return false;
            if (search) {
              const haystack = [payment.tenant, payment.unit, payment.property, payment.period, payment.receipt, payment.notes, payment.method].join(' ').toLowerCase();
              if (!haystack.includes(search)) return false;
            }
            return true;

        filteredFinanceSummary() {
          const payments = this.filteredFinancePayments().filter(payment => payment.isRevenue);
          const now = new Date();
          const monthKey = now.toISOString().slice(0, 7);
          const yearKey = String(now.getFullYear());
          const totalRevenue = payments.reduce((sum, payment) => sum + Number(payment.amount || 0), 0);
          return {
            totalRevenue,
            monthRevenue: payments.filter(payment => String(payment.date || '').slice(0, 7) === monthKey).reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
            yearRevenue: payments.filter(payment => String(payment.date || '').slice(0, 4) === yearKey).reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
            averagePayment: payments.length ? totalRevenue / payments.length : 0

        filteredFinanceByProperty() {
          const byPropertyMap = new Map();
          this.filteredFinancePayments().filter(payment => payment.isRevenue).forEach(payment => {
            const current = byPropertyMap.get(payment.property) || { property: payment.property, count: 0, total: 0 };
            current.count += 1;
            current.total += Number(payment.amount || 0);
            byPropertyMap.set(payment.property, current);
          });
          return Array.from(byPropertyMap.values()).sort((a, b) => b.total - a.total);
        },

        financeChartBars() {
          const byMonth = new Map();
          this.filteredFinancePayments().filter(payment => payment.isRevenue).forEach(payment => {
            const month = String(payment.date || '').slice(0, 7);
            if (!month) return;
            byMonth.set(month, (byMonth.get(month) || 0) + Number(payment.amount || 0));
          });
          const rows = Array.from(byMonth.entries())
            .sort(([a], [b]) => a.localeCompare(b))
            .slice(-12)
            .map(([month, total]) => ({ month, total }));
          const max = Math.max(...rows.map(row => row.total), 0);
          return rows.map(row => ({
            ...row,
            label: row.month,
            height: max > 0 ? Math.max(8, Math.round((row.total / max) * 100)) : 0
          }));
        },

        downloadFinanceCsv() {
          const rows = this.filteredFinancePayments();
          if (rows.length === 0) return;
          const headers = ['Date', 'Property', 'Unit', 'Tenant', 'Period', 'Amount', 'Method', 'Receipt', 'Notes'];
          const escapeCell = value => `"${String(value ?? '').replace(/"/g, '""')}"`;
          const csv = [
            headers.map(escapeCell).join(','),
            ...rows.map(row => [
              row.date,
              row.property,
              row.unit,
              row.tenant,
              row.period,
              row.amount,
              row.method,
              row.receipt,
              row.notes
            ].map(escapeCell).join(','))
          ].join('\n');
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `mushavo-finance-${this.toIsoDate(new Date())}.csv`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
